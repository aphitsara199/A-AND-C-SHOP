    function applySelectedCurrentSalesRange() {
      const start = dateFromKey($("current-sales-range-start").value);
      const end = dateFromKey($("current-sales-range-end").value);
      if (!start || !end || start > end) {
        $("status").textContent = "กรุณาเลือกวันเริ่มต้นและวันสิ้นสุดของ Week ให้ถูกต้อง";
        return;
      }
      setSelectedCurrentSalesRange(start, end);
      syncProductSalesFromLedger();
      save();
      render();
      const coverage = salesLedgerRangeCoverage(selectedCurrentSalesRangeBounds());
      const baseMessage = coverage.included.length
        ? `คำนวณ Week ช่วง ${selectedCurrentSalesRangeThaiLabel()} จากรายงาน ${coverage.included.length} ไฟล์แล้ว`
        : `ยังไม่พบรายงานขายที่อยู่ครบในช่วง Week ${selectedCurrentSalesRangeThaiLabel()}`;
      const partialNote = coverage.partial.length
        ? ` (มีรายงาน ${coverage.partial.length} ไฟล์ครอบคลุมเพียงบางวัน จึงไม่รวมเพื่อให้ตัวเลขถูกต้อง)`
        : "";
      const overlapNote = coverage.overlapping.length
        ? ` (ตัดรายงานซ้ำ ${coverage.overlapping.length} ไฟล์ เพื่อไม่นับยอดซ้ำ)`
        : "";
      $("status").textContent = `${baseMessage}${partialNote}${overlapNote}`;
    }

    function salesLedgerRangeCoverage(bounds = selectedSalesRangeBounds()) {
      const { start, end } = bounds;
      const records = salesLedger
        .map(record => ({ record, bounds: salesLedgerRecordBounds(record) }))
        .filter(item => item.bounds);
      const candidates = records
        .filter(item => item.bounds.start >= start && item.bounds.end <= end)
        .sort((left, right) => {
          const lengthDifference = ledgerDayKeys(left.bounds).length - ledgerDayKeys(right.bounds).length;
          if (lengthDifference) return lengthDifference;
          const sourceDifference = salesReportSourcePriority(right.record.source) - salesReportSourcePriority(left.record.source);
          if (sourceDifference) return sourceDifference;
          const importDifference = String(right.record.importedAt || "").localeCompare(String(left.record.importedAt || ""));
          return importDifference || left.bounds.start - right.bounds.start || left.bounds.end - right.bounds.end;
        });
      const occupiedDays = new Set();
      const includedItems = [];
      const overlapping = [];
      candidates.forEach(item => {
        const days = ledgerDayKeys(item.bounds);
        if (days.some(day => occupiedDays.has(day))) {
          overlapping.push(item.record);
          return;
        }
        days.forEach(day => occupiedDays.add(day));
        includedItems.push(item);
      });
      const included = includedItems
        .sort((left, right) => left.bounds.start - right.bounds.start || left.bounds.end - right.bounds.end)
        .map(item => item.record);
      const partial = records
        .filter(item => item.bounds.start <= end && item.bounds.end >= start)
        .filter(item => item.bounds.start < start || item.bounds.end > end)
        .sort((a, b) => a.bounds.start - b.bounds.start || a.bounds.end - b.bounds.end)
        .map(item => item.record);
      return { included, partial, overlapping };
    }

    function salesLedgerRecordsForSelectedRange(bounds = selectedSalesRangeBounds()) {
      return salesLedgerRangeCoverage(bounds).included;
    }

    function selectedSalesData(bounds = selectedSalesRangeBounds()) {
      const entriesByCode = new Map();
      const records = salesLedgerRecordsForSelectedRange(bounds);
      records.forEach(record => {
        (record.entries || []).forEach(entry => {
          const code = String(entry.code || "").trim();
          if (!code) return;
          const current = entriesByCode.get(code) || {
            code,
            name: String(entry.name || "").trim(),
            saleWeight: 0,
            salesAmount: 0
          };
          current.name = String(entry.name || current.name || "").trim();
          current.saleWeight += Number(entry.saleWeight || 0);
          current.salesAmount += Number(entry.salesAmount || 0);
          entriesByCode.set(code, current);
        });
      });
      return { entriesByCode, records };
    }

    function syncProductSalesFromLedger() {
      const previous = selectedSalesData(selectedSalesRangeBounds());
      const current = selectedSalesData(selectedCurrentSalesRangeBounds());
      if (previous.records.length) {
        applySalesReportEntries("previous", [...previous.entriesByCode.values()]);
      }
      if (current.records.length) {
        applySalesReportEntries("current", [...current.entriesByCode.values()]);
        currentSalesWeekKey = weekKey(todayDate());
      }
    }

    function syncProductSalesForReportDate(date) {
      const reportDateValue = date instanceof Date && !Number.isNaN(date.getTime()) ? date : todayDate();
      const previous = selectedSalesData(previousReportingPeriodBounds(reportDateValue));
      const current = selectedSalesData(reportingPeriodBounds(reportDateValue));
      applySalesReportEntries("previous", []);
      applySalesReportEntries("current", []);
      if (previous.records.length) applySalesReportEntries("previous", [...previous.entriesByCode.values()]);
      if (current.records.length) applySalesReportEntries("current", [...current.entriesByCode.values()]);
      currentSalesWeekKey = weekKey(reportDateValue);
    }

    function salesMetricsForEntry(entry, cost) {
      const saleWeight = Number(entry?.saleWeight || 0);
      const salesAmount = Number(entry?.salesAmount || 0);
      const averageSellPrice = saleWeight > 0 ? salesAmount / saleWeight : 0;
      const profit = salesAmount - (saleWeight * cost);
      const averageProfit = saleWeight > 0 ? profit / saleWeight : 0;
      return {
        saleWeight,
        salesAmount,
        averageSellPrice,
        profit,
        gpi: cost > 0 ? (averageProfit / cost) * 100 : 0
      };
    }

    function analysisRows() {
      const { entriesByCode: previousEntries } = selectedSalesData(selectedSalesRangeBounds());
      const { entriesByCode: currentEntries } = selectedSalesData(selectedCurrentSalesRangeBounds());
      const byCode = new Map(selectedRows().map(row => [row.code, row]));

      [...previousEntries.values(), ...currentEntries.values()].forEach(entry => {
        if (byCode.has(entry.code)) return;
        byCode.set(entry.code, {
          code: entry.code,
          name: productNameFor(entry.code, entry.name),
          group: inferGroup("", entry.code),
          days: [],
          currentDays: [],
          sale: 0,
          previousSale: 0,
          currentSale: 0,
          stock: 0,
          count: 0,
          cost: 0,
          sellPrice: 0,
          previousSellPrice: 0,
          currentSellPrice: 0,
          previousSalesAmount: 0,
          salesAmount: 0,
          previousProfit: 0,
          grossProfit: 0,
          previousGpi: 0,
          currentGpi: 0,
          gpi: 0,
          value: 0
        });
      });

      return [...byCode.values()].map(row => {
        const cost = Number(row.cost || 0);
        const previous = salesMetricsForEntry(previousEntries.get(row.code), cost);
        const current = salesMetricsForEntry(currentEntries.get(row.code), cost);
        return {
          ...row,
          name: productNameFor(row.code, row.name || previousEntries.get(row.code)?.name || currentEntries.get(row.code)?.name),
          sale: previous.saleWeight,
          previousSale: previous.saleWeight,
          currentSale: current.saleWeight,
          sellPrice: current.saleWeight > 0 ? current.averageSellPrice : previous.averageSellPrice,
          previousSellPrice: previous.averageSellPrice,
          currentSellPrice: current.averageSellPrice,
          previousSalesAmount: previous.salesAmount,
          salesAmount: current.salesAmount,
          previousProfit: previous.profit,
          grossProfit: current.profit,
          previousGpi: previous.gpi,
          currentGpi: current.gpi,
          gpi: current.saleWeight > 0 ? current.gpi : previous.gpi
        };
      });
    }

    function activePreviousWeekCompactLabel() {
      return selectedSalesRangeCompactLabel();
    }

    function activeCurrentWeekCompactLabel() {
      return selectedCurrentSalesRangeCompactLabel();
    }

    function weekKey(date = todayDate()) {
      const period = reportingPeriodBounds(date);
      return `${period.start.getFullYear()}-${pad(period.start.getMonth() + 1)}-W${period.number}`;
    }

    function loadHistory() {
      try {
        const saved = JSON.parse(localStorage.getItem(historyKey));
        history = Array.isArray(saved) ? saved : [];
      } catch (_) {
        history = [];
      }
      const originalCount = history.length;
      const normalized = new Map();
      let changed = false;
      history.forEach(item => {
        const savedAt = item?.savedAt ? new Date(item.savedAt) : null;
        const hasSavedAt = savedAt && !Number.isNaN(savedAt.getTime());
        const normalizedKey = hasSavedAt ? weekKey(savedAt) : item.weekKey;
        const normalizedMonth = hasSavedAt ? monthKey(savedAt) : item.monthKey;
        const normalizedItem = {
          ...item,
          weekKey: normalizedKey,
          monthKey: normalizedMonth
        };
        if (normalizedKey !== item.weekKey || normalizedMonth !== item.monthKey) changed = true;
        const existing = normalized.get(normalizedKey);
        const existingTime = new Date(existing?.savedAt || 0).getTime() || 0;
        const itemTime = hasSavedAt ? savedAt.getTime() : 0;
        if (!existing || itemTime >= existingTime) normalized.set(normalizedKey, normalizedItem);
      });
      history = [...normalized.values()].sort((a, b) => a.weekKey.localeCompare(b.weekKey));
      if (normalized.size !== originalCount) changed = true;
      if (changed) saveHistory();
    }

    function saveHistory() {
      localStorage.setItem(historyKey, JSON.stringify(history));
    }

    function resetReportsAfterDeletion(message) {
      applySalesReportEntries("previous", []);
      applySalesReportEntries("current", []);
      syncProductSalesFromLedger();
      selectedWeekKey = "current";

      saveHistory();
      refreshMonthPicker();

    function deleteRecordsInRange(start, end) {
      const beforeSales = salesLedger.length;
      const beforeCustomers = customerDailyReports.length;
      salesLedger = salesLedger.filter(record => {
        const bounds = salesLedgerRecordBounds(record);
        return !bounds || bounds.end < start || bounds.start > end;
      });
      const startKey = dateKey(start);
      const endKey = dateKey(end);
      customerDailyReports = customerDailyReports.filter(report => report.d < startKey || report.d > endKey);
      return { sales: beforeSales - salesLedger.length, customers: beforeCustomers - customerDailyReports.length };
    }

    function deleteSelectedWeekHistory() {
      const snapshot = selectedWeekKey === "current" ? null : history.find(item => item.weekKey === selectedWeekKey);
      const referenceDate = snapshot?.savedAt ? new Date(snapshot.savedAt) : todayDate();
      const bounds = reportingPeriodBounds(referenceDate);
      const label = snapshot ? weekOptionLabel(snapshot) : reportingPeriodLabel(referenceDate);
      if (!window.confirm(`ต้องการลบข้อมูล ${label} ทั้งหมดหรือไม่?\n\nกด ตกลง เพื่อลบ หรือ ยกเลิก เพื่อเก็บข้อมูลไว้`)) return;
      const removed = deleteRecordsInRange(bounds.start, bounds.end);
      if (snapshot) history = history.filter(item => item.weekKey !== snapshot.weekKey);
      resetReportsAfterDeletion(`ลบ ${label} แล้ว · รายงานขาย ${removed.sales} ไฟล์ · รายงานลูกค้า ${removed.customers} ไฟล์`);

    function deleteSelectedDateHistory() {

    function clearAllHistory() {
      if (!window.confirm("ต้องการลบข้อมูลทั้งระบบจริงหรือไม่?\n\nข้อมูลต่อไปนี้จะถูกลบทั้งหมด:\n• รายการสินค้าและสต๊อก\n• รายงานยอดขายทุกวัน/ทุกสัปดาห์\n• รายงานและเบอร์โทรศัพท์ลูกค้า\n• ประวัติสะสมและค่าคำนวณทั้งหมด\n\nการดำเนินการนี้ย้อนกลับไม่ได้\nกด ตกลง เพื่อลบ หรือ ยกเลิก เพื่อเก็บข้อมูลไว้")) return;
      products = [];

    function restorePreviousWeekHistory() {
      if (localStorage.getItem(historyResetKey) === "1") return null;
      const snapshotDate = new Date(2026, 6, 12, 12, 0, 0);
      const restoredWeekKey = weekKey(snapshotDate);
      if (history.some(item => item.weekKey === restoredWeekKey)) return null;

      const savedReport = salesLedger.find(item => item.start === "2026-07-06" && item.end === "2026-07-11");
      const reportEntries = Array.isArray(savedReport?.entries) && savedReport.entries.length
        ? savedReport.entries
        : suppliedSalesReports.previous.map(([code, saleWeight, salesAmount]) => ({ code, saleWeight, salesAmount }));
      if (!reportEntries.length) return null;

      const salesByCode = new Map(reportEntries.map(entry => [String(entry.code || "").trim(), entry]));
      const snapshotRows = products.map(item => {
        const code = item[0];
        const entry = salesByCode.get(code);
        const currentSale = Number(entry?.saleWeight || 0);
        const salesAmount = Number(entry?.salesAmount || 0);
        const cost = Number(seedCostByCode.get(code) ?? item[6] ?? 0);
        const stock = Number(seedStockByCode.get(code) ?? item[4] ?? 0);
        const currentSellPrice = currentSale > 0
          ? salesAmount / currentSale
          : Number(item[9] || item[7] || cost);
        const grossProfit = salesAmount - (currentSale * cost);
        const averageProfit = currentSale > 0 ? grossProfit / currentSale : 0;
        const currentGpi = cost > 0 ? (averageProfit / cost) * 100 : 0;
        return {
          code,
          name: productNameFor(code, item[1]),
          group: item[2],
          sale: 0,
          currentSale,
          stock,
          cost,
          sellPrice: currentSellPrice,
          previousSellPrice: cost,
          currentSellPrice,
          previousSalesAmount: 0,
          salesAmount,
          previousProfit: 0,
          grossProfit,
          previousGpi: 0,
          currentGpi,
          gpi: currentGpi,
          value: stock * cost
        };
      });

      const snapshot = {
        weekKey: restoredWeekKey,
        monthKey: monthKey(snapshotDate),
        savedAt: snapshotDate.toISOString(),
        note: "restored-previous-week",
        rows: snapshotRows
      };
      history.push(snapshot);
      history.sort((a, b) => a.weekKey.localeCompare(b.weekKey));
      saveHistory();
      return snapshot;
    }

        previousSalesAmount: Number(row.previousSalesAmount.toFixed(2)),

        previousProfit: Number(row.previousProfit.toFixed(2)),
        grossProfit: Number(row.grossProfit.toFixed(2)),
        previousGpi: Number(row.previousGpi.toFixed(2)),
        currentGpi: Number(row.currentGpi.toFixed(2)),

    function updateHistoryStatus() {

        : "เมื่ออัปโหลดข้อมูลหรือกดบันทึก ระบบจะเก็บข้อมูลไว้ใช้ทำรายงานรายเดือน";
