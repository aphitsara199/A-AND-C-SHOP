    function refreshMonthPicker() {
      const current = $("month-picker").value || monthKey();
      const keys = [...new Set([monthKey(), ...history.map(item => item.monthKey)])].sort().reverse();
      $("month-picker").innerHTML = keys.map(key => `<option value="${key}">${thaiMonthLabel(key)}</option>`).join("");
      $("month-picker").value = keys.includes(current) ? current : keys[0];
      refreshMonthlyProductsMonthPicker();
    }

    function monthBounds(key) {
      const [year, month] = String(key || "").split("-").map(Number);
      if (!year || !month) return null;
      return {
        start: new Date(year, month - 1, 1),
        end: new Date(year, month, 0)
      };
    }

    function monthlyProductsMonthKeys() {
      const keys = new Set([monthKey(), ...history.map(item => item.monthKey).filter(Boolean)]);
      salesLedger.forEach(record => {
        const bounds = salesLedgerRecordBounds(record);
        if (!bounds) return;
        const cursor = new Date(bounds.start.getFullYear(), bounds.start.getMonth(), 1);
        const endMonth = new Date(bounds.end.getFullYear(), bounds.end.getMonth(), 1);
        while (cursor <= endMonth) {
          keys.add(monthKey(cursor));
          cursor.setMonth(cursor.getMonth() + 1);
        }
      });
      return [...keys].sort().reverse();
    }

    function refreshMonthlyProductsMonthPicker() {
      const picker = $("monthly-products-month");
      if (!picker) return;
      const current = picker.value || $("month-picker")?.value || monthKey();
      const keys = monthlyProductsMonthKeys();
      picker.innerHTML = keys.map(key => `<option value="${key}">${thaiMonthLabel(key)}</option>`).join("");
      picker.value = keys.includes(current) ? current : keys[0];
      refreshMonthlyProductsDatePickers();
    }

    function monthlyProductRangeBounds(key = $("monthly-products-month")?.value) {
      const bounds = monthBounds(key || monthKey());
      if (!bounds) return null;
      const start = dateFromKey(monthlyProductRange.start);
      const end = dateFromKey(monthlyProductRange.end);
      const isWithinMonth = start && end && start >= bounds.start && end <= bounds.end && start <= end;
      return isWithinMonth ? { start, end } : bounds;
    }

    function setMonthlyProductRange(start, end) {
      monthlyProductRange = { start: dateKey(start), end: dateKey(end) };
      monthlyDailyPage = 0;
    }

    function refreshMonthlyProductsDatePickers() {
      const monthPicker = $("monthly-products-month");
      const startInput = $("monthly-products-start");
      const endInput = $("monthly-products-end");
      if (!monthPicker || !startInput || !endInput || !monthPicker.value) return;
      const month = monthBounds(monthPicker.value);
      const range = monthlyProductRangeBounds(monthPicker.value);
      if (!month || !range) return;
      startInput.min = dateKey(month.start);
      startInput.max = dateKey(month.end);
      endInput.min = dateKey(month.start);
      endInput.max = dateKey(month.end);
      startInput.value = dateKey(range.start);
      endInput.value = dateKey(range.end);
    }

    function applyMonthlyProductsRange() {
      const key = $("monthly-products-month").value;
      const month = monthBounds(key);
      const start = dateFromKey($("monthly-products-start").value);
      const end = dateFromKey($("monthly-products-end").value);
      const isWithinMonth = month && start && end && start >= month.start && end <= month.end && start <= end;
      if (!isWithinMonth) {
        $("monthly-products-note").textContent = "กรุณาเลือกช่วงวันที่ภายในเดือนเดียวกันให้ถูกต้อง";
        return;
      }
      setMonthlyProductRange(start, end);
      save();
      renderMonthlyProductReport();
    }

    function monthlyProductRecords(key) {
      const bounds = monthBounds(key);
      if (!bounds) return [];
      return salesLedger
        .map(record => ({ record, bounds: salesLedgerRecordBounds(record) }))
        .filter(item => item.bounds && item.bounds.start >= bounds.start && item.bounds.end <= bounds.end)
        .sort((a, b) => a.bounds.start - b.bounds.start || a.bounds.end - b.bounds.end);
    }

    function monthlyProductRecordCoverage(key) {
      const range = monthlyProductRangeBounds(key);
      const all = monthlyProductRecords(key);
      if (!range) return { all, records: all, partial: [], range: null };
      // Prefer the most detailed non-overlapping reports. This prevents an
      // incorrectly detected aggregate such as 3-14 from appearing beside the
      // authoritative daily report for day 3 and from being counted twice.
      const ledgerCoverage = salesLedgerRangeCoverage(range);
      const includedRecords = new Set(ledgerCoverage.included);
      const excludedRecords = new Set([...ledgerCoverage.partial, ...ledgerCoverage.overlapping]);
      const records = all.filter(item => includedRecords.has(item.record));
      const partial = all.filter(item => excludedRecords.has(item.record));
      return { all, records, partial, range };
    }

    function monthlyProductDailyRows(records) {
      const knownRows = new Map(rows().map(row => [row.code, row]));
      const byCode = new Map();
      records.forEach(({ record }, recordIndex) => {
        (record.entries || []).forEach(entry => {
          const code = String(entry.code || "").trim();
          if (!code) return;
          const known = knownRows.get(code);
          const current = byCode.get(code) || {
            code,
            name: productNameFor(code, entry.name || known?.name),
            cost: Number(known?.cost || 0),
            weights: Array(records.length).fill(0),
            totalWeight: 0,
            totalSales: 0
          };
          const weight = Number(entry.saleWeight || 0);
          const sales = Number(entry.salesAmount || 0);
          current.name = productNameFor(code, entry.name || current.name);
          current.weights[recordIndex] += weight;
          current.totalWeight += weight;
          current.totalSales += sales;
          byCode.set(code, current);
        });
      });
      return [...byCode.values()].sort((a, b) => b.totalWeight - a.totalWeight || a.code.localeCompare(b.code, "th"));
    }

    function monthlyProductAggregateRows(records) {
      return monthlyProductDailyRows(records).map(row => {
        const metrics = salesMetricsForEntry({ saleWeight: row.totalWeight, salesAmount: row.totalSales }, row.cost);
        return {
          ...row,
          price: metrics.averageSellPrice,
          profit: metrics.profit,
          averageProfit: row.totalWeight > 0 ? metrics.profit / row.totalWeight : 0,
          gpi: metrics.gpi
        };
      });
    }

    function monthlyProductEmpty(message) {
      $("monthly-products-content").innerHTML = `<div class="monthly-empty-state">${xmlEscape(message)}</div>`;
    }

    function monthlyDailyRecordSortKey(item) {
      return `report:${item.record.start}:${item.record.end}`;
    }

    function monthlyDailySortIndicator(sortKey) {
      const isActive = monthlyDailySort.metric === sortKey;
      const icon = isActive ? (monthlyDailySort.direction === "asc" ? "↑" : "↓") : "↕";
      return `<span class="monthly-sort-indicator" aria-hidden="true">${icon}</span>`;
    }

    function monthlyDailySortButton(label, sortKey) {
      const isActive = monthlyDailySort.metric === sortKey;
      const directionLabel = isActive && monthlyDailySort.direction === "asc" ? "เรียงจากน้อยไปมาก" : "เรียงจากมากไปน้อย";
      return `<button class="monthly-daily-sort-button${isActive ? " is-active" : ""}" type="button" data-monthly-sort-key="${xmlEscape(sortKey)}" title="${directionLabel}">${xmlEscape(label)}${monthlyDailySortIndicator(sortKey)}</button>`;
    }

    function normalizeMonthlyDailySort(records = []) {
      const validKeys = new Set(["total", ...records.map(monthlyDailyRecordSortKey)]);
      if (!validKeys.has(monthlyDailySort.metric)) monthlyDailySort.metric = "total";
      if (!["asc", "desc"].includes(monthlyDailySort.direction)) monthlyDailySort.direction = "desc";
    }

    function toggleMonthlyDailySort(sortKey) {
      const direction = monthlyDailySort.metric === sortKey && monthlyDailySort.direction === "desc" ? "asc" : "desc";
      monthlyDailySort = { metric: sortKey, direction };
      save();
      renderMonthlyProductReport();
    }

    function sortMonthlyDailyRows(reportRows, records) {
      const recordIndex = records.findIndex(item => monthlyDailyRecordSortKey(item) === monthlyDailySort.metric);
      const multiplier = monthlyDailySort.direction === "asc" ? 1 : -1;
      return [...reportRows].sort((left, right) => {
        const leftValue = recordIndex >= 0 ? Number(left.weights[recordIndex] || 0) : Number(left.totalWeight || 0);
        const rightValue = recordIndex >= 0 ? Number(right.weights[recordIndex] || 0) : Number(right.totalWeight || 0);
        return ((leftValue - rightValue) * multiplier) || left.code.localeCompare(right.code, "th");
      });
    }

    function monthlyDailyWeightCell(value, maximum, columnIndex, isTotal = false) {
      const weight = Number(value || 0);
      const label = weight > 0 ? fmt(weight) : "-";
      const colorClass = isTotal ? "monthly-total" : `monthly-day-${columnIndex % 7}`;
      return `<td class="num bar-cell monthly-visual-cell ${colorClass}" style="--bar:${barWidth(weight, maximum)}"><span>${label}</span></td>`;
    }

    function monthlyDailyPageSize() {
      const contentWidth = Number($("monthly-products-content")?.clientWidth || 0);
      const viewportWidth = typeof window === "undefined" ? 0 : Number(window.innerWidth || 0);
      const width = contentWidth || viewportWidth || 1180;
      const isCompact = width <= 900;
      const fixedWidth = isCompact ? 344 : 448;
      const preferredDayWidth = isCompact ? 74 : 86;
      const columns = Math.floor((width - fixedWidth) / preferredDayWidth);
      return Math.max(4, Math.min(12, columns));
    }

    function monthlyDailyPageCount(records, pageSize) {
      return Math.max(1, Math.ceil(records.length / pageSize));
    }

    function normalizeMonthlyDailyPage(records, pageSize) {
      const pageCount = monthlyDailyPageCount(records, pageSize);
      monthlyDailyPage = Math.max(0, Math.min(monthlyDailyPage, pageCount - 1));
      return pageCount;
    }

    function renderMonthlyDailyProducts(key, records, range, partial = []) {
      const note = $("monthly-products-note");
      const rangeLabel = thaiDateRangeLabel(range.start, range.end);
      const partialNote = partial.length ? ` · ไม่รวม ${partial.length.toLocaleString("th-TH")} ไฟล์ที่ครอบคลุมเพียงบางส่วนของช่วง` : "";
      normalizeMonthlyDailySort(records);
      if (!records.length) {
        note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} ยังไม่มีรายงานที่ครอบคลุมเต็มช่วง${partialNote}`;
        monthlyProductEmpty("ยังไม่มีข้อมูลรายวัน");
        return;
      }
      const hasRangeReport = records.some(({ bounds }) => dateKey(bounds.start) !== dateKey(bounds.end));
      const reportRows = sortMonthlyDailyRows(monthlyProductDailyRows(records), records);
      const totalMaximum = Math.max(0, ...reportRows.map(row => Number(row.totalWeight || 0)));
      const dailyMaximums = records.map((_, index) => Math.max(0, ...reportRows.map(row => Number(row.weights[index] || 0))));
      const pageSize = monthlyDailyPageSize();
      const pageCount = normalizeMonthlyDailyPage(records, pageSize);
      const pageStart = monthlyDailyPage * pageSize;
      const visibleRecords = records.slice(pageStart, pageStart + pageSize);
      const visibleRangeLabel = visibleRecords.length
        ? thaiDateRangeLabel(visibleRecords[0].bounds.start, visibleRecords.at(-1).bounds.end)
        : rangeLabel;
      const recordHeaders = visibleRecords.map((item, index) => {
        const { bounds } = item;
        const recordIndex = pageStart + index;
        const label = dateKey(bounds.start) === dateKey(bounds.end)
          ? String(bounds.end.getDate())
          : `${bounds.start.getDate()}-${bounds.end.getDate()}`;
        const sortKey = monthlyDailyRecordSortKey(item);
        return `<th class="monthly-day-${recordIndex % 7}" title="${xmlEscape(thaiDateRangeLabel(bounds.start, bounds.end))}">${monthlyDailySortButton(label, sortKey)}</th>`;
      }).join("");
      note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} · มีรายงาน ${records.length.toLocaleString("th-TH")} ไฟล์${partialNote}${hasRangeReport ? " · ไฟล์ที่ครอบคลุมหลายวันแสดงเป็นช่วงวันที่เพื่อไม่แบ่งยอดขายผิดวัน" : ""}`;
      const body = reportRows.map(row => `
        <tr>
          <td class="monthly-code">${xmlEscape(row.code)}</td>
          <td class="monthly-product">${xmlEscape(row.name)}</td>
          ${monthlyDailyWeightCell(row.totalWeight, totalMaximum, 0, true)}
          ${visibleRecords.map((_, index) => {
            const recordIndex = pageStart + index;
            return monthlyDailyWeightCell(row.weights[recordIndex], dailyMaximums[recordIndex], recordIndex);
          }).join("")}
        </tr>`).join("");
      const pager = pageCount > 1 ? `
        <div class="monthly-daily-pager" aria-label="เลื่อนดูวันที่ในรายงานสินค้า">
          <span class="monthly-daily-page-label">แสดงวันที่ ${xmlEscape(visibleRangeLabel)}</span>
          <button class="monthly-daily-page-button" type="button" data-monthly-daily-page="${monthlyDailyPage - 1}" title="แสดงวันก่อนหน้า" aria-label="แสดงวันก่อนหน้า"${monthlyDailyPage === 0 ? " disabled" : ""}>‹</button>
          <span class="monthly-daily-page-count">หน้า ${monthlyDailyPage + 1}/${pageCount}</span>
          <button class="monthly-daily-page-button" type="button" data-monthly-daily-page="${monthlyDailyPage + 1}" title="แสดงวันถัดไป" aria-label="แสดงวันถัดไป"${monthlyDailyPage >= pageCount - 1 ? " disabled" : ""}>›</button>
        </div>`
        : "";
      $("monthly-products-content").innerHTML = `
        ${pager}
        <div class="table-wrap monthly-daily-table-wrap">
          <table class="monthly-table monthly-table--daily">
            <thead><tr>
              <th class="monthly-code">Code</th>
              <th class="monthly-product">Product</th>
              <th class="monthly-total">${monthlyDailySortButton("Total (kg)", "total")}</th>
              ${recordHeaders}
            </tr></thead>
            <tbody>${body || `<tr><td class="empty" colspan="${visibleRecords.length + 3}">ไม่พบรายการสินค้า</td></tr>`}</tbody>
          </table>
        </div>`;
    }

    function renderMonthlyAggregateProducts(key, records, range, partial = []) {
      const note = $("monthly-products-note");
      const rangeLabel = thaiDateRangeLabel(range.start, range.end);
      const partialNote = partial.length ? ` · ไม่รวม ${partial.length.toLocaleString("th-TH")} ไฟล์ที่ครอบคลุมเพียงบางส่วนของช่วง` : "";
      if (!records.length) {
        note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} ยังไม่มีรายงานที่ครอบคลุมเต็มช่วง${partialNote}`;
        monthlyProductEmpty("ยังไม่มีข้อมูลรายเดือน");
        return;
      }
      const reportRows = monthlyProductAggregateRows(records);
      note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} · รวมยอดจากรายงาน ${records.length.toLocaleString("th-TH")} ไฟล์${partialNote}`;
      const body = reportRows.map(row => `
        <tr>
          <td class="monthly-code">${xmlEscape(row.code)}</td>
          <td class="monthly-product">${xmlEscape(row.name)}</td>
          <td class="num">${fmt(row.totalWeight)}</td>
          <td class="num monthly-revenue">${money(row.totalSales)}</td>
          <td class="num">${price(row.price)}</td>
          <td class="num">${money(row.cost)}</td>
          <td class="num">${money(row.averageProfit)}</td>
          <td class="num">${percent(row.gpi)}%</td>
        </tr>`).join("");
      $("monthly-products-content").innerHTML = `
        <div class="table-wrap">
          <table class="monthly-table">
            <thead><tr>
              <th class="monthly-code">Code</th>
              <th class="monthly-product">Product</th>
              <th>Sold (kg)</th>
              <th class="monthly-revenue">Sales (baht)</th>
              <th>Price</th>
              <th>Cost</th>
              <th>Average profit</th>
              <th>GPI</th>
            </tr></thead>
            <tbody>${body || '<tr><td class="empty" colspan="8">ไม่พบรายการสินค้า</td></tr>'}</tbody>
          </table>
        </div>`;
    }

    function monthlyDashboardSegments(records) {
      const salesByCode = new Map(monthlyProductDailyRows(records).map(row => [row.code, row]));
      const knownProducts = new Map(rows().map(row => [row.code, row]));
      const codes = new Set([...knownProducts.keys(), ...salesByCode.keys()]);
      const items = [...codes].map(code => {
        const sale = salesByCode.get(code);
        const known = knownProducts.get(code);
        return {
          code,
          name: productNameFor(code, sale?.name || known?.name),
          totalWeight: Number(sale?.totalWeight || 0),
          totalSales: Number(sale?.totalSales || 0)
        };
      });
      const sold = items.filter(item => item.totalWeight > 0)
        .sort((left, right) => right.totalWeight - left.totalWeight || left.code.localeCompare(right.code, "th"));
      const goodCount = Math.ceil(sold.length / 3);
      const mediumCount = Math.ceil(Math.max(0, sold.length - goodCount) / 2);
      const good = sold.slice(0, goodCount);
      const medium = sold.slice(goodCount, goodCount + mediumCount);
      const low = [
        ...sold.slice(goodCount + mediumCount),
        ...items.filter(item => item.totalWeight <= 0)
      ].sort((left, right) => left.totalWeight - right.totalWeight || left.code.localeCompare(right.code, "th"));
      return { good, medium, low };
    }

    function salesDashboardSegment(title, tone, items, maximum) {
      const body = items.length
        ? `<div class="table-wrap"><table class="sales-dashboard-table"><thead><tr><th>Code</th><th>Product</th><th>Total (kg)</th></tr></thead><tbody>${items.map(item => `
          <tr><td>${xmlEscape(item.code)}</td><td>${xmlEscape(item.name)}</td><td class="dashboard-product-weight bar-cell" style="--bar:${barWidth(item.totalWeight, maximum)}"><span>${fmt(item.totalWeight)}</span></td></tr>`).join("")}
        </tbody></table></div>`
        : '<div class="sales-dashboard-empty">ไม่มีรายการ</div>';
      return `<section class="sales-dashboard-segment sales-dashboard-segment--${tone}">
        <div class="sales-dashboard-heading"><h3>${title}</h3><span class="sales-dashboard-count">${items.length.toLocaleString("th-TH")} รายการ</span></div>
        ${body}
      </section>`;
    }

    function renderMonthlySalesDashboard(key, records, range, partial = []) {
      const note = $("monthly-products-note");
      const rangeLabel = thaiDateRangeLabel(range.start, range.end);
      const partialNote = partial.length ? ` · ไม่รวม ${partial.length.toLocaleString("th-TH")} ไฟล์ที่ครอบคลุมเพียงบางส่วนของช่วง` : "";
      if (!records.length) {
        note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} ยังไม่มีรายงานที่ครอบคลุมเต็มช่วง${partialNote}`;
        monthlyProductEmpty("ยังไม่มีข้อมูลสำหรับแดชบอร์ด");
        return;
      }
      const segments = monthlyDashboardSegments(records);
      const maximum = Math.max(0, ...[...segments.good, ...segments.medium, ...segments.low].map(item => item.totalWeight));
      note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} · มีรายงาน ${records.length.toLocaleString("th-TH")} ไฟล์${partialNote}`;
      $("monthly-products-content").innerHTML = `<div class="sales-dashboard">
        ${salesDashboardSegment("ขายดี", "good", segments.good, maximum)}
        ${salesDashboardSegment("ปานกลาง", "medium", segments.medium, maximum)}
        ${salesDashboardSegment("ขายไม่ดี", "low", segments.low, maximum)}
      </div>`;
    }

    function renderMonthlyProductReport() {
      const picker = $("monthly-products-month");
      if (!picker || !picker.value) return;
      const key = picker.value;
      const coverage = monthlyProductRecordCoverage(key);
      $("monthly-products-status").textContent = coverage.records.length
        ? `${thaiMonthLabel(key)} · ${coverage.records.length.toLocaleString("th-TH")} รายงาน`
        : `${thaiMonthLabel(key)} · ยังไม่มีรายงาน`;
      document.querySelectorAll("[data-monthly-mode]").forEach(button => {
        const isActive = button.dataset.monthlyMode === monthlyProductMode;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
      if (monthlyProductMode === "dashboard") {
        renderMonthlySalesDashboard(key, coverage.records, coverage.range, coverage.partial);
      } else {
        renderMonthlyDailyProducts(key, coverage.records, coverage.range, coverage.partial);
      }
    }

    function customerReportMonthKeys() {
      return [...new Set(customerDailyReports.map(report => String(report.d || "").slice(0, 7)).filter(Boolean))]
        .sort().reverse();
    }

    function refreshCustomerMonthPicker() {
      const picker = $("customers-month");
      if (!picker) return;
      const keys = customerReportMonthKeys();
      const current = picker.value || keys[0] || monthKey();
      picker.innerHTML = keys.map(key => `<option value="${key}">${thaiMonthLabel(key)}</option>`).join("");
      picker.value = keys.includes(current) ? current : (keys[0] || "");
    }

    function customerReportAvailableBounds(key = $("customers-month")?.value) {
      const dates = customerDailyReports
        .filter(report => !key || String(report.d || "").startsWith(`${key}-`))
        .map(report => dateFromKey(report.d))
        .filter(Boolean)
        .sort((left, right) => left - right);
      return dates.length ? { start: dates[0], end: dates[dates.length - 1] } : null;
    }

    function customerReportRangeBounds() {
      const available = customerReportAvailableBounds();
      if (!available) return null;
      const start = dateFromKey(customerReportRange.start);
      const end = dateFromKey(customerReportRange.end);
      const isAvailableRange = start && end && start <= end && start >= available.start && end <= available.end;
      return isAvailableRange ? { start, end } : available;
    }

    function setCustomerReportRange(start, end) {
      customerReportRange = { start: dateKey(start), end: dateKey(end) };
    }

    function refreshCustomerDatePickers() {
      const startInput = $("customers-start");
      const endInput = $("customers-end");
      const available = customerReportAvailableBounds();
      const range = customerReportRangeBounds();
      if (!startInput || !endInput || !available || !range) return;
      startInput.min = dateKey(available.start);
      startInput.max = dateKey(available.end);
      endInput.min = dateKey(available.start);
      endInput.max = dateKey(available.end);
      startInput.value = dateKey(range.start);
      endInput.value = dateKey(range.end);
    }

    function selectCustomerMonth(key) {
      const available = customerReportAvailableBounds(key);
      if (!available) return;
      setCustomerReportRange(available.start, available.end);
      refreshCustomerDatePickers();
      save();
      renderCustomerReport();
    }

    function applyCustomerReportRange() {
      const available = customerReportAvailableBounds();
      const start = dateFromKey($("customers-start").value);
      const end = dateFromKey($("customers-end").value);
      const isAvailableRange = available && start && end && start <= end && start >= available.start && end <= available.end;
      if (!isAvailableRange) {
        $("customers-note").textContent = "กรุณาเลือกช่วงวันที่ภายในข้อมูลรายงานลูกค้าที่มีอยู่";
        return;
      }
      setCustomerReportRange(start, end);
      save();
      renderCustomerReport();
    }

    function customerCalendarDays(range) {
      const days = [];
      const cursor = new Date(range.start);
      while (cursor <= range.end) {
        days.push(new Date(cursor));
        cursor.setDate(cursor.getDate() + 1);
      }
      return days;
    }

    function customerReportsForRange(range) {
      const start = dateKey(range.start);
      const end = dateKey(range.end);
      return customerDailyReports
        .filter(report => report.d >= start && report.d <= end)
        .sort((left, right) => left.d.localeCompare(right.d));
    }

    function customerDailyRows(days, reports) {
      const dayIndexes = new Map(days.map((day, index) => [dateKey(day), index]));
      const rowsByCustomer = new Map();
      reports.forEach(report => {
        const dayIndex = dayIndexes.get(report.d);
        if (dayIndex === undefined) return;
        (report.e || []).forEach(entry => {
          const code = String(entry.c || "").trim();
          const name = String(entry.n || "").trim();
          if (!name) return;
          const key = code || name;
          const row = rowsByCustomer.get(key) || {
            code,
            name,
            weights: Array(days.length).fill(0),
            totalWeight: 0,
            totalSales: 0
          };
          const weight = Number(entry.w || 0);
          const sales = Number(entry.a || 0);
          row.weights[dayIndex] += weight;
          row.totalWeight += weight;
          row.totalSales += sales;
          rowsByCustomer.set(key, row);
        });
      });
      return [...rowsByCustomer.values()];
    }

    function customerDailySortKey(day) {
      return `day:${dateKey(day)}`;
    }

    function customerDailySortIndicator(sortKey) {
      const isActive = customerDailySort.metric === sortKey;
      const icon = isActive ? (customerDailySort.direction === "asc" ? "↑" : "↓") : "↕";
      return `<span class="monthly-sort-indicator" aria-hidden="true">${icon}</span>`;
    }

    function customerDailySortButton(label, sortKey) {
      const isActive = customerDailySort.metric === sortKey;
      const directionLabel = isActive && customerDailySort.direction === "asc" ? "เรียงจากน้อยไปมาก" : "เรียงจากมากไปน้อย";
      return `<button class="monthly-daily-sort-button customer-daily-sort-button${isActive ? " is-active" : ""}" type="button" data-customer-sort-key="${xmlEscape(sortKey)}" title="${directionLabel}">${label}${customerDailySortIndicator(sortKey)}</button>`;
    }

    function normalizeCustomerDailySort(days = []) {
      const validKeys = new Set(["total", ...days.map(customerDailySortKey)]);
      if (!validKeys.has(customerDailySort.metric)) customerDailySort.metric = "total";
      if (!['asc', 'desc'].includes(customerDailySort.direction)) customerDailySort.direction = "desc";
    }

    function toggleCustomerDailySort(sortKey) {
      const direction = customerDailySort.metric === sortKey && customerDailySort.direction === "desc" ? "asc" : "desc";
      customerDailySort = { metric: sortKey, direction };
      save();
      renderCustomerReport();
    }

    function sortCustomerDailyRows(rows, days) {
      const dayIndex = days.findIndex(day => customerDailySortKey(day) === customerDailySort.metric);
      const multiplier = customerDailySort.direction === "asc" ? 1 : -1;
      return [...rows].sort((left, right) => {
        const leftValue = dayIndex >= 0 ? Number(left.weights[dayIndex] || 0) : Number(left.totalWeight || 0);
        const rightValue = dayIndex >= 0 ? Number(right.weights[dayIndex] || 0) : Number(right.totalWeight || 0);
        return ((leftValue - rightValue) * multiplier)
          || left.name.localeCompare(right.name, "th")
          || left.code.localeCompare(right.code, "th");
      });
    }

    function customerDayColorIndex(day) {
      return (day.getDay() + 6) % 7;
    }

    function customerDayHeader(day) {
      return String(day.getDate());
    }

    function customerDailyWeightCell(value, maximum, day, isTotal = false, hasReport = true) {
      const weight = Number(value || 0);
      const label = hasReport && weight > 0 ? fmt(weight) : "-";
      const colorClass = isTotal ? "customer-total" : `monthly-day-${customerDayColorIndex(day)}`;
      return `<td class="num bar-cell monthly-visual-cell ${colorClass}" style="--bar:${barWidth(weight, maximum)}"><span>${label}</span></td>`;
    }

    function customerDashboardSegment(title, tone, items, maximum) {
      const totalWeight = sum(items.map(item => Number(item.totalWeight || 0)));
      const body = items.length
        ? `<div class="table-wrap"><table class="sales-dashboard-table"><thead><tr><th>Customer Name</th><th>Phone Number</th><th>Total (kg)</th></tr></thead><tbody>${items.map(item => `
          <tr><td>${xmlEscape(item.name)}</td><td>${xmlEscape(item.code || "-")}</td><td class="dashboard-product-weight bar-cell" style="--bar:${barWidth(item.totalWeight, maximum)}"><span>${fmt(item.totalWeight)}</span></td></tr>`).join("")}
        </tbody></table></div>`
        : '<div class="sales-dashboard-empty">ไม่มีรายการ</div>';
      return `<section class="sales-dashboard-segment sales-dashboard-segment--${tone}">
        <div class="sales-dashboard-heading"><h3>${title}</h3><div class="sales-dashboard-heading-meta"><span class="sales-dashboard-count">${items.length.toLocaleString("th-TH")} ราย</span><span class="sales-dashboard-weight">${fmt(totalWeight)} กก.</span></div></div>${body}
      </section>`;
    }

    function renderCustomerDashboard(reportRows) {
      const sold = [...reportRows].sort((left, right) => right.totalWeight - left.totalWeight || left.name.localeCompare(right.name, "th"));
      const goodCount = Math.ceil(sold.length / 3);
      const mediumCount = Math.ceil(Math.max(0, sold.length - goodCount) / 2);
      const good = sold.slice(0, goodCount);
      const medium = sold.slice(goodCount, goodCount + mediumCount);
      const low = sold.slice(goodCount + mediumCount);
      const maximum = Math.max(0, ...sold.map(item => Number(item.totalWeight || 0)));
      const totalWeight = sum(sold.map(item => Number(item.totalWeight || 0)));
      $("customers-content").innerHTML = `<div class="sales-dashboard">
        <div class="customer-dashboard-summary"><span>ยอดรวมน้ำหนักทั้งหมด</span><strong>${fmt(totalWeight)} กก.</strong><span>${sold.length.toLocaleString("th-TH")} รายชื่อลูกค้า</span></div>
        ${customerDashboardSegment("ยอดซื้อสูง", "good", good, maximum)}
        ${customerDashboardSegment("ยอดซื้อปานกลาง", "medium", medium, maximum)}
        ${customerDashboardSegment("ยอดซื้อน้อย", "low", low, maximum)}
      </div>`;
    }

    function renderCustomerReport() {
      const status = $("customers-status");
      const note = $("customers-note");
      const content = $("customers-content");
      const range = customerReportRangeBounds();
      if (!status || !note || !content || !range) return;
      refreshCustomerDatePickers();
      const days = customerCalendarDays(range);
      const reports = customerReportsForRange(range);
      const reportDateKeys = new Set(reports.map(report => report.d));
      normalizeCustomerDailySort(days);
      const reportRows = sortCustomerDailyRows(customerDailyRows(days, reports), days);
      document.querySelectorAll("[data-customer-mode]").forEach(button => {
        const isActive = button.dataset.customerMode === customerReportMode;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
      status.textContent = reports.length ? `${thaiMonthLabel($("customers-month")?.value)} · ${reports.length.toLocaleString("th-TH")} รายงาน` : "ยังไม่มีรายงานลูกค้าในช่วงที่เลือก";
      note.innerHTML = `<strong>รายงานยอดขายตามลูกค้า</strong> · ช่วง ${xmlEscape(thaiDateRangeLabel(range.start, range.end))} · รวมจากรายงาน ${reports.length.toLocaleString("th-TH")} ไฟล์${reports.length ? ` · ${reportRows.length.toLocaleString("th-TH")} รายชื่อลูกค้า` : ""}`;
      if (customerReportMode === "dashboard") {
        renderCustomerDashboard(reportRows);
        return;
      }
      const totalMaximum = Math.max(0, ...reportRows.map(row => Number(row.totalWeight || 0)));
      const dailyMaximums = days.map((_, index) => Math.max(0, ...reportRows.map(row => Number(row.weights[index] || 0))));
      const dailyTotals = days.map((_, index) => sum(reportRows.map(row => Number(row.weights[index] || 0))));
      const totalWeight = sum(reportRows.map(row => Number(row.totalWeight || 0)));
      const dayHeaders = days.map(day => {
        const dayKey = dateKey(day);
        return `<th class="monthly-day-${customerDayColorIndex(day)}" title="${xmlEscape(thaiSingleDateLabel(day))}">${customerDailySortButton(customerDayHeader(day), customerDailySortKey(day))}</th>`;
      }).join("");
      const body = reportRows.map(row => `
        <tr>
          <td class="customer-name">${xmlEscape(row.name)}</td>
          <td class="customer-phone">${xmlEscape(row.code || "-")}</td>
          ${customerDailyWeightCell(row.totalWeight, totalMaximum, days[0], true)}
          ${row.weights.map((value, index) => customerDailyWeightCell(value, dailyMaximums[index], days[index], false, reportDateKeys.has(dateKey(days[index])))).join("")}
        </tr>`).join("");
      const footer = `
        <tfoot><tr>
          <th>ผลรวมทั้งหมด</th>
          <td class="customer-phone">-</td>
          <td class="customer-total">${fmt(totalWeight)}</td>
          ${days.map((day, index) => `<td>${reportDateKeys.has(dateKey(day)) ? fmt(dailyTotals[index]) : "-"}</td>`).join("")}
        </tr></tfoot>`;
      content.innerHTML = `
        <div class="table-wrap">
          <table class="monthly-table monthly-table--daily customer-table customer-table--daily">
            <thead><tr>
              <th class="customer-name">Customer Name</th>
              <th class="customer-phone">Phone Number</th>
              <th class="customer-total">${customerDailySortButton("Total (kg)", "total")}</th>
              ${dayHeaders}
            </tr></thead>
            <tbody>${body || `<tr><td class="empty" colspan="${days.length + 3}">ไม่พบข้อมูลรายชื่อลูกค้า</td></tr>`}</tbody>
            ${footer}
          </table>
        </div>`;
    }

    function weekOptionLabel(item) {
      const saved = item.savedAt ? new Date(item.savedAt) : todayDate();
      return `${reportingPeriodLabel(saved)} (${item.weekKey})`;
    }

    function refreshWeekPicker() {
      const picker = $("week-picker");
      const current = picker.value || selectedWeekKey || "current";
      const sorted = [...history].sort((a, b) => b.weekKey.localeCompare(a.weekKey));
      picker.innerHTML = [
        `<option value="current">ปัจจุบัน (${reportingPeriodLabel()})</option>`,
        ...sorted.map(item => `<option value="${xmlEscape(item.weekKey)}">${xmlEscape(weekOptionLabel(item))}</option>`)
      ].join("");
      selectedWeekKey = current === "current" || history.some(item => item.weekKey === current) ? current : "current";
      picker.value = selectedWeekKey;
    }

    function snapshotDataRows(item) {
      if (!item) return rows();
      return item.rows.map(row => {
        const previousSale = Number(row.previousSale ?? row.sale ?? 0);
        const currentSale = Number(row.currentSale ?? 0);
        const stock = Number(row.stock ?? 0);
        const cost = Number(row.cost ?? 0);
        const sellPrice = Number(row.sellPrice ?? cost);
        const previousSellPrice = Number(row.previousSellPrice ?? sellPrice);
        const currentSellPrice = Number(row.currentSellPrice ?? sellPrice);
        const previousSalesAmount = Number(row.previousSalesAmount ?? previousSale * previousSellPrice);
        const salesAmount = Number(row.salesAmount ?? currentSale * currentSellPrice);
        const previousProfit = Number(row.previousProfit ?? previousSale * (previousSellPrice - cost));
        const grossProfit = Number(row.grossProfit ?? currentSale * (currentSellPrice - cost));
        const previousGpi = Number(row.previousGpi ?? (previousSale > 0 && cost > 0 ? ((previousProfit / previousSale) / cost) * 100 : 0));
        const currentGpi = Number(row.currentGpi ?? (currentSale > 0 && cost > 0 ? ((grossProfit / currentSale) / cost) * 100 : 0));
        const gpi = Number(row.gpi ?? (currentSale > 0 ? currentGpi : previousGpi));
        return {
          code: row.code,
          name: productNameFor(row.code, row.name),
          group: row.group,
          days: row.days || [],
          sale: previousSale,
          previousSale,
          currentSale,
          stock,
          count: Number(row.count ?? 0),
          cost,
          sellPrice,
          previousSellPrice,
          currentSellPrice,
          previousSalesAmount,
          salesAmount,
          previousProfit,
          grossProfit,
          previousGpi,
          currentGpi,
          gpi,
          value: Number(row.value ?? stock * cost)
        };
      });
    }

    function selectedRows() {
      const snapshot = history.find(item => item.weekKey === selectedWeekKey);
      return snapshotDataRows(snapshot);
    }

    function selectedProfitKey() {
      return selectedWeekKey === "current" ? weekKey(todayDate()) : selectedWeekKey;
    }

    function previousProfitTotal(data = selectedRows()) {
      const snapshot = history.find(item => item.weekKey === selectedWeekKey);
      const savedValue = snapshot?.previousProfitOverride ?? previousProfitOverrides[selectedProfitKey()];
      const parsed = Number(savedValue);
      return Number.isFinite(parsed) ? parsed : sum(data.map(row => row.previousProfit));
    }

    function setPreviousProfitTotal(value) {
      const parsed = num(value);
      const key = selectedProfitKey();
      previousProfitOverrides[key] = parsed;
      const snapshot = history.find(item => item.weekKey === selectedWeekKey);
      if (snapshot) {
        snapshot.previousProfitOverride = parsed;
        saveHistory();
      }
      save();
      return parsed;
    }

    function isInactiveProduct(row) {
      return Number(row.stock || 0) > 0
        && Number(row.previousSale || 0) <= 0
        && Number(row.currentSale || 0) <= 0;
    }

    function saveCurrentWeek(note = "manual", snapshotDate = todayDate(), options = {}) {
      localStorage.removeItem(historyResetKey);
      const now = snapshotDate instanceof Date && !Number.isNaN(snapshotDate.getTime())
        ? new Date(snapshotDate)
        : todayDate();
      now.setHours(12, 0, 0, 0);
      const data = snapshotRows();
      const snapshot = {
        weekKey: weekKey(now),
        monthKey: monthKey(now),
        savedAt: now.toISOString(),
        note,
        previousProfitOverride: previousProfitOverrides[weekKey(now)],
        rows: data
      };
      const index = history.findIndex(item => item.weekKey === snapshot.weekKey);
      if (index >= 0) history[index] = snapshot;
      else history.push(snapshot);
      history.sort((a, b) => a.weekKey.localeCompare(b.weekKey));
      saveHistory();
      if (options.selectCurrent !== false) selectedWeekKey = "current";
      if (options.refresh !== false) {
        refreshMonthPicker();
        refreshWeekPicker();
        refreshSalesDatePicker();
        updateHistoryStatus();
      }
      return snapshot;
    }

    function uploadFileKind(file) {
      const name = String(file?.name || "").toLowerCase();
      const type = String(file?.type || "").toLowerCase();
      if (name.endsWith(".csv") || type === "text/csv") return "csv";
      if (name.endsWith(".xls") || name.endsWith(".xlsx") || type === "application/vnd.ms-excel" || type === "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet") return "excel";
      if (/\.jpe?g$/i.test(name) || type === "image/jpeg") return "jpeg";
      return "";
    }

    function ensureSupportedUploadFile(file) {
      const kind = uploadFileKind(file);
      if (!kind) throw new Error("รองรับไฟล์ CSV, Excel (.xls, .xlsx) และ JPEG (.jpg, .jpeg) เท่านั้น");
      return kind;
    }

    function detectedReportType(text = "", fileName = "", dataRows = []) {
      const source = norm(`${fileName}\n${text}`);
      const normalizedRows = (dataRows || []).slice(0, 40).map(row => row.map(norm));
      const rowContains = aliases => normalizedRows.some(row => aliases.some(alias => row.some(cell => cell === alias || cell.includes(alias))));
      const isCustomer = source.includes("ขายแยกตามลูกค้า")
        || (source.includes("รหัสลูกค้า") && source.includes("ชื่อลูกค้า"))
        || (rowContains(["รหัสลูกค้า", "customercode", "phonenumber"]) && rowContains(["ชื่อลูกค้า", "customername"]));
      if (isCustomer) return "customer";
      const isStock = source.includes("รายงานสินค้าคงเหลือ")
        || source.includes("สินค้าคงเหลือณวันที่")
        || source.includes("น้ำหนักสต็อกปัจจุบัน")
        || rowContains(["สต็อกปัจจุบัน", "น้ำหนักตามระบบ", "currentstock", "stockweight"]);
      if (isStock) return "stock";
      const isSales = source.includes("ขายแยกตามสินค้า")
        || source.includes("รายงานยอดขายแยกสินค้า")
        || source.includes("ยอดขายแยกสินค้า")
        || (rowContains(["รหัสสินค้า", "productcode", "sku"]) && rowContains(["ยอดขาย", "น้ำหนักขาย", "salesamount", "revenue"]));
      return isSales ? "sales" : "unknown";
    }

    function reportTypeLabel(type) {
      return type === "sales" ? "รายงานยอดขายสินค้า" : type === "stock" ? "รายงานสต๊อก" : type === "customer" ? "รายงานลูกค้า" : "ไม่ทราบประเภท";
    }

    function validateUploadedReport(file, expectedType, text = "", dataRows = []) {
      const detectedType = detectedReportType(text, file?.name, dataRows);
      if (detectedType === "unknown") {
        throw new Error("ตรวจสอบประเภทไฟล์ไม่ได้: ไม่พบชื่อรายงานหรือหัวตารางที่รองรับ");
      }
      if (detectedType !== expectedType) {
        throw new Error(`ไฟล์ผิดช่อง: พบ ${reportTypeLabel(detectedType)} แต่กำลังอัปโหลดในช่อง ${reportTypeLabel(expectedType)}`);
      }
      const hasDate = /\d{1,2}[./-]\d{1,2}[./-]\d{2,4}/.test(`${file?.name || ""}\n${text}`);
      if (!hasDate) throw new Error("ไม่พบวันที่รายงานในชื่อไฟล์หรือเนื้อหาไฟล์");
      const fileDate = uploadDateFromFileName(file);
      const rangeMatch = String(text || "").match(/ระหว่างวันที่\s*(\d{1,2}[./-]\d{1,2}[./-]\d{2,4})\s*ถึง\s*(\d{1,2}[./-]\d{1,2}[./-]\d{2,4})/i);
      const asOfMatch = String(text || "").match(/(?:ณ\s*วันที่|ข้อมูล\s*ณ)\s*(\d{1,2}[./-]\d{1,2}[./-]\d{2,4})/i);
      const reportStart = rangeMatch ? reportDate(rangeMatch[1]) : asOfMatch ? reportDate(asOfMatch[1]) : null;
      const reportEnd = rangeMatch ? reportDate(rangeMatch[2]) : reportStart;
      if (reportStart && reportEnd && reportStart > reportEnd) throw new Error("ช่วงวันที่ในรายงานไม่ถูกต้อง");
      if (reportStart && reportEnd && Math.floor((reportEnd - reportStart) / 86400000) > 31) throw new Error("ช่วงวันที่ในรายงานยาวเกิน 31 วัน");
      if (fileDate && reportStart && reportEnd && (fileDate < reportStart || fileDate > reportEnd)) {
        throw new Error(`วันที่ในชื่อไฟล์ ${dateKey(fileDate)} ไม่ตรงกับช่วงวันที่ในรายงาน ${dateKey(reportStart)} ถึง ${dateKey(reportEnd)}`);
      }
      return detectedType;
    }

    function showUploadResults(uploads, failures, type) {
      const container = $("upload-results");
      if (!container) return;
      const successRows = uploads.map(upload => `
        <div class="upload-result"><i data-lucide="circle-check" aria-hidden="true"></i><span class="upload-result-name">${xmlEscape(upload.file?.name || "ไฟล์")}</span><span class="upload-result-message">ผ่าน · ${reportTypeLabel(type)}</span></div>`);
      const failureRows = failures.map(item => `
        <div class="upload-result upload-result--error"><i data-lucide="circle-x" aria-hidden="true"></i><span class="upload-result-name">${xmlEscape(item.file?.name || "ไฟล์")}</span><span class="upload-result-message">ไม่ผ่าน · ${xmlEscape(item.message || "ข้อมูลไม่ถูกต้อง")}</span></div>`);
      container.innerHTML = [...successRows, ...failureRows].join("");
      if (window.lucide) window.lucide.createIcons();
    }

    function decodeFileText(buffer) {
      const utf8 = new TextDecoder("utf-8").decode(buffer);
      if (!utf8.includes("�")) return utf8;
      try {
        return new TextDecoder("windows-874").decode(buffer);
      } catch (_) {
        return utf8;
      }
    }

    async function readExcelFile(file) {
      if (!window.XLSX?.read || !window.XLSX?.utils?.sheet_to_json) {
        throw new Error("ไม่สามารถเปิดตัวอ่าน Excel ได้ กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วเปิดหน้านี้ใหม่");
      }

      let workbook;
      try {
        workbook = window.XLSX.read(await file.arrayBuffer(), { type: "array", cellText: true, cellDates: false });
      } catch (error) {
        throw new Error(`อ่านไฟล์ Excel ไม่ได้: ${error.message || "รูปแบบไฟล์ไม่ถูกต้อง"}`);
      }

      const dataRows = [];
      const textParts = [];
      (workbook.SheetNames || []).forEach(sheetName => {
        const sheet = workbook.Sheets?.[sheetName];
        if (!sheet) return;
        const sheetRows = window.XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: "" })
          .filter(row => row.some(cell => String(cell ?? "").trim()));
        if (!sheetRows.length) return;
        dataRows.push(...sheetRows);
        textParts.push(sheetName, ...sheetRows.map(row => row.join(" ")));
      });

      if (dataRows.length < 2) throw new Error("ไฟล์ Excel ไม่มีข้อมูลตารางที่อ่านได้");
      return { dataRows, text: textParts.join("\n") };
    }

    function shouldCountStockAsSales(file) {
      return true;
    }

    function hasReportedSalesForDate(date) {
      const key = dateKey(date);
      return salesLedger.some(record => record.start === key
        && record.end === key
        && salesReportSourcePriority(record.source) >= salesReportSourcePriority("stock-derived"));
    }

    function storeStockDerivedSales(date, entries) {
      if (hasReportedSalesForDate(date)) return false;
      storeSalesReport({ start: date, end: date }, entries, "stock-derived");
      return true;
    }

    function uploadDateFromFileName(file) {
      const match = String(file?.name || "").match(/\d{1,2}[./-]\d{1,2}[./-]\d{2,4}/);
      return match ? reportDate(match[0]) : null;
    }

    function orderedUploadFiles(files) {
      return Array.from(files || [])
        .map((file, index) => ({ file, index, date: uploadDateFromFileName(file) }))
        .sort((left, right) => {
          if (left.date && right.date) {
            const difference = left.date - right.date;
            if (difference) return difference;
          } else if (left.date) {
            return -1;
          } else if (right.date) {
            return 1;
          }
          return left.index - right.index;
        })
        .map(item => item.file);
    }

    function importedSalesRange(uploads, target) {
      const ranges = uploads
        .filter(upload => upload.result?.target === target && upload.result?.range)
        .map(upload => ({
          start: dateFromKey(upload.result.range.start),
          end: dateFromKey(upload.result.range.end)
        }))
        .filter(range => range.start && range.end);
      if (!ranges.length) return null;
      return {
        start: new Date(Math.min(...ranges.map(range => range.start.getTime()))),
        end: new Date(Math.max(...ranges.map(range => range.end.getTime())))
      };
    }

    function storeCustomerDailyReport(date, entries) {
      const day = dateKey(date);
      const byCustomer = new Map();
      entries.forEach(entry => {
        const phone = String(entry.c || "").replace(/[^0-9+]/g, "").trim();
        const name = String(entry.n || "").trim();
        if (!name) return;
        const key = phone || name.toLowerCase();
        const current = byCustomer.get(key) || { c: phone, n: name, w: 0, a: 0 };
        current.n = name || current.n;
        current.w += Number(entry.w || 0);
        current.a += Number(entry.a || 0);
        byCustomer.set(key, current);
      });
      const normalized = [...byCustomer.values()].filter(entry => entry.w || entry.a);
      if (!normalized.length) throw new Error("ไม่พบข้อมูลยอดซื้อของลูกค้าในไฟล์");
      const index = customerDailyReports.findIndex(report => report.d === day);
      const record = { d: day, e: normalized };
      if (index >= 0) customerDailyReports[index] = record;
      else customerDailyReports.push(record);
      customerDailyReports.sort((left, right) => left.d.localeCompare(right.d));
      return record;
    }

    function importCustomerAlternatingRows(dataRows, text = "", fileName = "") {
      const entries = [];
      for (let rowIndex = 1; rowIndex < dataRows.length; rowIndex++) {
        const customerRow = dataRows[rowIndex] || [];
        const valueRow = dataRows[rowIndex - 1] || [];
        const numericValues = valueRow.map(numericCell).filter(value => value !== null);
        if (numericValues.length < 2) continue;

        const codeCell = customerRow.slice(0, 6).find(cell => {
          const value = String(cell ?? "").trim();
          return value && /^\d{3,12}$/.test(value.replace(/\.0$/, ""));
        });
        if (codeCell === undefined) continue;
        const code = String(codeCell).trim().replace(/\.0$/, "");
        const codeIndex = customerRow.indexOf(codeCell);
        const name = customerRow.slice(Math.max(0, codeIndex + 1), 14)
          .map(cell => String(cell ?? "").trim())
          .find(value => value && !/^\d+(?:\.\d+)?$/.test(value));
        if (!name) continue;

        const weight = Number(numericValues[0] || 0);
        const amount = Number(numericValues.at(-1) || 0);
        if (weight <= 0 && amount <= 0) continue;
        entries.push({ c: code, n: name, w: weight, a: amount });
      }
      if (!entries.length) return null;
      const reportDate = salesReportDateRange(text, fileName).end;
      const report = storeCustomerDailyReport(reportDate, entries);
      return { count: report.e.length, reportCount: 1, start: report.d, end: report.d };
    }

    function importCustomerRows(dataRows, text = "", fileName = "") {
      const rows = [...dataRows];
      const alternatingResult = importCustomerAlternatingRows(rows, text, fileName);
      if (alternatingResult) return alternatingResult;
      const headerRowIndex = rows.findIndex(row => row.some(cell => ["ชื่อลูกค้า", "รายชื่อลูกค้า", "customername", "customer"].includes(norm(cell))));
      if (headerRowIndex < 0) throw new Error("ไม่พบหัวตารางชื่อลูกค้า");
      const headers = rows[headerRowIndex].map(norm);
      const nameIdx = headerIndex(headers, ["ชื่อลูกค้า", "รายชื่อลูกค้า", "customername", "customer", "name"]);
      const phoneIdx = headerIndex(headers, ["เบอร์โทรศัพท์", "โทรศัพท์", "เบอร์ลูกค้า", "รหัสลูกค้า", "phone", "phonenumber", "mobile", "customercode", "code"]);
      const weightIdx = headerIndex(headers, ["น้ำหนัก", "น้ำหนักขาย", "น้ำหนักขายรวม", "ผลรวมกก", "ผลรวม(กก.)", "totalkg", "total(kg)", "weight", "qty", "quantity"]);
      const amountIdx = headerIndex(headers, ["ยอดขาย", "ยอดซื้อ", "ยอดเงิน", "salesamount", "amount", "revenue", "total"]);
      const dateIdx = headerIndex(headers, ["วันที่", "date", "reportdate"]);
      if (nameIdx < 0 || weightIdx < 0) throw new Error("ไม่พบคอลัมน์ชื่อลูกค้าและน้ำหนัก");
      const fallbackDate = salesReportDateRange(text, fileName).end;
      const entriesByDay = new Map();
      rows.slice(headerRowIndex + 1).forEach(row => {
        const name = String(row[nameIdx] || "").trim();
        const weight = num(row[weightIdx]);
        const amount = amountIdx >= 0 ? num(row[amountIdx]) : 0;
        if (!name || (!weight && !amount)) return;
        const rowDate = dateIdx >= 0 ? reportDate(row[dateIdx]) : null;
        const day = dateKey(rowDate || fallbackDate);
        const entries = entriesByDay.get(day) || [];
        entries.push({ c: phoneIdx >= 0 ? String(row[phoneIdx] || "").trim() : "", n: name, w: weight, a: amount });
        entriesByDay.set(day, entries);
      });
      if (!entriesByDay.size) throw new Error("ไม่พบข้อมูลลูกค้าที่นำเข้าได้");
      const reports = [...entriesByDay].map(([day, entries]) => storeCustomerDailyReport(dateFromKey(day), entries));
      return { count: sum(reports.map(report => report.e.length)), reportCount: reports.length, start: reports[0].d, end: reports.at(-1).d };
    }

    function importCustomerOcr(text, fileName = "") {
      const entries = [];
      String(text || "").split(/\r?\n/).forEach(rawLine => {
        const line = rawLine.replace(/\s+/g, " ").trim();
        const phoneMatch = line.match(/(?:\+66|0)[0-9\s-]{8,12}/);
        if (!phoneMatch) return;
        const numbers = ocrNumbers(line.replace(phoneMatch[0], " "));
        if (!numbers.length) return;
        const name = line.replace(phoneMatch[0], " ").replace(/-?\d[\d,.]*/g, " ").replace(/\s+/g, " ").trim();
        if (!name) return;
        entries.push({ c: phoneMatch[0], n: name, w: Number(numbers[0] || 0), a: Number(numbers.at(-1) || 0) });
      });
      const report = storeCustomerDailyReport(salesReportDateRange(text, fileName).end, entries);
      return { count: report.e.length, reportCount: 1, start: report.d, end: report.d };
    }

    async function handleCustomerFile(file) {
      const kind = ensureSupportedUploadFile(file);
      let text = "";
      let rows = null;
      if (kind === "csv") {
        text = decodeFileText(await file.arrayBuffer());
        rows = parseCsv(text);
      } else if (kind === "excel") {
        const excel = await readExcelFile(file);
        text = excel.text;
        rows = excel.dataRows;
      } else {
        text = await recognizeJpeg(file, "customer");
      }
      validateUploadedReport(file, "customer", text, rows || []);
      const result = rows ? importCustomerRows(rows, text, file.name) : importCustomerOcr(text, file.name);
      return { file, kind, result };
    }

    async function handleFile(file, type) {
      const kind = ensureSupportedUploadFile(file);
      const beforeStock = new Map(products.map(item => [item[0], Number(item[4] || 0)]));
      let text = "";
      let parsed = null;
      let result;

      if (kind === "csv" || kind === "excel") {
        if (kind === "csv") {
          const buffer = await file.arrayBuffer();
          text = decodeFileText(buffer);
          parsed = parseCsv(text);
        } else {
          $("status").textContent = `กำลังอ่านไฟล์ Excel ${type === "sales" ? "รายงานยอดขาย" : "สต๊อก"}: ${file.name}`;
          const excel = await readExcelFile(file);
          text = excel.text;
          parsed = excel.dataRows;
        }
        if (parsed.length < 2) throw new Error("ไฟล์ไม่มีข้อมูล");
      } else {
        $("status").textContent = `กำลังเตรียมอ่านภาพ JPEG ${type === "sales" ? "รายงานยอดขาย" : "สต๊อก"}: ${file.name}`;
        text = await recognizeJpeg(file, type);
      }

      validateUploadedReport(file, type, text, parsed || []);

      if (type === "sales") {
        result = parsed ? importSales(parsed, text, file.name) : importOcrSales(text, file.name);
      } else {
        const reportDate = stockReportDate(text, file.name);
        const countAsSales = shouldCountStockAsSales(file) && !hasReportedSalesForDate(reportDate);
        const derivedEntries = [];
        const count = parsed
          ? importStock(parsed, beforeStock, countAsSales, derivedEntries)
          : importOcrStock(text, beforeStock, countAsSales, derivedEntries);
        const storedDerivedSales = countAsSales ? storeStockDerivedSales(reportDate, derivedEntries) : false;
        stockAsOfLabel = `ข้อมูลสต็อก ณ ${thaiSingleDateLabel(reportDate)}`;
        $("stock-asof").textContent = stockAsOfLabel;
        result = {
          count,
          target: reportDate < salesWeekStart(todayDate()) ? "previous" : "current",
          stockDate: dateKey(reportDate),
          derivedWeight: sum(derivedEntries.map(entry => entry.saleWeight)),
          storedDerivedSales,
          usedSalesReport: !countAsSales
        };
      }
      return { file, kind, result };
    }

    async function handleFiles(files, type) {
      const queue = orderedUploadFiles(files);
      if (!queue.length) return;
      const label = type === "sales" ? "รายงานยอดขาย" : "สต๊อก";
      const uploads = [];
      const failures = [];

      for (let index = 0; index < queue.length; index++) {
        const file = queue[index];
        $("status").textContent = `กำลังอ่าน${label} ${index + 1}/${queue.length}: ${file.name}`;
        const rollback = {
          products: JSON.parse(JSON.stringify(products)),
          salesLedger: JSON.parse(JSON.stringify(salesLedger)),
          stockAsOfLabel,
          currentSalesWeekKey
        };
        try {
          const upload = await handleFile(file, type);
          uploads.push(upload);
          if (type === "stock" && upload.result?.stockDate) {
            // Preserve the inventory state at the real report date. Multiple
            // daily files in the same week replace that week's snapshot with
            // the latest imported day, while different weeks/months remain.
            const snapshotReportDate = dateFromKey(upload.result.stockDate);
            syncProductSalesForReportDate(snapshotReportDate);
            saveCurrentWeek(
              `import-stock:${file.name}`,
              snapshotReportDate,
              { refresh: false, selectCurrent: false }
            );
          }
        } catch (error) {
          // A parser can discover an invalid file after it has already created
          // products or ledger entries. Restore the state so a failed file can
          // never contaminate the next file in the same batch.
          products = rollback.products;
          salesLedger = rollback.salesLedger;
          stockAsOfLabel = rollback.stockAsOfLabel;
          currentSalesWeekKey = rollback.currentSalesWeekKey;
          $("stock-asof").textContent = stockAsOfLabel;
          failures.push({ file, message: error?.message || "อ่านไฟล์ไม่สำเร็จ" });
        }
      }

      showUploadResults(uploads, failures, type);

      if (!uploads.length) {
        const names = failures.map(item => item.file.name).slice(0, 3).join(", ");
        $("status").textContent = `ไม่สามารถนำเข้า${label}ได้${names ? `: ${names}` : ""}`;
        return;
      }

      if (type === "sales") {
        ["previous", "current"].forEach(target => {
          const range = importedSalesRange(uploads, target);
          if (range) setSalesRangeForTarget(target, range);
        });
        syncProductSalesFromLedger();
        if (uploads.some(upload => upload.result?.target === "previous")) {
          previousProfitOverrides[weekKey(todayDate())] = sum(analysisRows().map(row => row.previousProfit));
        }
      } else {
        syncProductSalesFromLedger();
      }

      save();
      if (type === "sales") {
        saveCurrentWeek(`import-${type}${uploads.length > 1 ? "-multiple" : ""}`);
      } else {
        selectedWeekKey = "current";
        refreshMonthPicker();
        refreshWeekPicker();
        updateHistoryStatus();
      }
      refreshSalesDatePicker();
      render();

      const count = sum(uploads.map(upload => Number(upload.result?.count || 0)));
      const failedNote = failures.length ? ` · ไม่สำเร็จ ${failures.length.toLocaleString("th-TH")} ไฟล์` : "";
      if (type === "stock") {
        const latestStockDate = uploads.at(-1)?.result?.stockDate;
        const derivedWeight = sum(uploads.map(upload => Number(upload.result?.derivedWeight || 0)));
        const usedSalesReports = uploads.filter(upload => upload.result?.usedSalesReport).length;
        const latestNote = latestStockDate ? ` · สต๊อกล่าสุด ${thaiSingleDateLabel(dateFromKey(latestStockDate))}` : "";
        const salesReportNote = usedSalesReports
          ? ` · ${usedSalesReports.toLocaleString("th-TH")} ไฟล์มีรายงานขายอยู่แล้ว จึงไม่คำนวณซ้ำจากสต๊อก`
          : "";
        const negativeRows = rows().filter(row => Number(row.stock || 0) < 0);
        const negativeWeight = sum(negativeRows.map(row => Number(row.stock || 0)));
        const negativeNote = negativeRows.length
          ? ` · ตรวจพบสต๊อกติดลบ ${negativeRows.length.toLocaleString("th-TH")} รายการ รวม ${fmt(negativeWeight)} กก. (ไม่นำส่วนต่ำกว่า 0 ไปคำนวณเป็นยอดขาย)`
          : "";
        $("status").textContent = `นำเข้าสต๊อก ${uploads.length.toLocaleString("th-TH")} ไฟล์แล้ว ${count.toLocaleString("th-TH")} รายการ${latestNote} · คำนวณส่วนต่างสต๊อกตามวันที่ในไฟล์ ${fmt(derivedWeight)} กก.${negativeNote}${salesReportNote}${failedNote}`;
        return;
      }

      const saleWeight = sum(uploads.map(upload => Number(upload.result?.saleWeight || 0)));
      const salesAmount = sum(uploads.map(upload => Number(upload.result?.salesAmount || 0)));
      const periods = ["previous", "current"].map(target => {
        const range = importedSalesRange(uploads, target);
        if (!range) return "";
        return `${target === "previous" ? "Last week" : "Week"} ${thaiDateRangeLabel(range.start, range.end)}`;
      }).filter(Boolean).join(" / ");
      const totals = saleWeight || salesAmount
        ? ` น้ำหนัก ${fmt(saleWeight)} กก. ยอดขาย ${money(salesAmount)} บาท`
        : "";
      const overlapping = [selectedSalesRangeBounds(), selectedCurrentSalesRangeBounds()]
        .flatMap(bounds => salesLedgerRangeCoverage(bounds).overlapping);
      const duplicateNote = overlapping.length
        ? ` · ตัดรายงานช่วงซ้ำ ${new Set(overlapping.map(record => `${record.start}:${record.end}`)).size.toLocaleString("th-TH")} ไฟล์`
        : "";
      $("status").textContent = `นำเข้ารายงานขาย ${uploads.length.toLocaleString("th-TH")} ไฟล์แล้ว ${count.toLocaleString("th-TH")} รายการ${periods ? ` · ${periods}` : ""}${totals}${duplicateNote}${failedNote}`;
    }

    async function handleCustomerFiles(files) {
      const queue = orderedUploadFiles(files);
      if (!queue.length) return;
      const uploads = [];
      const failures = [];
      for (let index = 0; index < queue.length; index++) {
        const file = queue[index];
        $("status").textContent = `กำลังอ่านรายงานลูกค้า ${index + 1}/${queue.length}: ${file.name}`;
        const rollback = JSON.parse(JSON.stringify(customerDailyReports));
        try {
          uploads.push(await handleCustomerFile(file));
        } catch (error) {
          customerDailyReports = rollback;
          failures.push({ file, message: error?.message || "อ่านไฟล์ไม่สำเร็จ" });
        }
      }
      showUploadResults(uploads, failures, "customer");
      if (!uploads.length) {
        const detail = failures[0]?.message || "ไม่พบข้อมูลที่อ่านได้";
        $("status").textContent = `ไม่สามารถนำเข้ารายงานลูกค้าได้: ${detail}`;
        return;
      }
      save();
      refreshCustomerMonthPicker();
      const latest = uploads.map(upload => upload.result?.end).filter(Boolean).sort().at(-1);
      if (latest) {
        const key = latest.slice(0, 7);
        const picker = $("customers-month");
        if (picker && [...picker.options].some(option => option.value === key)) picker.value = key;
        selectCustomerMonth(key);
      }
      renderCustomerReport();
      const count = sum(uploads.map(upload => upload.result?.count || 0));
      const failedNote = failures.length ? ` · ไม่สำเร็จ ${failures.length.toLocaleString("th-TH")} ไฟล์` : "";
      $("status").textContent = `นำเข้ารายงานลูกค้า ${uploads.length.toLocaleString("th-TH")} ไฟล์แล้ว ${count.toLocaleString("th-TH")} รายการ${failedNote}`;
    }

    let uploadBatchQueue = Promise.resolve();
    let pendingUploadBatches = 0;

    function setUploadControlsBusy(isBusy) {
      [$("sales-file"), $("stock-file"), $("customer-file")].forEach(input => {
        if (input) input.disabled = isBusy;
      });
    }

    function enqueueFiles(files, type) {
      // Copy FileList immediately because browsers may clear this live object
      // when another selection is made while the previous import is running.
      const selectedFiles = Array.from(files || []);
      if (!selectedFiles.length) return Promise.resolve();
      pendingUploadBatches += 1;
      setUploadControlsBusy(true);
      const task = uploadBatchQueue.then(() => type === "customer" ? handleCustomerFiles(selectedFiles) : handleFiles(selectedFiles, type));
      uploadBatchQueue = task.catch(() => {});
      return task.finally(() => {
        pendingUploadBatches = Math.max(0, pendingUploadBatches - 1);
        if (!pendingUploadBatches) setUploadControlsBusy(false);
      });
    }

    function sortValue(row, metric, mode = selectedFinancialPeriod()) {
      if (metric === "code" || metric === "name") return String(row[metric] || "");
      const metrics = ["price", "averageProfit", "gpi"].includes(metric) ? financialMetrics(row, mode) : null;
      if (metric === "price") return metrics.averageSellPrice;
      if (metric === "averageProfit") return metrics.averageProfit;
      if (metric === "gpi") return metrics.gp;
      return Number(row[metric] || 0);
    }

    function sortData(data, metric, direction = "desc", mode = selectedFinancialPeriod()) {
      const sorted = [...data];
      const multiplier = direction === "asc" ? 1 : -1;
      return sorted.sort((a, b) => {
        const left = sortValue(a, metric, mode);
        const right = sortValue(b, metric, mode);
        const comparison = typeof left === "string" || typeof right === "string"
          ? String(left).localeCompare(String(right), "th")
          : Number(left) - Number(right);
        return (comparison * multiplier) || a.code.localeCompare(b.code, "th");
      });
    }

    function setTableSort(prefix, metric, direction = "desc") {
      tableSortState[prefix] = { metric, direction };
      const select = $(`${prefix}-sort`);
      if (select) select.value = metric;
    }

    function toggleTableSort(prefix, metric) {
      const state = tableSortState[prefix] || { metric: "", direction: "desc" };
      const direction = state.metric === metric && state.direction === "desc" ? "asc" : "desc";
      setTableSort(prefix, metric, direction);
      render();
    }

    function xmlEscape(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function excelCell(value) {
      const isNumber = typeof value === "number" && Number.isFinite(value);
      const type = isNumber ? "Number" : "String";
      return `<Cell><Data ss:Type="${type}">${xmlEscape(isNumber ? value : value ?? "")}</Data></Cell>`;
    }

    function excelRow(values) {
      return `<Row>${values.map(excelCell).join("")}</Row>`;
    }

    function reportRows(data, mode = selectedFinancialPeriod()) {
      return data.map(row => {
        const metrics = financialMetrics(row, mode);
        return [
          row.code,
          row.name,
          qty(row.previousSale),
          qty(row.currentSale),
          qty(row.stock),
          Number(row.cost || 0),
          roundedPrice(metrics.averageSellPrice),
          Number(metrics.averageProfit),
          `${percent(metrics.gp)}%`
        ];
      });
    }

    function worksheet(name, rowsData) {
      const brandedRows = [[brandName], [""], ...rowsData];
      return `<Worksheet ss:Name="${xmlEscape(name)}"><Table>${brandedRows.map(excelRow).join("")}</Table></Worksheet>`;
    }

    function workbookXml(sheetList) {
      return `<?xml version="1.0" encoding="UTF-8"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:o="urn:schemas-microsoft-com:office:office"
 xmlns:x="urn:schemas-microsoft-com:office:excel"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:html="http://www.w3.org/TR/REC-html40">

    }

    function downloadBlob(blob, filename) {
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function downloadExcel(filename, workbook) {
      downloadBlob(new Blob([workbook], { type: "application/vnd.ms-excel;charset=utf-8" }), filename);
    }

    function canvasToJpegBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error("สร้างไฟล์ JPEG ไม่สำเร็จ"));
        }, "image/jpeg", 0.94);
      });
    }

    function jpegTrimText(ctx, value, maxWidth) {
      const text = String(value ?? "");
      if (ctx.measureText(text).width <= maxWidth) return text;
      let end = text.length;
      while (end > 0 && ctx.measureText(`${text.slice(0, end)}...`).width > maxWidth) end--;
      return end > 0 ? `${text.slice(0, end)}...` : "...";
    }

    function jpegDrawCell(ctx, value, x, y, width, height, options = {}) {
      const padding = options.padding ?? 9;
      const fontSize = options.fontSize ?? 17;
      const lineHeight = options.lineHeight ?? fontSize * 1.18;
      ctx.font = `${options.weight || 600} ${fontSize}px Tahoma, Arial, sans-serif`;
      const lines = String(value ?? "").split("\n").map(line => jpegTrimText(ctx, line, Math.max(1, width - (padding * 2))));
      ctx.fillStyle = options.background || "#ffffff";
      ctx.fillRect(x, y, width, height);
      ctx.strokeStyle = options.border || "#d3dee6";
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, width - 1, height - 1);
      ctx.fillStyle = options.color || "#000000";
      ctx.textBaseline = "middle";
      ctx.textAlign = options.align || "left";
      const textX = options.align === "right" ? x + width - padding : options.align === "center" ? x + (width / 2) : x + padding;
      const startY = y + (height / 2) - ((lines.length - 1) * lineHeight / 2);
      lines.forEach((line, index) => ctx.fillText(line, textX, startY + (index * lineHeight)));
    }

    function jpegProductColumns(previousTitle = `Last week\n${activePreviousWeekCompactLabel()}`, currentTitle = `Week\n${activeCurrentWeekCompactLabel()}`) {
      return [
        { key: "code", title: "Code", width: 150, align: "left" },
        { key: "name", title: "Product", width: 390, align: "left" },
        { key: "previousSale", title: previousTitle, width: 205, align: "right" },
        { key: "currentSale", title: currentTitle, width: 205, align: "right" },
        { key: "stock", title: "Stock", width: 165, align: "right" },
        { key: "cost", title: "Cost", width: 145, align: "right" },
        { key: "price", title: "Price", width: 170, align: "right" },
        { key: "averageProfit", title: "Average profit", width: 205, align: "right" },
        { key: "gpi", title: "GPI", width: 155, align: "right" }
      ];
    }

    function jpegProductRow(row, mode = selectedFinancialPeriod(), date = activeReportDate()) {
      const metrics = financialMetrics(row, mode, date);
      return {
        code: row.code,
        name: productNameFor(row.code, row.name),
        previousSale: fmt(row.previousSale),
        currentSale: fmt(row.currentSale),
        stock: fmt(row.stock),
        cost: money(row.cost),
        price: price(metrics.averageSellPrice),
        averageProfit: money(metrics.averageProfit),
        gpi: `${percent(metrics.gp)}%`,
        numericGpi: Number(metrics.gp || 0),
        numericAverageProfit: Number(metrics.averageProfit || 0),
        inactive: isInactiveProduct(row)
      };
    }

    function jpegCellBackground(key, row, rowIndex = 0) {
      if (key === "totalWeight") return "#eee9ff";
      if (key.startsWith("daily-")) return "#f1f8fe";
      if (key === "gpi") {
        if (Math.abs(row.numericGpi) < 0.000001) return "#ffe1e1";
        if (row.numericGpi < 10) return "#fff3bf";
        if (row.numericGpi > 10) return "#d9f7e2";
      }
      if (key === "averageProfit") {
        if (Math.abs(row.numericAverageProfit) < 0.000001) return "#ffe1e1";
        if (row.numericAverageProfit < 10) return "#fff3bf";
        if (row.numericAverageProfit > 10) return "#d9f7e2";
      }
      if (row.inactive) return "#ffe7e7";
      return {
        previousSale: "#fff6e8",
        currentSale: "#eaf7ff",
        stock: "#effaf1",
        cost: "#eef2f6",
        price: "#fff0f3"
      }[key] || (rowIndex % 2 === 0 ? "#ffffff" : "#f7fafc");
    }

    function createJpegReportCanvas(report) {
      const margin = 38;
      const titleHeight = 84;
      const subtitleHeight = 48;
      const summaryHeight = 106;
      const groupHeight = 44;
      const headerHeight = 66;
      const rowHeight = 42;
      const footerHeight = 52;
      const columns = report.columns;
      const tableWidth = columns.reduce((total, column) => total + column.width, 0);
      const cardsPerRow = report.summary.length <= 3 ? 3 : 4;
      const summaryRows = Math.max(1, Math.ceil(report.summary.length / cardsPerRow));
      const dataRows = report.groups.reduce((total, group) => total + Math.max(1, group.rows.length), 0);
      const imageWidth = tableWidth + (margin * 2);
      const imageHeight = (margin * 2) + titleHeight + subtitleHeight + (summaryRows * summaryHeight) + (report.groups.length * (groupHeight + headerHeight)) + (dataRows * rowHeight) + footerHeight;
      if (imageHeight <= 0 || imageHeight > 30000) throw new Error("รายงานยาวเกินกว่าที่จะสร้างเป็น JPEG ไฟล์เดียวได้");

      const canvas = document.createElement("canvas");
      canvas.width = imageWidth;
      canvas.height = imageHeight;
      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("เบราว์เซอร์ไม่รองรับการสร้าง JPEG");
      ctx.fillStyle = "#f1f5f8";
      ctx.fillRect(0, 0, imageWidth, imageHeight);

      let y = margin;
      ctx.fillStyle = "#176b9f";
      ctx.fillRect(margin, y, tableWidth, titleHeight);
      ctx.fillStyle = "#ffffff";
      ctx.font = "800 30px Tahoma, Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(brandName, imageWidth / 2, y + 28);
      ctx.font = "700 22px Tahoma, Arial, sans-serif";
      ctx.fillText(report.title, imageWidth / 2, y + 61);
      y += titleHeight;

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(margin, y, tableWidth, subtitleHeight);
      ctx.strokeStyle = "#d3dee6";
      ctx.strokeRect(margin + 0.5, y + 0.5, tableWidth - 1, subtitleHeight - 1);
      ctx.fillStyle = "#466174";
      ctx.font = "600 16px Tahoma, Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(jpegTrimText(ctx, report.subtitle, tableWidth - 24), imageWidth / 2, y + (subtitleHeight / 2));
      y += subtitleHeight;

      const summaryColors = ["#edf7fb", "#fff7eb", "#edf8ff", "#effaf3", "#fff1f3", "#f5f2ff", "#fff9df"];
      const summaryAccents = ["#2f83b8", "#ef8b2c", "#21a0c4", "#3d9861", "#d85b70", "#7357c7", "#d7a600"];
      const cardWidth = tableWidth / cardsPerRow;
      report.summary.forEach(([label, value, unit], index) => {
        const column = index % cardsPerRow;
        const row = Math.floor(index / cardsPerRow);
        const cardX = margin + (column * cardWidth);
        const cardY = y + (row * summaryHeight);
        const inset = 4;
        ctx.fillStyle = summaryColors[index % summaryColors.length];
        ctx.fillRect(cardX + inset, cardY + 8, cardWidth - (inset * 2), summaryHeight - 16);
        ctx.fillStyle = summaryAccents[index % summaryAccents.length];
        ctx.fillRect(cardX + inset, cardY + 8, 6, summaryHeight - 16);
        ctx.strokeStyle = "#d7e1e8";
        ctx.strokeRect(cardX + inset + 0.5, cardY + 8.5, cardWidth - (inset * 2) - 1, summaryHeight - 17);
        ctx.fillStyle = "#40596f";
        ctx.font = "700 15px Tahoma, Arial, sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillText(jpegTrimText(ctx, label, cardWidth - 38), cardX + 18, cardY + 32);
        ctx.fillStyle = "#123b57";
        ctx.font = "800 27px Tahoma, Arial, sans-serif";
        ctx.fillText(`${value}${unit ? ` ${unit}` : ""}`, cardX + 18, cardY + 69);
      });
      y += summaryRows * summaryHeight;

      report.groups.forEach(group => {
        ctx.fillStyle = "#eaf5f3";
        ctx.fillRect(margin, y, tableWidth, groupHeight);
        ctx.strokeStyle = "#bed6d1";
        ctx.strokeRect(margin + 0.5, y + 0.5, tableWidth - 1, groupHeight - 1);
        ctx.fillStyle = "#17806f";
        ctx.fillRect(margin, y, 7, groupHeight);
        ctx.fillStyle = "#123b4d";
        ctx.font = "800 20px Tahoma, Arial, sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillText(group.title, margin + 18, y + (groupHeight / 2));
        y += groupHeight;

        let x = margin;
        columns.forEach(column => {
          jpegDrawCell(ctx, column.title, x, y, column.width, headerHeight, { background: "#173f5f", color: "#ffffff", border: "#345b78", align: "center", weight: 800, fontSize: 15 });
          x += column.width;
        });
        y += headerHeight;

        const rowsToDraw = group.rows.length ? group.rows : [{ empty: true }];
        rowsToDraw.forEach((row, rowIndex) => {
          if (row.empty) {
            jpegDrawCell(ctx, "ไม่พบรายการสินค้า", margin, y, tableWidth, rowHeight, { background: "#ffffff", align: "center", color: "#788897", weight: 700 });
          } else {
            let cellX = margin;
            columns.forEach(column => {
              jpegDrawCell(ctx, row[column.key], cellX, y, column.width, rowHeight, {
                background: jpegCellBackground(column.key, row, rowIndex),
                align: column.align,
                weight: column.key === "name" || column.key === "gpi" || column.key === "averageProfit" ? 800 : 600,
                fontSize: 16
              });
              cellX += column.width;
            });
          }
          y += rowHeight;
        });
      });

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(margin, y, tableWidth, footerHeight);
      ctx.strokeStyle = "#d3dee6";
      ctx.strokeRect(margin + 0.5, y + 0.5, tableWidth - 1, footerHeight - 1);
      ctx.fillStyle = "#637887";
      ctx.font = "600 14px Tahoma, Arial, sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.fillText(`A AND C SHOP ERP  •  สร้างรายงาน ${new Date().toLocaleString("th-TH")}`, imageWidth - margin - 14, y + (footerHeight / 2));
