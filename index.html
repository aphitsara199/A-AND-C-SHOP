      $("stock-asof").textContent = stockAsOfLabel;
      resetReportsAfterDeletion("ลบข้อมูลทั้งระบบแล้ว · พร้อมให้อัปโหลดข้อมูลใหม่");
    }

    function restorePreviousWeekHistory() {
      if (localStorage.getItem(historyResetKey) === "1") return null;
      const snapshotDate = new Date(2026, 6, 12, 12, 0, 0);
      const restoredWeekKey = weekKey(snapshotDate);
      if (history.some(item => item.weekKey === restoredWeekKey)) return null;

      const savedReport = salesLedger.find(item => item.start === "2026-07-06" && item.end === "2026-07-11");
      const reportEntries = Array.isArray(savedReport?.entries) && savedReport.entries.length
        ? savedReport.entries
        : suppliedSalesReports.previous.map(([code, saleWeight, salesAmount]) => ({ code, saleWeight, salesAmount }));
      if (!reportEntries.length) return null;

      const salesByCode = new Map(reportEntries.map(entry => [String(entry.code || "").trim(), entry]));
      const snapshotRows = products.map(item => {
        const code = item[0];
        const entry = salesByCode.get(code);
        const currentSale = Number(entry?.saleWeight || 0);
        const salesAmount = Number(entry?.salesAmount || 0);
        const cost = Number(seedCostByCode.get(code) ?? item[6] ?? 0);
        const stock = Number(seedStockByCode.get(code) ?? item[4] ?? 0);
        const currentSellPrice = currentSale > 0
          ? salesAmount / currentSale
          : Number(item[9] || item[7] || cost);
        const grossProfit = salesAmount - (currentSale * cost);
        const averageProfit = currentSale > 0 ? grossProfit / currentSale : 0;
        const currentGpi = cost > 0 ? (averageProfit / cost) * 100 : 0;
        return {
          code,
          name: productNameFor(code, item[1]),
          group: item[2],
          sale: 0,
          currentSale,
          stock,
          cost,
          sellPrice: currentSellPrice,
          previousSellPrice: cost,
          currentSellPrice,
          previousSalesAmount: 0,
          salesAmount,
          previousProfit: 0,
          grossProfit,
          previousGpi: 0,
          currentGpi,
          gpi: currentGpi,
          value: stock * cost
        };
      });

      const snapshot = {
        weekKey: restoredWeekKey,
        monthKey: monthKey(snapshotDate),
        savedAt: snapshotDate.toISOString(),
        note: "restored-previous-week",
        rows: snapshotRows
      };
      history.push(snapshot);
      history.sort((a, b) => a.weekKey.localeCompare(b.weekKey));
      saveHistory();
      return snapshot;
    }

    function snapshotRows() {
      return rows().map(row => ({
        code: row.code,
        name: row.name,
        group: row.group,
        sale: qty(row.previousSale),
        currentSale: qty(row.currentSale),
        stock: qty(row.stock),
        cost: Number(row.cost.toFixed(2)),
        sellPrice: Number(row.sellPrice.toFixed(2)),
        previousSellPrice: Number(row.previousSellPrice.toFixed(6)),
        currentSellPrice: Number(row.currentSellPrice.toFixed(6)),
        previousSalesAmount: Number(row.previousSalesAmount.toFixed(2)),
        salesAmount: Number(row.salesAmount.toFixed(2)),
        previousProfit: Number(row.previousProfit.toFixed(2)),
        grossProfit: Number(row.grossProfit.toFixed(2)),
        previousGpi: Number(row.previousGpi.toFixed(2)),
        currentGpi: Number(row.currentGpi.toFixed(2)),
        gpi: Number(row.gpi.toFixed(2)),
        value: Number(row.value.toFixed(2))
      }));
    }

    function updateHistoryStatus() {
      const latest = history[history.length - 1];
      $("history-count").textContent = history.length
        ? `มีประวัติสะสม ${history.length} สัปดาห์`
        : "ยังไม่มีประวัติสะสม";
      $("history-status").textContent = latest
        ? `ล่าสุด: ${reportingPeriodLabel(new Date(latest.savedAt))} บันทึก ${new Date(latest.savedAt).toLocaleString("th-TH")}`
        : "เมื่ออัปโหลดข้อมูลหรือกดบันทึก ระบบจะเก็บข้อมูลไว้ใช้ทำรายงานรายเดือน";
    }

    function refreshMonthPicker() {
      const current = $("month-picker").value || monthKey();
      // The monthly history selector must also include months found in the
      // uploaded sales ledger. Previously it only read weekly snapshots, so a
      // fully uploaded older month could exist in reports but be absent here.
      const keys = monthlyProductsMonthKeys();
      $("month-picker").innerHTML = keys.map(key => `<option value="${key}">${thaiMonthLabel(key)}</option>`).join("");
      $("month-picker").value = keys.includes(current) ? current : keys[0];
      refreshMonthlyProductsMonthPicker();
    }

    function monthBounds(key) {
      const [year, month] = String(key || "").split("-").map(Number);
      if (!year || !month) return null;
      return {
        start: new Date(year, month - 1, 1),
        end: new Date(year, month, 0)
      };
    }

    function monthlyProductsMonthKeys() {
      const keys = new Set([monthKey(), ...history.map(item => item.monthKey).filter(Boolean)]);
      salesLedger.forEach(record => {
        const bounds = salesLedgerRecordBounds(record);
        if (!bounds) return;
        const cursor = new Date(bounds.start.getFullYear(), bounds.start.getMonth(), 1);
        const endMonth = new Date(bounds.end.getFullYear(), bounds.end.getMonth(), 1);
        while (cursor <= endMonth) {
          keys.add(monthKey(cursor));
          cursor.setMonth(cursor.getMonth() + 1);
        }
      });
      return [...keys].sort().reverse();
    }

    function refreshMonthlyProductsMonthPicker() {
      const picker = $("monthly-products-month");
      if (!picker) return;
      const current = picker.value || $("month-picker")?.value || monthKey();
      const keys = monthlyProductsMonthKeys();
      picker.innerHTML = keys.map(key => `<option value="${key}">${thaiMonthLabel(key)}</option>`).join("");
      picker.value = keys.includes(current) ? current : keys[0];
      refreshMonthlyProductsDatePickers();
    }

    function monthlyProductRangeBounds(key = $("monthly-products-month")?.value) {
      const bounds = monthBounds(key || monthKey());
      if (!bounds) return null;
      const start = dateFromKey(monthlyProductRange.start);
      const end = dateFromKey(monthlyProductRange.end);
      const isWithinMonth = start && end && start >= bounds.start && end <= bounds.end && start <= end;
      return isWithinMonth ? { start, end } : bounds;
    }

    function setMonthlyProductRange(start, end) {
      monthlyProductRange = { start: dateKey(start), end: dateKey(end) };
      monthlyDailyPage = 0;
    }

    function refreshMonthlyProductsDatePickers() {
      const monthPicker = $("monthly-products-month");
      const startInput = $("monthly-products-start");
      const endInput = $("monthly-products-end");
      if (!monthPicker || !startInput || !endInput || !monthPicker.value) return;
      const month = monthBounds(monthPicker.value);
      const range = monthlyProductRangeBounds(monthPicker.value);
      if (!month || !range) return;
      startInput.min = dateKey(month.start);
      startInput.max = dateKey(month.end);
      endInput.min = dateKey(month.start);
      endInput.max = dateKey(month.end);
      startInput.value = dateKey(range.start);
      endInput.value = dateKey(range.end);
    }

    function applyMonthlyProductsRange() {
      const key = $("monthly-products-month").value;
      const month = monthBounds(key);
      const start = dateFromKey($("monthly-products-start").value);
      const end = dateFromKey($("monthly-products-end").value);
      const isWithinMonth = month && start && end && start >= month.start && end <= month.end && start <= end;
      if (!isWithinMonth) {
        $("monthly-products-note").textContent = "กรุณาเลือกช่วงวันที่ภายในเดือนเดียวกันให้ถูกต้อง";
        return;
      }
      setMonthlyProductRange(start, end);
      setCustomerReportRange(start, end);
      refreshCustomerDatePickers();
      save();
      renderMonthlyProductReport();
    }

    function monthlyProductRecords(key) {
      const bounds = monthBounds(key);
      if (!bounds) return [];
      return salesLedger
        .map(record => ({ record, bounds: salesLedgerRecordBounds(record) }))
        .filter(item => item.bounds && item.bounds.start >= bounds.start && item.bounds.end <= bounds.end)
        .sort((a, b) => a.bounds.start - b.bounds.start || a.bounds.end - b.bounds.end);
    }

    function monthlyProductRecordCoverage(key) {
      const range = monthlyProductRangeBounds(key);
      const all = monthlyProductRecords(key);
      if (!range) return { all, records: all, partial: [], range: null };
      // Prefer the most detailed non-overlapping reports. This prevents an
      // incorrectly detected aggregate such as 3-14 from appearing beside the
      // authoritative daily report for day 3 and from being counted twice.
      const ledgerCoverage = salesLedgerRangeCoverage(range);
      const includedRecords = new Set(ledgerCoverage.included);
      const excludedRecords = new Set([...ledgerCoverage.partial, ...ledgerCoverage.overlapping]);
      const records = all.filter(item => includedRecords.has(item.record));
      const partial = all.filter(item => excludedRecords.has(item.record));
      return { all, records, partial, range };
    }

    function monthlyProductDailyRows(records) {
      const knownRows = new Map(rows().map(row => [row.code, row]));
      const byCode = new Map();
      records.forEach(({ record }, recordIndex) => {
        (record.entries || []).forEach(entry => {
          const code = String(entry.code || "").trim();
          if (!code) return;
          const known = knownRows.get(code);
          const current = byCode.get(code) || {
            code,
            name: productNameFor(code, entry.name || known?.name),
            group: known?.group || inferGroup("", code),
            cost: Number(known?.cost || 0),
            weights: Array(records.length).fill(0),
            totalWeight: 0,
            totalSales: 0
          };
          const weight = Number(entry.saleWeight || 0);
          const sales = Number(entry.salesAmount || 0);
          current.name = productNameFor(code, entry.name || current.name);
          current.weights[recordIndex] += weight;
          current.totalWeight += weight;
          current.totalSales += sales;
          byCode.set(code, current);
        });
      });
      const targetGroup = monthlyProductGroup === "chicken" ? "ไก่" : monthlyProductGroup === "pork" ? "หมู" : "";
      return [...byCode.values()]
        .filter(row => !targetGroup || row.group === targetGroup)
        .sort((a, b) => b.totalWeight - a.totalWeight || a.code.localeCompare(b.code, "th"));
    }

    function monthlyProductDisplayRecords(records, range) {
      const indexedRecords = records.map((item, recordIndex) => ({ ...item, recordIndex, hasReport: true }));
      if (!range || indexedRecords.some(({ bounds }) => dateKey(bounds.start) !== dateKey(bounds.end))) {
        return indexedRecords;
      }
      const recordsByDate = new Map(indexedRecords.map(item => [dateKey(item.bounds.start), item]));
      const displayRecords = [];
      const cursor = new Date(range.start);
      while (cursor <= range.end) {
        const day = new Date(cursor);
        displayRecords.push(recordsByDate.get(dateKey(day)) || {
          bounds: { start: day, end: day },
          recordIndex: -1,
          hasReport: false
        });
        cursor.setDate(cursor.getDate() + 1);
      }
      return displayRecords;
    }

    function monthlyProductDailyTotal(row, displayRecords) {
      return Number(sum(displayRecords.map(item => item.hasReport ? Number(row.weights[item.recordIndex] || 0) : 0)).toFixed(2));
    }

    function monthlyProductTotalDifference(row, displayRecords) {
      return Number((Number(row.totalWeight || 0) - monthlyProductDailyTotal(row, displayRecords)).toFixed(2));
    }

    function monthlyProductTotalMismatch(difference) {
      return Math.abs(Number(difference || 0)) >= 0.005;
    }

    function monthlyProductAggregateRows(records) {
      return monthlyProductDailyRows(records).map(row => {
        const metrics = salesMetricsForEntry({ saleWeight: row.totalWeight, salesAmount: row.totalSales }, row.cost);
        return {
          ...row,
          price: metrics.averageSellPrice,
          profit: metrics.profit,
          averageProfit: row.totalWeight > 0 ? metrics.profit / row.totalWeight : 0,
          gpi: metrics.gpi
        };
      });
    }

    function monthlyProductEmpty(message) {
      $("monthly-products-content").innerHTML = `<div class="monthly-empty-state">${xmlEscape(message)}</div>`;
    }

    function monthlyDailyRecordSortKey(item) {
      return `report:${item.record.start}:${item.record.end}`;
    }

    function monthlyDailySortIndicator(sortKey) {
      const isActive = monthlyDailySort.metric === sortKey;
      const icon = isActive ? (monthlyDailySort.direction === "asc" ? "↑" : "↓") : "↕";
      return `<span class="monthly-sort-indicator" aria-hidden="true">${icon}</span>`;
    }

    function monthlyDailySortButton(label, sortKey) {
      const isActive = monthlyDailySort.metric === sortKey;
      const directionLabel = isActive && monthlyDailySort.direction === "asc" ? "เรียงจากน้อยไปมาก" : "เรียงจากมากไปน้อย";
      return `<button class="monthly-daily-sort-button${isActive ? " is-active" : ""}" type="button" data-monthly-sort-key="${xmlEscape(sortKey)}" title="${directionLabel}">${xmlEscape(label)}${monthlyDailySortIndicator(sortKey)}</button>`;
    }

    function normalizeMonthlyDailySort(records = []) {
      const validKeys = new Set(["total", ...records.map(monthlyDailyRecordSortKey)]);
      if (!validKeys.has(monthlyDailySort.metric)) monthlyDailySort.metric = "total";
      if (!["asc", "desc"].includes(monthlyDailySort.direction)) monthlyDailySort.direction = "desc";
    }

    function toggleMonthlyDailySort(sortKey) {
      const direction = monthlyDailySort.metric === sortKey && monthlyDailySort.direction === "desc" ? "asc" : "desc";
      monthlyDailySort = { metric: sortKey, direction };
      save();
      renderMonthlyProductReport();
    }

    function sortMonthlyDailyRows(reportRows, records) {
      const recordIndex = records.findIndex(item => monthlyDailyRecordSortKey(item) === monthlyDailySort.metric);
      const multiplier = monthlyDailySort.direction === "asc" ? 1 : -1;
      return [...reportRows].sort((left, right) => {
        const leftValue = recordIndex >= 0 ? Number(left.weights[recordIndex] || 0) : Number(left.totalWeight || 0);
        const rightValue = recordIndex >= 0 ? Number(right.weights[recordIndex] || 0) : Number(right.totalWeight || 0);
        return ((leftValue - rightValue) * multiplier) || left.code.localeCompare(right.code, "th");
      });
    }

    function monthlyDailyWeightCell(value, maximum, columnIndex, isTotal = false, totalDifference = 0) {
      const weight = Number(value || 0);
      const label = weight > 0 ? fmt(weight) : "-";
      const colorClass = isTotal ? "monthly-total" : `monthly-day-${columnIndex % 7}`;
      const mismatch = isTotal && monthlyProductTotalMismatch(totalDifference);
      const mismatchClass = mismatch ? " monthly-total-mismatch" : "";
      const title = isTotal
        ? `Total ${fmt(weight)} กก. · รวมรายวัน ${fmt(weight - totalDifference)} กก.${mismatch ? ` · ต่าง ${fmt(totalDifference)} กก.` : ""}`
        : "";
      return `<td class="num bar-cell monthly-visual-cell ${colorClass}${mismatchClass}" style="--bar:${barWidth(weight, maximum)}"${title ? ` title="${xmlEscape(title)}"` : ""}><span>${label}</span></td>`;
    }

    function monthlyDailyPageSize() {
      const contentWidth = Number($("monthly-products-content")?.clientWidth || 0);
      const viewportWidth = typeof window === "undefined" ? 0 : Number(window.innerWidth || 0);
      const width = contentWidth || viewportWidth || 1180;
      const isCompact = width <= 900;
      const fixedWidth = isCompact ? 344 : 448;
      const preferredDayWidth = isCompact ? 74 : 86;
      const columns = Math.floor((width - fixedWidth) / preferredDayWidth);
      return Math.max(4, Math.min(12, columns));
    }

    function monthlyDailyPageCount(records, pageSize) {
      return Math.max(1, Math.ceil(records.length / pageSize));
    }

    function normalizeMonthlyDailyPage(records, pageSize) {
      const pageCount = monthlyDailyPageCount(records, pageSize);
      monthlyDailyPage = Math.max(0, Math.min(monthlyDailyPage, pageCount - 1));
      return pageCount;
    }

    function renderMonthlyDailyProducts(key, records, range, partial = []) {
      const note = $("monthly-products-note");
      const rangeLabel = thaiDateRangeLabel(range.start, range.end);
      const partialNote = partial.length ? ` · ไม่รวม ${partial.length.toLocaleString("th-TH")} ไฟล์ที่ครอบคลุมเพียงบางส่วนของช่วง` : "";
      normalizeMonthlyDailySort(records);
      if (!records.length) {
        note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} ยังไม่มีรายงานที่ครอบคลุมเต็มช่วง${partialNote}`;
        monthlyProductEmpty("ยังไม่มีข้อมูลรายวัน");
        return;
      }
      const hasRangeReport = records.some(({ bounds }) => dateKey(bounds.start) !== dateKey(bounds.end));
      const reportRows = sortMonthlyDailyRows(monthlyProductDailyRows(records), records);
      const totalMaximum = Math.max(0, ...reportRows.map(row => Number(row.totalWeight || 0)));
      const dailyMaximums = records.map((_, index) => Math.max(0, ...reportRows.map(row => Number(row.weights[index] || 0))));
      const displayRecords = monthlyProductDisplayRecords(records, range);
      const recordHeaders = displayRecords.map((item, columnIndex) => {
        const { bounds, recordIndex, hasReport } = item;
        const label = dateKey(bounds.start) === dateKey(bounds.end)
          ? String(bounds.end.getDate())
          : `${bounds.start.getDate()}-${bounds.end.getDate()}`;
        const heading = hasReport ? monthlyDailySortButton(label, monthlyDailyRecordSortKey(item)) : xmlEscape(label);
        return `<th class="monthly-day-${columnIndex % 7}" title="${xmlEscape(thaiDateRangeLabel(bounds.start, bounds.end))}">${heading}</th>`;
      }).join("");
      note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} · แสดงครบ ${displayRecords.length.toLocaleString("th-TH")} วัน · มีรายงาน ${records.length.toLocaleString("th-TH")} ไฟล์${partialNote}${hasRangeReport ? " · ไฟล์ที่ครอบคลุมหลายวันแสดงเป็นช่วงวันที่เพื่อไม่แบ่งยอดขายผิดวัน" : ""}`;
      const body = reportRows.map(row => {
        const totalDifference = monthlyProductTotalDifference(row, displayRecords);
        return `
          <tr>
            <td class="monthly-code">${xmlEscape(row.code)}</td>
            <td class="monthly-product">${xmlEscape(row.name)}</td>
            ${monthlyDailyWeightCell(row.totalWeight, totalMaximum, 0, true, totalDifference)}
            ${displayRecords.map((item, columnIndex) => {
            return item.hasReport
              ? monthlyDailyWeightCell(row.weights[item.recordIndex], dailyMaximums[item.recordIndex], columnIndex)
              : `<td class="num monthly-visual-cell monthly-day-${columnIndex % 7}"><span>-</span></td>`;
            }).join("")}
          </tr>`;
      }).join("");
      const totalWeightSum = sum(reportRows.map(row => Number(row.totalWeight || 0)));
      const visibleDailyTotals = displayRecords.map(item => item.hasReport
        ? sum(reportRows.map(row => Number(row.weights[item.recordIndex] || 0)))
        : null);
      const footerDailySum = sum(visibleDailyTotals.filter(value => value !== null));
      const footerDifference = Number((totalWeightSum - footerDailySum).toFixed(2));
      const footerMismatch = monthlyProductTotalMismatch(footerDifference);
      const footerTitle = `Total ${fmt(totalWeightSum)} กก. · รวมรายวัน ${fmt(footerDailySum)} กก.${footerMismatch ? ` · ต่าง ${fmt(footerDifference)} กก.` : ""}`;
      const footer = `<tfoot><tr>
        <th colspan="2">ผลรวมทั้งหมด</th>
        <td class="monthly-total${footerMismatch ? " monthly-total-mismatch" : ""}" title="${xmlEscape(footerTitle)}">${fmt(totalWeightSum)}</td>
        ${visibleDailyTotals.map(value => `<td>${value !== null && value > 0 ? fmt(value) : "-"}</td>`).join("")}
      </tr></tfoot>`;
      const tableMinimumWidth = Math.max(780, 448 + (displayRecords.length * 86));
      $("monthly-products-content").innerHTML = `
        <div class="table-wrap monthly-daily-table-wrap">
          <table class="monthly-table monthly-table--daily" style="min-width:${tableMinimumWidth}px">
            <thead><tr>
              <th class="monthly-code">Code</th>
              <th class="monthly-product">Product</th>
              <th class="monthly-total">${monthlyDailySortButton("Total (kg)", "total")}</th>
              ${recordHeaders}
            </tr></thead>
            <tbody>${body || `<tr><td class="empty" colspan="${displayRecords.length + 3}">ไม่พบรายการสินค้า</td></tr>`}</tbody>
            ${footer}
          </table>
        </div>`;
    }

    function renderMonthlyAggregateProducts(key, records, range, partial = []) {
      const note = $("monthly-products-note");
      const rangeLabel = thaiDateRangeLabel(range.start, range.end);
      const partialNote = partial.length ? ` · ไม่รวม ${partial.length.toLocaleString("th-TH")} ไฟล์ที่ครอบคลุมเพียงบางส่วนของช่วง` : "";
      if (!records.length) {
        note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} ยังไม่มีรายงานที่ครอบคลุมเต็มช่วง${partialNote}`;
        monthlyProductEmpty("ยังไม่มีข้อมูลรายเดือน");
        return;
      }
      const reportRows = monthlyProductAggregateRows(records);
      note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} · รวมยอดจากรายงาน ${records.length.toLocaleString("th-TH")} ไฟล์${partialNote}`;
      const body = reportRows.map(row => `
        <tr>
          <td class="monthly-code">${xmlEscape(row.code)}</td>
          <td class="monthly-product">${xmlEscape(row.name)}</td>
          <td class="num">${fmt(row.totalWeight)}</td>
          <td class="num monthly-revenue">${money(row.totalSales)}</td>
          <td class="num">${price(row.price)}</td>
          <td class="num">${money(row.cost)}</td>
          <td class="num">${money(row.averageProfit)}</td>
          <td class="num">${percent(row.gpi)}%</td>
        </tr>`).join("");
      $("monthly-products-content").innerHTML = `
        <div class="table-wrap">
          <table class="monthly-table">
            <thead><tr>
              <th class="monthly-code">Code</th>
              <th class="monthly-product">Product</th>
              <th>Sold (kg)</th>
              <th class="monthly-revenue">Sales (baht)</th>
              <th>Price</th>
              <th>Cost</th>
              <th>Average profit</th>
              <th>GPI</th>
            </tr></thead>
            <tbody>${body || '<tr><td class="empty" colspan="8">ไม่พบรายการสินค้า</td></tr>'}</tbody>
          </table>
        </div>`;
    }

    function monthlyDashboardSegments(records) {
      const salesByCode = new Map(monthlyProductDailyRows(records).map(row => [row.code, row]));
      const targetGroup = monthlyProductGroup === "chicken" ? "ไก่" : monthlyProductGroup === "pork" ? "หมู" : "";
      const knownProducts = new Map(rows()
        .filter(row => !targetGroup || row.group === targetGroup)
        .map(row => [row.code, row]));
      const codes = new Set([...knownProducts.keys(), ...salesByCode.keys()]);
      const items = [...codes].map(code => {
        const sale = salesByCode.get(code);
        const known = knownProducts.get(code);
        return {
          code,
          name: productNameFor(code, sale?.name || known?.name),
          totalWeight: Number(sale?.totalWeight || 0),
          totalSales: Number(sale?.totalSales || 0)
        };
      });
      const sold = items.filter(item => item.totalWeight > 0)
        .sort((left, right) => right.totalWeight - left.totalWeight || left.code.localeCompare(right.code, "th"));
      const goodCount = Math.ceil(sold.length / 3);
      const mediumCount = Math.ceil(Math.max(0, sold.length - goodCount) / 2);
      const good = sold.slice(0, goodCount);
      const medium = sold.slice(goodCount, goodCount + mediumCount);
      const low = [
        ...sold.slice(goodCount + mediumCount),
        ...items.filter(item => item.totalWeight <= 0)
      ].sort((left, right) => left.totalWeight - right.totalWeight || left.code.localeCompare(right.code, "th"));
      return { good, medium, low };
    }

    function salesDashboardSegment(title, tone, items, maximum) {
      const body = items.length
        ? `<div class="table-wrap"><table class="sales-dashboard-table"><thead><tr><th>Code</th><th>Product</th><th>Total (kg)</th></tr></thead><tbody>${items.map(item => `
          <tr><td>${xmlEscape(item.code)}</td><td>${xmlEscape(item.name)}</td><td class="dashboard-product-weight bar-cell" style="--bar:${barWidth(item.totalWeight, maximum)}"><span>${fmt(item.totalWeight)}</span></td></tr>`).join("")}
        </tbody></table></div>`
        : '<div class="sales-dashboard-empty">ไม่มีรายการ</div>';
      return `<section class="sales-dashboard-segment sales-dashboard-segment--${tone}">
        <div class="sales-dashboard-heading"><h3>${title}</h3><span class="sales-dashboard-count">${items.length.toLocaleString("th-TH")} รายการ</span></div>
        ${body}
      </section>`;
    }

    function renderMonthlySalesDashboard(key, records, range, partial = []) {
      const note = $("monthly-products-note");
      const rangeLabel = thaiDateRangeLabel(range.start, range.end);
      const partialNote = partial.length ? ` · ไม่รวม ${partial.length.toLocaleString("th-TH")} ไฟล์ที่ครอบคลุมเพียงบางส่วนของช่วง` : "";
      if (!records.length) {
        note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} ยังไม่มีรายงานที่ครอบคลุมเต็มช่วง${partialNote}`;
        monthlyProductEmpty("ยังไม่มีข้อมูลสำหรับแดชบอร์ด");
        return;
      }
      const segments = monthlyDashboardSegments(records);
      const maximum = Math.max(0, ...[...segments.good, ...segments.medium, ...segments.low].map(item => item.totalWeight));
      note.innerHTML = `<strong>${xmlEscape(thaiMonthLabel(key))}</strong> · ช่วง ${xmlEscape(rangeLabel)} · มีรายงาน ${records.length.toLocaleString("th-TH")} ไฟล์${partialNote}`;
      $("monthly-products-content").innerHTML = `<div class="sales-dashboard">
        ${salesDashboardSegment("ขายดี", "good", segments.good, maximum)}
        ${salesDashboardSegment("ปานกลาง", "medium", segments.medium, maximum)}
        ${salesDashboardSegment("ขายไม่ดี", "low", segments.low, maximum)}
      </div>`;
    }

    function renderMonthlyProductReport() {
      const picker = $("monthly-products-month");
      if (!picker || !picker.value) return;
      const key = picker.value;
      const coverage = monthlyProductRecordCoverage(key);
      $("monthly-products-status").textContent = coverage.records.length
        ? `${thaiMonthLabel(key)} · ${coverage.records.length.toLocaleString("th-TH")} รายงาน`
        : `${thaiMonthLabel(key)} · ยังไม่มีรายงาน`;
      document.querySelectorAll("[data-monthly-mode]").forEach(button => {
        const isActive = button.dataset.monthlyMode === monthlyProductMode;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
      document.querySelectorAll("[data-monthly-group]").forEach(button => {
        const isActive = button.dataset.monthlyGroup === monthlyProductGroup;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
      if (monthlyProductMode === "dashboard") {
        renderMonthlySalesDashboard(key, coverage.records, coverage.range, coverage.partial);
      } else {
        renderMonthlyDailyProducts(key, coverage.records, coverage.range, coverage.partial);
      }
    }

    function customerReportMonthKeys() {
      return [...new Set(customerDailyReports.map(report => String(report.d || "").slice(0, 7)).filter(Boolean))]
        .sort().reverse();
    }

    function refreshCustomerMonthPicker() {
      const picker = $("customers-month");
      if (!picker) return;
      const keys = customerReportMonthKeys();
      const current = picker.value || keys[0] || monthKey();
      picker.innerHTML = keys.map(key => `<option value="${key}">${thaiMonthLabel(key)}</option>`).join("");
      picker.value = keys.includes(current) ? current : (keys[0] || "");
    }

    function customerReportAvailableBounds(key = $("customers-month")?.value) {
      const dates = customerDailyReports
        .filter(report => !key || String(report.d || "").startsWith(`${key}-`))
        .map(report => dateFromKey(report.d))
        .filter(Boolean)
        .sort((left, right) => left - right);
      return dates.length ? { start: dates[0], end: dates[dates.length - 1] } : null;
    }

    function customerReportRangeBounds() {
      const available = customerReportAvailableBounds();
      if (!available) return null;
      const start = dateFromKey(customerReportRange.start);
      const end = dateFromKey(customerReportRange.end);
      const isAvailableRange = start && end && start <= end && start >= available.start && end <= available.end;
      return isAvailableRange ? { start, end } : available;
    }

    function setCustomerReportRange(start, end) {
      customerReportRange = { start: dateKey(start), end: dateKey(end) };
    }

    function refreshCustomerDatePickers() {
      const startInput = $("customers-start");
      const endInput = $("customers-end");
      const available = customerReportAvailableBounds();
      const range = customerReportRangeBounds();
      if (!startInput || !endInput || !available || !range) return;
      startInput.min = dateKey(available.start);
      startInput.max = dateKey(available.end);
      endInput.min = dateKey(available.start);
      endInput.max = dateKey(available.end);
      startInput.value = dateKey(range.start);
      endInput.value = dateKey(range.end);
    }

    function selectCustomerMonth(key) {
      const available = customerReportAvailableBounds(key);
      if (!available) return;
      setCustomerReportRange(available.start, available.end);
      refreshCustomerDatePickers();
      save();
      renderCustomerReport();
    }

    function applyCustomerReportRange() {
      const available = customerReportAvailableBounds();
      const start = dateFromKey($("customers-start").value);
      const end = dateFromKey($("customers-end").value);
      const isAvailableRange = available && start && end && start <= end && start >= available.start && end <= available.end;
      if (!isAvailableRange) {
        $("customers-note").textContent = "กรุณาเลือกช่วงวันที่ภายในข้อมูลรายงานลูกค้าที่มีอยู่";
        return;
      }
      setCustomerReportRange(start, end);
      setMonthlyProductRange(start, end);
      const monthlyPicker = $("monthly-products-month");
      if (monthlyPicker) monthlyPicker.value = monthKey(start);
      refreshMonthlyProductsDatePickers();
      save();
      renderCustomerReport();
    }

    function customerCalendarDays(range) {
      const days = [];
      const cursor = new Date(range.start);
      while (cursor <= range.end) {
        days.push(new Date(cursor));
        cursor.setDate(cursor.getDate() + 1);
      }
      return days;
    }

    function customerReportsForRange(range) {
      const start = dateKey(range.start);
      const end = dateKey(range.end);
      return customerDailyReports
        .filter(report => report.d >= start && report.d <= end)
        .sort((left, right) => left.d.localeCompare(right.d));
    }

    function productDailyTotalsForCustomerRange(days) {
      const totals = new Map();
      if (!days.length) return totals;
      const records = salesLedgerRangeCoverage({ start: days[0], end: days[days.length - 1] }).included;
      records.forEach(record => {
        const bounds = salesLedgerRecordBounds(record);
        if (!bounds || dateKey(bounds.start) !== dateKey(bounds.end)) return;
        totals.set(dateKey(bounds.start), {
          weight: sum((record.entries || []).map(entry => Number(entry.saleWeight || 0))),
          sales: sum((record.entries || []).map(entry => Number(entry.salesAmount || 0)))
        });
      });
      return totals;
    }

    function customerDailyRows(days, reports) {
      const dayIndexes = new Map(days.map((day, index) => [dateKey(day), index]));
      const rowsByCustomer = new Map();
      reports.forEach(report => {
        const dayIndex = dayIndexes.get(report.d);
        if (dayIndex === undefined) return;
        (report.e || []).forEach(entry => {
          const code = String(entry.c || "").trim();
          const name = String(entry.n || "").trim();
          if (!name) return;
          const key = code || name;
          const row = rowsByCustomer.get(key) || {
            code,
            name,
            weights: Array(days.length).fill(0),
            totalWeight: 0,
            totalSales: 0
          };
          const weight = Number(entry.w || 0);
          const sales = Number(entry.a || 0);
          row.weights[dayIndex] += weight;
          row.totalWeight += weight;
          row.totalSales += sales;
          rowsByCustomer.set(key, row);
        });
      });

      const productDailyTotals = productDailyTotalsForCustomerRange(days);
      const customerReportsByDate = new Map(reports.map(report => [report.d, report]));
      const reconciliation = {
        code: "",
        name: "ไม่ระบุลูกค้า",
        isReconciliation: true,
        weights: Array(days.length).fill(0),
        totalWeight: 0,
        totalSales: 0
      };
      let hasReconciliation = false;
      days.forEach((day, index) => {
        const key = dateKey(day);
        const customerReport = customerReportsByDate.get(key);
        const productTotal = productDailyTotals.get(key);
        if (!customerReport || !productTotal) return;
        const customerWeight = sum((customerReport.e || []).map(entry => Number(entry.w || 0)));
        const customerSales = sum((customerReport.e || []).map(entry => Number(entry.a || 0)));
        const weightDifference = Number((productTotal.weight - customerWeight).toFixed(2));
        const salesDifference = Number((productTotal.sales - customerSales).toFixed(2));
        if (Math.abs(weightDifference) < 0.005) return;
        reconciliation.weights[index] = weightDifference;
        reconciliation.totalWeight += weightDifference;
        reconciliation.totalSales += salesDifference;
        hasReconciliation = true;
      });
      if (hasReconciliation) {
        reconciliation.totalWeight = Number(reconciliation.totalWeight.toFixed(2));
        reconciliation.totalSales = Number(reconciliation.totalSales.toFixed(2));
        rowsByCustomer.set("__customer_reconciliation__", reconciliation);
      }
      return [...rowsByCustomer.values()];
    }

    function customerRowCount(rows) {
      return rows.filter(row => !row.isReconciliation).length;
    }

    function customerDailySortKey(day) {
      return `day:${dateKey(day)}`;
    }

    function customerDailySortIndicator(sortKey) {
      const isActive = customerDailySort.metric === sortKey;
      const icon = isActive ? (customerDailySort.direction === "asc" ? "↑" : "↓") : "↕";
      return `<span class="monthly-sort-indicator" aria-hidden="true">${icon}</span>`;
    }

    function customerDailySortButton(label, sortKey) {
      const isActive = customerDailySort.metric === sortKey;
      const directionLabel = isActive && customerDailySort.direction === "asc" ? "เรียงจากน้อยไปมาก" : "เรียงจากมากไปน้อย";
      return `<button class="monthly-daily-sort-button customer-daily-sort-button${isActive ? " is-active" : ""}" type="button" data-customer-sort-key="${xmlEscape(sortKey)}" title="${directionLabel}">${label}${customerDailySortIndicator(sortKey)}</button>`;
    }

    function normalizeCustomerDailySort(days = []) {
      const validKeys = new Set(["total", ...days.map(customerDailySortKey)]);
      if (!validKeys.has(customerDailySort.metric)) customerDailySort.metric = "total";
      if (!['asc', 'desc'].includes(customerDailySort.direction)) customerDailySort.direction = "desc";
    }

    function toggleCustomerDailySort(sortKey) {
      const direction = customerDailySort.metric === sortKey && customerDailySort.direction === "desc" ? "asc" : "desc";
      customerDailySort = { metric: sortKey, direction };
      save();
      renderCustomerReport();
    }

    function sortCustomerDailyRows(rows, days) {
      const dayIndex = days.findIndex(day => customerDailySortKey(day) === customerDailySort.metric);
      const multiplier = customerDailySort.direction === "asc" ? 1 : -1;
      return [...rows].sort((left, right) => {
        const leftValue = dayIndex >= 0 ? Number(left.weights[dayIndex] || 0) : Number(left.totalWeight || 0);
        const rightValue = dayIndex >= 0 ? Number(right.weights[dayIndex] || 0) : Number(right.totalWeight || 0);
        return ((leftValue - rightValue) * multiplier)
          || left.name.localeCompare(right.name, "th")
          || left.code.localeCompare(right.code, "th");
      });
    }

    function customerDayColorIndex(day) {
      return (day.getDay() + 6) % 7;
    }

    function customerDayHeader(day) {
      return String(day.getDate());
    }

    function customerDailyWeightCell(value, maximum, day, isTotal = false, hasReport = true) {
      const weight = Number(value || 0);
      const label = hasReport && weight > 0 ? fmt(weight) : "-";
      const colorClass = isTotal ? "customer-total" : `monthly-day-${customerDayColorIndex(day)}`;
      return `<td class="num bar-cell monthly-visual-cell ${colorClass}" style="--bar:${barWidth(weight, maximum)}"><span>${label}</span></td>`;
    }

    function customerDashboardSegment(title, tone, items, maximum) {
      const totalWeight = sum(items.map(item => Number(item.totalWeight || 0)));
      const customerCount = customerRowCount(items);
      const body = items.length
        ? `<div class="table-wrap"><table class="sales-dashboard-table"><thead><tr><th>Customer Name</th><th>Total (kg)</th></tr></thead><tbody>${items.map(item => `
          <tr><td>${xmlEscape(item.name)}</td><td class="dashboard-product-weight bar-cell" style="--bar:${barWidth(item.totalWeight, maximum)}"><span>${fmt(item.totalWeight)}</span></td></tr>`).join("")}
        </tbody></table></div>`
        : '<div class="sales-dashboard-empty">ไม่มีรายการ</div>';
      return `<section class="sales-dashboard-segment sales-dashboard-segment--${tone}">
        <div class="sales-dashboard-heading"><h3>${title}</h3><div class="sales-dashboard-heading-meta"><span class="sales-dashboard-count">${customerCount.toLocaleString("th-TH")} ราย</span><span class="sales-dashboard-weight">${fmt(totalWeight)} กก.</span></div></div>${body}
      </section>`;
    }

    function renderCustomerDashboard(reportRows) {
      const sold = [...reportRows].sort((left, right) => right.totalWeight - left.totalWeight || left.name.localeCompare(right.name, "th"));
      const goodCount = Math.ceil(sold.length / 3);
      const mediumCount = Math.ceil(Math.max(0, sold.length - goodCount) / 2);
      const good = sold.slice(0, goodCount);
      const medium = sold.slice(goodCount, goodCount + mediumCount);
      const low = sold.slice(goodCount + mediumCount);
      const maximum = Math.max(0, ...sold.map(item => Number(item.totalWeight || 0)));
      const totalWeight = sum(sold.map(item => Number(item.totalWeight || 0)));
      $("customers-content").innerHTML = `<div class="sales-dashboard">
        <div class="customer-dashboard-summary"><span>ยอดรวมน้ำหนักทั้งหมด</span><strong>${fmt(totalWeight)} กก.</strong><span>${customerRowCount(sold).toLocaleString("th-TH")} รายชื่อลูกค้า</span></div>
        ${customerDashboardSegment("ยอดซื้อสูง", "good", good, maximum)}
        ${customerDashboardSegment("ยอดซื้อปานกลาง", "medium", medium, maximum)}
        ${customerDashboardSegment("ยอดซื้อน้อย", "low", low, maximum)}
      </div>`;
    }

    function renderCustomerReport() {
      const status = $("customers-status");
      const note = $("customers-note");
      const content = $("customers-content");
      const range = customerReportRangeBounds();
      if (!status || !note || !content || !range) return;
      refreshCustomerDatePickers();
      const days = customerCalendarDays(range);
      const reports = customerReportsForRange(range);
      const reportDateKeys = new Set(reports.map(report => report.d));
      normalizeCustomerDailySort(days);
      const reportRows = sortCustomerDailyRows(customerDailyRows(days, reports), days);
      const customerCount = customerRowCount(reportRows);
      document.querySelectorAll("[data-customer-mode]").forEach(button => {
        const isActive = button.dataset.customerMode === customerReportMode;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
      status.textContent = reports.length ? `${thaiMonthLabel($("customers-month")?.value)} · ${reports.length.toLocaleString("th-TH")} รายงาน` : "ยังไม่มีรายงานลูกค้าในช่วงที่เลือก";
      note.innerHTML = `<strong>รายงานยอดขายตามลูกค้า</strong> · ช่วง ${xmlEscape(thaiDateRangeLabel(range.start, range.end))} · รวมจากรายงาน ${reports.length.toLocaleString("th-TH")} ไฟล์${reports.length ? ` · ${customerCount.toLocaleString("th-TH")} รายชื่อลูกค้า` : ""}`;
      if (customerReportMode === "dashboard") {
        renderCustomerDashboard(reportRows);
        return;
      }
      const totalMaximum = Math.max(0, ...reportRows.map(row => Number(row.totalWeight || 0)));
      const dailyMaximums = days.map((_, index) => Math.max(0, ...reportRows.map(row => Number(row.weights[index] || 0))));
      const dailyTotals = days.map((_, index) => sum(reportRows.map(row => Number(row.weights[index] || 0))));
      const totalWeight = sum(reportRows.map(row => Number(row.totalWeight || 0)));
      const dayHeaders = days.map(day => {
        const dayKey = dateKey(day);
        return `<th class="monthly-day-${customerDayColorIndex(day)}" title="${xmlEscape(thaiSingleDateLabel(day))}">${customerDailySortButton(customerDayHeader(day), customerDailySortKey(day))}</th>`;
      }).join("");
      const body = reportRows.map(row => `
        <tr${row.isReconciliation ? ' class="customer-reconciliation-row" title="ส่วนต่างระหว่างยอดขายตามสินค้าและยอดขายตามลูกค้า"' : ""}>
          <td class="customer-name">${xmlEscape(row.name)}</td>
          ${customerDailyWeightCell(row.totalWeight, totalMaximum, days[0], true)}
          ${row.weights.map((value, index) => customerDailyWeightCell(value, dailyMaximums[index], days[index], false, reportDateKeys.has(dateKey(days[index])))).join("")}
        </tr>`).join("");
      const footer = `
        <tfoot><tr>
          <th>ผลรวมทั้งหมด</th>
          <td class="customer-total">${fmt(totalWeight)}</td>
          ${days.map((day, index) => `<td>${reportDateKeys.has(dateKey(day)) ? fmt(dailyTotals[index]) : "-"}</td>`).join("")}
        </tr></tfoot>`;
      content.innerHTML = `
        <div class="table-wrap">
          <table class="monthly-table monthly-table--daily customer-table customer-table--daily">
            <thead><tr>
              <th class="customer-name">Customer Name</th>
              <th class="customer-total">${customerDailySortButton("Total (kg)", "total")}</th>
              ${dayHeaders}
            </tr></thead>
            <tbody>${body || `<tr><td class="empty" colspan="${days.length + 2}">ไม่พบข้อมูลรายชื่อลูกค้า</td></tr>`}</tbody>
            ${footer}
          </table>
        </div>`;
    }

    function weekOptionLabel(item) {
      const saved = item.savedAt ? new Date(item.savedAt) : todayDate();
      return `${reportingPeriodLabel(saved)} (${item.weekKey})`;
    }

    function renderWeekCalendar(selectedDate = todayDate(), viewDate = selectedDate) {
      const panel = $("week-calendar-panel");
      if (!panel || !(selectedDate instanceof Date) || Number.isNaN(selectedDate.getTime())) return;
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const firstDayOffset = new Date(year, month, 1).getDay();
      const lastDay = new Date(year, month + 1, 0).getDate();
      const selectedPeriod = reportingPeriodBounds(selectedDate);
      const dayNames = ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"];
      const cells = [
        ...dayNames.map(name => `<span class="week-calendar-day-name">${name}</span>`),
        ...Array.from({ length: firstDayOffset }, () => `<span class="week-calendar-day week-calendar-day--empty"></span>`),
        ...Array.from({ length: lastDay }, (_, index) => {
          const day = index + 1;
          const date = new Date(year, month, day);
          const dayKey = dateKey(date);
          const inSelectedWeek = calendarSelectionMode === "day"
            ? dayKey === selectedCalendarDayKey
            : calendarSelectionMode === "multi"
              ? selectedCalendarWeekKeys.includes(weekKey(date))
              : date >= selectedPeriod.start && date <= selectedPeriod.end;
          const isSelected = dayKey === dateKey(selectedDate);
          const classes = [
            "week-calendar-day",
            inSelectedWeek ? "week-calendar-day--selected-week" : "",
            isSelected ? "week-calendar-day--selected" : ""
          ].filter(Boolean).join(" ");
          return `<button type="button" class="${classes}" data-week-date="${dateKey(date)}" aria-label="${thaiSingleDateLabel(date)}">${day}</button>`;
        })
      ];
      panel.innerHTML = `<div class="week-calendar-title"><button type="button" class="week-calendar-nav" data-calendar-nav="-1" aria-label="เดือนก่อนหน้า">‹</button><span>${thaiMonths[month]} ${year + 543}</span><button type="button" class="week-calendar-nav" data-calendar-nav="1" aria-label="เดือนถัดไป">›</button></div><div class="week-calendar-grid">${cells.join("")}</div>`;
      panel.querySelectorAll("[data-calendar-nav]").forEach(button => {
        button.addEventListener("click", () => {
          const nextView = new Date(year, month + Number(button.dataset.calendarNav), 1);
          renderWeekCalendar(selectedDate, nextView);
        });
      });
      panel.querySelectorAll("[data-week-date]").forEach(button => {
        button.addEventListener("click", () => {
          selectWeekByDate(dateFromKey(button.dataset.weekDate));
          if (calendarSelectionMode !== "multi") {
            panel.hidden = true;
            $("week-calendar").setAttribute("aria-expanded", "false");
          }
        });
      });
    }

    function selectWeekByDate(selectedDate) {
      if (!selectedDate) return;
      const targetWeekKey = weekKey(selectedDate);
      const currentWeekKey = weekKey(todayDate());
      const snapshot = history.find(item => item.weekKey === targetWeekKey);
      if (calendarSelectionMode === "day") {
        selectedCalendarDayKey = dateKey(selectedDate);
        selectedCalendarWeekKeys = [];
        setSelectedCurrentSalesRange(selectedDate, selectedDate);
        syncProductSalesFromLedger();
        selectedWeekKey = "current";
      } else if (calendarSelectionMode === "multi") {
        if (!snapshot && targetWeekKey !== currentWeekKey) {
          $("history-status").textContent = `ยังไม่มีประวัติสำหรับ ${reportingPeriodLabel(selectedDate)}`;
          return;
        }
        selectedCalendarDayKey = "";
        selectedCalendarWeekKeys = selectedCalendarWeekKeys.includes(targetWeekKey)
          ? selectedCalendarWeekKeys.filter(key => key !== targetWeekKey)
          : [...selectedCalendarWeekKeys, targetWeekKey].sort();
        selectedWeekKey = selectedCalendarWeekKeys.length > 1 ? "multi" : (selectedCalendarWeekKeys[0] === currentWeekKey ? "current" : selectedCalendarWeekKeys[0] || "current");
      } else {
        selectedCalendarDayKey = "";
        selectedCalendarWeekKeys = [targetWeekKey];
      }
      if (calendarSelectionMode === "week" && targetWeekKey === currentWeekKey) {
        selectedWeekKey = "current";
      } else if (calendarSelectionMode === "week" && snapshot) {
        selectedWeekKey = targetWeekKey;
      } else if (calendarSelectionMode === "week") {
        selectedWeekKey = "current";
        $("history-status").textContent = `ยังไม่มีประวัติสำหรับ ${reportingPeriodLabel(selectedDate)}`;
      }
      $("week-calendar").textContent = selectedDate.toLocaleDateString("th-TH", { day: "2-digit", month: "short", year: "numeric" });
      $("week-picker").value = selectedWeekKey;
      $("week-calendar-label").textContent = calendarSelectionMode === "day"
        ? `วันเดียว: ${thaiSingleDateLabel(selectedDate)}`
        : calendarSelectionMode === "multi"
          ? `เลือกแล้ว ${selectedCalendarWeekKeys.length} สัปดาห์`
          : reportingPeriodLabel(selectedDate);
      renderWeekCalendar(selectedDate);
      refreshSalesDatePicker();
      render();
    }

    function refreshWeekPicker() {
      const picker = $("week-picker");
      const current = picker.value || selectedWeekKey || "current";
      const sorted = [...history].sort((a, b) => b.weekKey.localeCompare(a.weekKey));
      picker.innerHTML = [
        `<option value="current">ปัจจุบัน (${reportingPeriodLabel()})</option>`,
        ...sorted.map(item => `<option value="${xmlEscape(item.weekKey)}">${xmlEscape(weekOptionLabel(item))}</option>`)
      ].join("");
      selectedWeekKey = current === "multi" || current === "current" || history.some(item => item.weekKey === current) ? current : "current";
      picker.value = selectedWeekKey;
      const calendar = $("week-calendar");
      const calendarLabel = $("week-calendar-label");
      const selectedSnapshot = history.find(item => item.weekKey === selectedWeekKey);
      const selectedDate = selectedSnapshot?.savedAt ? new Date(selectedSnapshot.savedAt) : todayDate();
      if (calendar && !Number.isNaN(selectedDate.getTime())) {
        calendar.textContent = selectedDate.toLocaleDateString("th-TH", { day: "2-digit", month: "short", year: "numeric" });
      }
      if (calendarLabel) calendarLabel.textContent = reportingPeriodLabel(selectedDate);
      renderWeekCalendar(selectedDate);
    }

    function snapshotDataRows(item) {
      if (!item) return rows();
      return item.rows.map(row => {
        const previousSale = Number(row.previousSale ?? row.sale ?? 0);
        const currentSale = Number(row.currentSale ?? 0);
        const stock = Number(row.stock ?? 0);
        const cost = Number(row.cost ?? 0);
        const sellPrice = Number(row.sellPrice ?? cost);
        const previousSellPrice = Number(row.previousSellPrice ?? sellPrice);
        const currentSellPrice = Number(row.currentSellPrice ?? sellPrice);
        const previousSalesAmount = Number(row.previousSalesAmount ?? previousSale * previousSellPrice);
        const salesAmount = Number(row.salesAmount ?? currentSale * currentSellPrice);
        const previousProfit = Number(row.previousProfit ?? previousSale * (previousSellPrice - cost));
        const grossProfit = Number(row.grossProfit ?? currentSale * (currentSellPrice - cost));
        const previousGpi = Number(row.previousGpi ?? (previousSale > 0 && cost > 0 ? ((previousProfit / previousSale) / cost) * 100 : 0));
        const currentGpi = Number(row.currentGpi ?? (currentSale > 0 && cost > 0 ? ((grossProfit / currentSale) / cost) * 100 : 0));
        const gpi = Number(row.gpi ?? (currentSale > 0 ? currentGpi : previousGpi));
        return {
          code: row.code,
          name: productNameFor(row.code, row.name),
          group: row.group,
          days: row.days || [],
          sale: previousSale,
          previousSale,
          currentSale,
          stock,
          count: Number(row.count ?? 0),
          cost,
          sellPrice,
          previousSellPrice,
          currentSellPrice,
          previousSalesAmount,
          salesAmount,
          previousProfit,
          grossProfit,
          previousGpi,
          currentGpi,
          gpi,
          value: Number(row.value ?? stock * cost)
        };
      });
    }

    function selectedRows() {
      if (selectedWeekKey === "multi" && selectedCalendarWeekKeys.length) {
        const snapshots = selectedCalendarWeekKeys.map(key => history.find(item => item.weekKey === key)).filter(Boolean);
        const combined = new Map();
        snapshots.forEach(item => snapshotDataRows(item).forEach(row => {
          const current = combined.get(row.code) || { ...row, previousSale: 0, currentSale: 0, previousSalesAmount: 0, salesAmount: 0, previousProfit: 0, grossProfit: 0 };
          current.previousSale += Number(row.previousSale || 0);
          current.currentSale += Number(row.currentSale || 0);
          current.previousSalesAmount += Number(row.previousSalesAmount || 0);
          current.salesAmount += Number(row.salesAmount || 0);
          current.previousProfit += Number(row.previousProfit || 0);
          current.grossProfit += Number(row.grossProfit || 0);
          current.stock = row.stock;
          combined.set(row.code, current);
        }));
        return [...combined.values()];
      }
      const snapshot = history.find(item => item.weekKey === selectedWeekKey);
      return snapshotDataRows(snapshot);
    }

    function selectedProfitKey() {
      return selectedWeekKey === "current" ? weekKey(todayDate()) : selectedWeekKey;
    }

    function previousProfitTotal(data = selectedRows()) {
      const snapshot = history.find(item => item.weekKey === selectedWeekKey);
      const savedValue = snapshot?.previousProfitOverride ?? previousProfitOverrides[selectedProfitKey()];
      const parsed = Number(savedValue);
      return Number.isFinite(parsed) ? parsed : sum(data.map(row => row.previousProfit));
    }

    function setPreviousProfitTotal(value) {
      const parsed = num(value);
      const key = selectedProfitKey();
      previousProfitOverrides[key] = parsed;
      const snapshot = history.find(item => item.weekKey === selectedWeekKey);
      if (snapshot) {
        snapshot.previousProfitOverride = parsed;
        saveHistory();
      }
      save();
      return parsed;
    }

    function isInactiveProduct(row) {
      return Number(row.stock || 0) > 0
        && Number(row.previousSale || 0) <= 0
        && Number(row.currentSale || 0) <= 0;
    }

    function saveCurrentWeek(note = "manual", snapshotDate = todayDate(), options = {}) {
      localStorage.removeItem(historyResetKey);
      const now = snapshotDate instanceof Date && !Number.isNaN(snapshotDate.getTime())
        ? new Date(snapshotDate)
        : todayDate();
      now.setHours(12, 0, 0, 0);
      const data = snapshotRows();
      const snapshot = {
        weekKey: weekKey(now),
        monthKey: monthKey(now),
        savedAt: now.toISOString(),
        note,
        previousProfitOverride: previousProfitOverrides[weekKey(now)],
        rows: data
      };
      const index = history.findIndex(item => item.weekKey === snapshot.weekKey);
      if (index >= 0) history[index] = snapshot;
      else history.push(snapshot);
      history.sort((a, b) => a.weekKey.localeCompare(b.weekKey));
      saveHistory();
      if (options.selectCurrent !== false) selectedWeekKey = "current";
      if (options.refresh !== false) {
        refreshMonthPicker();
        refreshWeekPicker();
        refreshSalesDatePicker();
        updateHistoryStatus();
      }
      return snapshot;
    }

    function uploadFileKind(file) {
      const name = String(file?.name || "").toLowerCase();
      const type = String(file?.type || "").toLowerCase();
      if (name.endsWith(".csv") || type === "text/csv") return "csv";
      if (name.endsWith(".xls") || name.endsWith(".xlsx") || type === "application/vnd.ms-excel" || type === "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet") return "excel";
      return "";
    }

    function ensureSupportedUploadFile(file) {
      const kind = uploadFileKind(file);
      if (!kind) throw new Error("รองรับไฟล์ CSV และ Excel (.xls, .xlsx) เท่านั้น");
      return kind;
    }

    function detectedReportType(text = "", fileName = "", dataRows = []) {
      const source = norm(`${fileName}\n${text}`);
      const normalizedRows = (dataRows || []).slice(0, 40).map(row => row.map(norm));
      const rowContains = aliases => normalizedRows.some(row => aliases.some(alias => row.some(cell => cell === alias || cell.includes(alias))));
      const isCustomer = source.includes("ขายแยกตามลูกค้า")
        || (source.includes("รหัสลูกค้า") && source.includes("ชื่อลูกค้า"))
        || (rowContains(["รหัสลูกค้า", "customercode", "phonenumber"]) && rowContains(["ชื่อลูกค้า", "customername"]));
      if (isCustomer) return "customer";
      const isStock = source.includes("รายงานสินค้าคงเหลือ")
        || source.includes("สินค้าคงเหลือณวันที่")
        || source.includes("น้ำหนักสต็อกปัจจุบัน")
        || rowContains(["สต็อกปัจจุบัน", "น้ำหนักตามระบบ", "currentstock", "stockweight"]);
      if (isStock) return "stock";
      const isSales = source.includes("ขายแยกตามสินค้า")
        || source.includes("รายงานยอดขายแยกสินค้า")
        || source.includes("ยอดขายแยกสินค้า")
        || (rowContains(["รหัสสินค้า", "productcode", "sku"]) && rowContains(["ยอดขาย", "น้ำหนักขาย", "salesamount", "revenue"]));
      return isSales ? "sales" : "unknown";
    }

    function reportTypeLabel(type) {
      return type === "sales" ? "รายงานยอดขายสินค้า" : type === "stock" ? "รายงานสต๊อก" : type === "customer" ? "รายงานลูกค้า" : "ไม่ทราบประเภท";
    }

    function validateUploadedReport(file, expectedType, text = "", dataRows = []) {
      const detectedType = detectedReportType(text, file?.name, dataRows);
      if (detectedType === "unknown") {
        throw new Error("ตรวจสอบประเภทไฟล์ไม่ได้: ไม่พบชื่อรายงานหรือหัวตารางที่รองรับ");
      }
      if (detectedType !== expectedType) {
        throw new Error(`ไฟล์ผิดช่อง: พบ ${reportTypeLabel(detectedType)} แต่กำลังอัปโหลดในช่อง ${reportTypeLabel(expectedType)}`);
      }
      const hasDate = Boolean(compactReportDateRange(file?.name)
        || reportDates(`${file?.name || ""}\n${text}`).length);
      if (!hasDate) throw new Error("ไม่พบวันที่รายงานในชื่อไฟล์หรือเนื้อหาไฟล์");
      const fileDate = uploadDateFromFileName(file);
      const explicitRange = explicitTextReportRange(text);
      const reportStart = explicitRange?.start || null;
      const reportEnd = explicitRange?.end || null;
      if (reportStart && reportEnd && reportStart > reportEnd) throw new Error("ช่วงวันที่ในรายงานไม่ถูกต้อง");
      if (reportStart && reportEnd && Math.floor((reportEnd - reportStart) / 86400000) > 31) throw new Error("ช่วงวันที่ในรายงานยาวเกิน 31 วัน");
      if (fileDate && reportStart && reportEnd && (fileDate < reportStart || fileDate > reportEnd)) {
        throw new Error(`วันที่ในชื่อไฟล์ ${dateKey(fileDate)} ไม่ตรงกับช่วงวันที่ในรายงาน ${dateKey(reportStart)} ถึง ${dateKey(reportEnd)}`);
      }
      return detectedType;
    }

    function showUploadResults(uploads, failures, type) {
      const container = $("upload-results");
      if (!container) return;
      const successRows = uploads.map(upload => {
        const verification = upload.result?.verification;
        const verificationText = verification?.checked
          ? `ยอดตรง ${stockFmt(verification.actual)} กก.`
          : "ตรวจโครงสร้างแล้ว";
        return `
        <div class="upload-result"><i data-lucide="circle-check" aria-hidden="true"></i><span class="upload-result-name">${xmlEscape(upload.file?.name || "ไฟล์")}</span><span class="upload-result-message">ผ่าน · ${reportTypeLabel(type)} · ${verificationText}</span></div>`;
      });
      const failureRows = failures.map(item => `
        <div class="upload-result upload-result--error"><i data-lucide="circle-x" aria-hidden="true"></i><span class="upload-result-name">${xmlEscape(item.file?.name || "ไฟล์")}</span><span class="upload-result-message">ไม่ผ่าน · ${xmlEscape(item.message || "ข้อมูลไม่ถูกต้อง")}</span></div>`);
      container.innerHTML = [...successRows, ...failureRows].join("");
      if (window.lucide) window.lucide.createIcons();
