    function uploadVerificationNote(uploads) {
      const checked = uploads.filter(upload => upload.result?.verification?.checked).length;
      return checked ? ` · ตรวจยอดตรง ${checked.toLocaleString("th-TH")} ไฟล์` : "";
    }

    function decodeFileText(buffer) {
      const utf8 = new TextDecoder("utf-8").decode(buffer);
      if (!utf8.includes("�")) return utf8;
      try {
        return new TextDecoder("windows-874").decode(buffer);
      } catch (_) {
        return utf8;
      }
    }

    async function readExcelFile(file) {
      if (!window.XLSX?.read || !window.XLSX?.utils?.sheet_to_json) {
        throw new Error("ไม่สามารถเปิดตัวอ่าน Excel ได้ กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วเปิดหน้านี้ใหม่");
      }

      let workbook;
      try {
        workbook = window.XLSX.read(await file.arrayBuffer(), { type: "array", cellText: true, cellDates: false });
      } catch (error) {
        throw new Error(`อ่านไฟล์ Excel ไม่ได้: ${error.message || "รูปแบบไฟล์ไม่ถูกต้อง"}`);
      }

      const dataRows = [];
      const textParts = [];
      (workbook.SheetNames || []).forEach(sheetName => {
        const sheet = workbook.Sheets?.[sheetName];
        if (!sheet) return;
        const sheetRows = window.XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: "" })
          .filter(row => row.some(cell => String(cell ?? "").trim()));
        if (!sheetRows.length) return;
        dataRows.push(...sheetRows);
        textParts.push(sheetName, ...sheetRows.map(row => row.join(" ")));
      });

      if (dataRows.length < 2) throw new Error("ไฟล์ Excel ไม่มีข้อมูลตารางที่อ่านได้");
      return { dataRows, text: textParts.join("\n") };
    }

    function shouldCountStockAsSales(file) {
      return true;
    }

    function hasReportedSalesForDate(date) {
      const key = dateKey(date);
      return salesLedger.some(record => record.start === key
        && record.end === key
        && salesReportSourcePriority(record.source) >= salesReportSourcePriority("stock-derived"));
    }

    function storeStockDerivedSales(date, entries) {
      if (hasReportedSalesForDate(date)) return false;
      storeSalesReport({ start: date, end: date }, entries, "stock-derived");
      return true;
    }

    function uploadDateFromFileName(file) {
      const compactRange = compactReportDateRange(file?.name);
      if (compactRange) return compactRange.end;
      return reportDates(file?.name).at(-1) || null;
    }

    function orderedUploadFiles(files) {
      return Array.from(files || [])
        .map((file, index) => ({ file, index, date: uploadDateFromFileName(file) }))
        .sort((left, right) => {
          if (left.date && right.date) {
            const difference = left.date - right.date;
            if (difference) return difference;
          } else if (left.date) {
            return -1;
          } else if (right.date) {
            return 1;
          }
          return left.index - right.index;
        })
        .map(item => item.file);
    }

    function importedSalesRange(uploads, target) {
      const ranges = uploads
        .filter(upload => upload.result?.target === target && upload.result?.range)
        .map(upload => ({
          start: dateFromKey(upload.result.range.start),
          end: dateFromKey(upload.result.range.end)
        }))
        .filter(range => range.start && range.end);
      if (!ranges.length) return null;
      return {
        start: new Date(Math.min(...ranges.map(range => range.start.getTime()))),
        end: new Date(Math.max(...ranges.map(range => range.end.getTime())))
      };
    }

    function normalizeCustomerCode(value) {
      const compact = String(value ?? "").trim().replace(/\.0$/, "").replace(/[^0-9A-Za-z+_-]/g, "");
      if (!compact) return "";
      return compact.replace(/O/gi, "0").replace(/^[A-Za-z]+/, prefix => prefix.toUpperCase());
    }

    function looksLikeCustomerCode(value) {
      const source = String(value ?? "").trim().replace(/\.0$/, "");
      return /^(?:\+?[0-9O]{3,15}|[A-Za-z]{1,4}[-_]?[0-9O]{3,15})$/i.test(source);
    }

    function normalizeCustomerName(value) {
      return String(value ?? "").replace(/\s+/g, " ").trim();
    }

    function storeCustomerDailyReport(date, entries) {
      const day = dateKey(date);
      const byCustomer = new Map();
      entries.forEach(entry => {
        const phone = normalizeCustomerCode(entry.c);
        const name = canonicalCustomerName(phone, entry.n);
        if (!name) return;
        const key = phone || name.toLowerCase();
        const current = byCustomer.get(key) || { c: phone, n: name, w: 0, a: 0 };
        current.n = name || current.n;
        current.w += Number(entry.w || 0);
        current.a += Number(entry.a || 0);
        byCustomer.set(key, current);
      });
      const normalized = [...byCustomer.values()].filter(entry => entry.w || entry.a);
      if (!normalized.length) throw new Error("ไม่พบข้อมูลยอดซื้อของลูกค้าในไฟล์");
      const index = customerDailyReports.findIndex(report => report.d === day);
      const record = { d: day, e: normalized };
      if (index >= 0) customerDailyReports[index] = record;
      else customerDailyReports.push(record);
      customerDailyReports.sort((left, right) => left.d.localeCompare(right.d));
      return record;
    }

    function importCustomerAlternatingRows(dataRows, text = "", fileName = "") {
      const entries = [];
      for (let rowIndex = 1; rowIndex < dataRows.length; rowIndex++) {
        const customerRow = dataRows[rowIndex] || [];
        const valueRow = dataRows[rowIndex - 1] || [];
        const numericValues = valueRow.map(numericCell).filter(value => value !== null);
        if (numericValues.length < 2) continue;

        const codeCell = customerRow.slice(0, 6).find(looksLikeCustomerCode);
        if (codeCell === undefined) continue;
        const code = normalizeCustomerCode(codeCell);
        const codeIndex = customerRow.indexOf(codeCell);
        const name = customerRow.slice(Math.max(0, codeIndex + 1), 14)
          .map(cell => String(cell ?? "").trim())
          .find(value => value && !/^\d+(?:\.\d+)?$/.test(value));
        if (!name) continue;

        const weight = Number(numericValues[0] || 0);
        const amount = Number(numericValues.at(-1) || 0);
        if (weight <= 0 && amount <= 0) continue;
        entries.push({ c: code, n: name, w: weight, a: amount });
      }
      if (!entries.length) return null;
      const reportDate = salesReportDateRange(text, fileName).end;
      const report = storeCustomerDailyReport(reportDate, entries);
      return {
        count: report.e.length,
        reportCount: 1,
        start: report.d,
        end: report.d,
        saleWeight: sum(report.e.map(entry => Number(entry.w || 0))),
        salesAmount: sum(report.e.map(entry => Number(entry.a || 0)))
      };
    }

    function importCustomerRows(dataRows, text = "", fileName = "") {
      const rows = [...dataRows];
      const alternatingResult = importCustomerAlternatingRows(rows, text, fileName);
      if (alternatingResult) return alternatingResult;
      const headerRowIndex = rows.findIndex(row => row.some(cell => ["ชื่อลูกค้า", "รายชื่อลูกค้า", "customername", "customer"].includes(norm(cell))));
      if (headerRowIndex < 0) throw new Error("ไม่พบหัวตารางชื่อลูกค้า");
      const headers = rows[headerRowIndex].map(norm);
      const nameIdx = headerIndex(headers, ["ชื่อลูกค้า", "รายชื่อลูกค้า", "customername", "customer", "name"]);
      const phoneIdx = headerIndex(headers, ["เบอร์โทรศัพท์", "โทรศัพท์", "เบอร์ลูกค้า", "รหัสลูกค้า", "phone", "phonenumber", "mobile", "customercode", "code"]);
      const weightIdx = headerIndex(headers, ["น้ำหนัก", "น้ำหนักขาย", "น้ำหนักขายรวม", "ผลรวมกก", "ผลรวม(กก.)", "totalkg", "total(kg)", "weight", "qty", "quantity"]);
      const amountIdx = headerIndex(headers, ["ยอดขาย", "ยอดซื้อ", "ยอดเงิน", "salesamount", "amount", "revenue", "total"]);
      const dateIdx = headerIndex(headers, ["วันที่", "date", "reportdate"]);
      if (nameIdx < 0 || weightIdx < 0) throw new Error("ไม่พบคอลัมน์ชื่อลูกค้าและน้ำหนัก");
      const fallbackDate = salesReportDateRange(text, fileName).end;
      const entriesByDay = new Map();
      rows.slice(headerRowIndex + 1).forEach(row => {
        const name = normalizeCustomerName(row[nameIdx]);
        const weight = num(row[weightIdx]);
        const amount = amountIdx >= 0 ? num(row[amountIdx]) : 0;
        if (!name || (!weight && !amount)) return;
        const rowDate = dateIdx >= 0 ? reportDate(row[dateIdx]) : null;
        const day = dateKey(rowDate || fallbackDate);
        const entries = entriesByDay.get(day) || [];
        entries.push({ c: phoneIdx >= 0 ? normalizeCustomerCode(row[phoneIdx]) : "", n: name, w: weight, a: amount });
        entriesByDay.set(day, entries);
      });
      if (!entriesByDay.size) throw new Error("ไม่พบข้อมูลลูกค้าที่นำเข้าได้");
      const reports = [...entriesByDay].map(([day, entries]) => storeCustomerDailyReport(dateFromKey(day), entries));
      return {
        count: sum(reports.map(report => report.e.length)),
        reportCount: reports.length,
        start: reports[0].d,
        end: reports.at(-1).d,
        saleWeight: sum(reports.flatMap(report => report.e).map(entry => Number(entry.w || 0))),
        salesAmount: sum(reports.flatMap(report => report.e).map(entry => Number(entry.a || 0)))
      };
    }

    function importCustomerOcr(text, fileName = "") {
      const entries = [];
      String(text || "").split(/\r?\n/).forEach(rawLine => {
        const line = rawLine.replace(/\s+/g, " ").trim();
        // Customer codes in the source report are not always phone numbers:
        // examples include 41252, 9928, C000028, KC-0001 and 9-digit IDs.
        const codeMatch = line.match(/^\s*((?:[A-Z]{1,4}[-_]?)?[0-9O]{3,15})(?=\s|$)/i)
          || line.match(/(?:^|\s)((?:[A-Z]{1,4}[-_]?)?[0-9O]{3,15})(?=\s|$)/i)
          || line.match(/(?:\+66|0)[0-9\s-]{8,12}/);
        if (!codeMatch) return;
        const customerCode = normalizeCustomerCode(codeMatch[1] || codeMatch[0]);
        const remainingLine = line.replace(codeMatch[0], " ").replace(/\s+/g, " ").trim();
        const numbers = ocrNumbers(remainingLine);
        if (!numbers.length) return;
        const name = normalizeCustomerName(remainingLine.replace(/-?\d[\d,.]*/g, " "));
        if (!name) return;
        entries.push({ c: customerCode, n: name, w: Number(numbers[0] || 0), a: Number(numbers.at(-1) || 0) });
      });
      const grandTotalLine = String(text || "").split(/\r?\n/).find(line => /รวมทั้งสิ้น|grand\s*total/i.test(line));
      const expectedTotal = grandTotalLine ? Number(ocrNumbers(grandTotalLine)[0] || 0) : 0;
      const parsedTotal = Number(sum(entries.map(entry => entry.w)).toFixed(2));
      if (expectedTotal > 0 && Math.abs(parsedTotal - expectedTotal) > 0.05) {
        throw new Error(`อ่านน้ำหนักลูกค้าได้ ${fmt(parsedTotal)} กก. แต่ยอดรวมในรายงานคือ ${fmt(expectedTotal)} กก. กรุณาใช้ภาพที่คมชัดขึ้นหรือไฟล์ Excel`);
      }
      const report = storeCustomerDailyReport(salesReportDateRange(text, fileName).end, entries);
      return {
        count: report.e.length,
        reportCount: 1,
        start: report.d,
        end: report.d,
        saleWeight: sum(report.e.map(entry => Number(entry.w || 0))),
        salesAmount: sum(report.e.map(entry => Number(entry.a || 0)))
      };
    }

    async function handleCustomerFile(file) {
      const kind = ensureSupportedUploadFile(file);
      let text = "";
      let rows = [];
      if (kind === "csv") {
        text = decodeFileText(await file.arrayBuffer());
        rows = parseCsv(text);
      } else {
        const excel = await readExcelFile(file);
        text = excel.text;
        rows = excel.dataRows;
      }
      validateUploadedReport(file, "customer", text, rows);
      const result = importCustomerRows(rows, text, file.name);
      result.verification = verifyImportedWeight(text, result, "รายงานลูกค้า", { requireGrandTotal: kind === "excel" });
      return { file, kind, result };
    }

    async function handleFile(file, type) {
      const kind = ensureSupportedUploadFile(file);
      const beforeStock = new Map(products.map(item => [item[0], Number(item[4] || 0)]));
      let text = "";
      let parsed = null;
      let result;

      if (kind === "csv") {
        const buffer = await file.arrayBuffer();
        text = decodeFileText(buffer);
        parsed = parseCsv(text);
      } else {
        $("status").textContent = `กำลังอ่านไฟล์ Excel ${type === "sales" ? "รายงานยอดขาย" : "สต๊อก"}: ${file.name}`;
        const excel = await readExcelFile(file);
        text = excel.text;
        parsed = excel.dataRows;
      }
      if (parsed.length < 2) throw new Error("ไฟล์ไม่มีข้อมูล");

      validateUploadedReport(file, type, text, parsed);

      if (type === "sales") {
        result = importSales(parsed, text, file.name);
        result.verification = verifyImportedWeight(text, result, "รายงานสินค้า", { requireGrandTotal: kind === "excel" });
      } else {
        const reportDate = stockReportDate(text, file.name);
        const countAsSales = shouldCountStockAsSales(file) && !hasReportedSalesForDate(reportDate);
        const derivedEntries = [];
        const count = importStock(parsed, beforeStock, countAsSales, derivedEntries);
        const verification = verifyImportedStockWeight(text, { requireGrandTotal: kind === "excel" });
        const stockWeight = verification.actual;
        const storedDerivedSales = countAsSales ? storeStockDerivedSales(reportDate, derivedEntries) : false;
        stockAsOfLabel = `ข้อมูลสต็อก ณ ${thaiSingleDateLabel(reportDate)}`;
        $("stock-asof").textContent = stockAsOfLabel;
        result = {
          count,
          stockWeight,
          target: reportDate < salesWeekStart(todayDate()) ? "previous" : "current",
          stockDate: dateKey(reportDate),
          derivedWeight: sum(derivedEntries.map(entry => entry.saleWeight)),
          storedDerivedSales,
          usedSalesReport: !countAsSales,
          verification
        };
      }
      return { file, kind, result };
    }

    async function handleFiles(files, type) {
      const queue = orderedUploadFiles(files);
      if (!queue.length) return;
      const label = type === "sales" ? "รายงานยอดขาย" : "สต๊อก";
      const uploads = [];
      const failures = [];

      for (let index = 0; index < queue.length; index++) {
        const file = queue[index];
        $("status").textContent = `กำลังอ่าน${label} ${index + 1}/${queue.length}: ${file.name}`;
        const rollback = {
          products: JSON.parse(JSON.stringify(products)),
          salesLedger: JSON.parse(JSON.stringify(salesLedger)),
          stockAsOfLabel,
          currentSalesWeekKey,
          selectedSalesRange: { ...selectedSalesRange },
          selectedCurrentSalesRange: { ...selectedCurrentSalesRange }
        };
        try {
          const upload = await handleFile(file, type);
          uploads.push(upload);
          if (type === "stock" && upload.result?.stockDate) {
            // Preserve the inventory state at the real report date. Multiple
            // daily files in the same week replace that week's snapshot with
            // the latest imported day, while different weeks/months remain.
            const snapshotReportDate = dateFromKey(upload.result.stockDate);
            syncProductSalesForReportDate(snapshotReportDate);
            saveCurrentWeek(
              `import-stock:${file.name}`,
              snapshotReportDate,
              { refresh: false, selectCurrent: false }
            );
          }
        } catch (error) {
          // A parser can discover an invalid file after it has already created
          // products or ledger entries. Restore the state so a failed file can
          // never contaminate the next file in the same batch.
          products = rollback.products;
          salesLedger = rollback.salesLedger;
          stockAsOfLabel = rollback.stockAsOfLabel;
          currentSalesWeekKey = rollback.currentSalesWeekKey;
          selectedSalesRange = rollback.selectedSalesRange;
          selectedCurrentSalesRange = rollback.selectedCurrentSalesRange;
          $("stock-asof").textContent = stockAsOfLabel;
          failures.push({ file, message: error?.message || "อ่านไฟล์ไม่สำเร็จ" });
        }
      }

      showUploadResults(uploads, failures, type);

      if (!uploads.length) {
        const names = failures.map(item => item.file.name).slice(0, 3).join(", ");
        $("status").textContent = `ไม่สามารถนำเข้า${label}ได้${names ? `: ${names}` : ""}`;
        return;
      }

      if (type === "sales") {
        ["previous", "current"].forEach(target => {
          const range = importedSalesRange(uploads, target);
          if (range) setSalesRangeForTarget(target, range);
        });
        syncProductSalesFromLedger();
        if (uploads.some(upload => upload.result?.target === "previous")) {
          previousProfitOverrides[weekKey(todayDate())] = sum(analysisRows().map(row => row.previousProfit));
        }
      } else {
        syncProductSalesFromLedger();
      }

      save();
      if (type === "sales") {
        saveCurrentWeek(`import-${type}${uploads.length > 1 ? "-multiple" : ""}`);
      } else {
        selectedWeekKey = "current";
        refreshMonthPicker();
        refreshWeekPicker();
        updateHistoryStatus();
      }
      refreshSalesDatePicker();
      render();

      const count = sum(uploads.map(upload => Number(upload.result?.count || 0)));
      const failedNote = failures.length ? ` · ไม่สำเร็จ ${failures.length.toLocaleString("th-TH")} ไฟล์` : "";
      const verificationNote = uploadVerificationNote(uploads);
      if (type === "stock") {
        const latestStockDate = uploads.at(-1)?.result?.stockDate;
        const derivedWeight = sum(uploads.map(upload => Number(upload.result?.derivedWeight || 0)));
        const usedSalesReports = uploads.filter(upload => upload.result?.usedSalesReport).length;
        const latestNote = latestStockDate ? ` · สต๊อกล่าสุด ${thaiSingleDateLabel(dateFromKey(latestStockDate))}` : "";
        const salesReportNote = usedSalesReports
          ? ` · ${usedSalesReports.toLocaleString("th-TH")} ไฟล์มีรายงานขายอยู่แล้ว จึงไม่คำนวณซ้ำจากสต๊อก`
          : "";
        const negativeRows = rows().filter(row => Number(row.stock || 0) < 0);
        const negativeWeight = sum(negativeRows.map(row => Number(row.stock || 0)));
        const negativeNote = negativeRows.length
          ? ` · ตรวจพบสต๊อกติดลบ ${negativeRows.length.toLocaleString("th-TH")} รายการ รวม ${fmt(negativeWeight)} กก. (ไม่นำส่วนต่ำกว่า 0 ไปคำนวณเป็นยอดขาย)`
          : "";
        $("status").textContent = `นำเข้าสต๊อก ${uploads.length.toLocaleString("th-TH")} ไฟล์แล้ว ${count.toLocaleString("th-TH")} รายการ${verificationNote}${latestNote} · คำนวณส่วนต่างสต๊อกตามวันที่ในไฟล์ ${fmt(derivedWeight)} กก.${negativeNote}${salesReportNote}${failedNote}`;
        return;
      }

      const saleWeight = sum(uploads.map(upload => Number(upload.result?.saleWeight || 0)));
      const salesAmount = sum(uploads.map(upload => Number(upload.result?.salesAmount || 0)));
      const periods = ["previous", "current"].map(target => {
        const range = importedSalesRange(uploads, target);
        if (!range) return "";
        return `${target === "previous" ? "Last week" : "Week"} ${thaiDateRangeLabel(range.start, range.end)}`;
      }).filter(Boolean).join(" / ");
      const totals = saleWeight || salesAmount
        ? ` น้ำหนัก ${fmt(saleWeight)} กก. ยอดขาย ${money(salesAmount)} บาท`
        : "";
      const overlapping = [selectedSalesRangeBounds(), selectedCurrentSalesRangeBounds()]
        .flatMap(bounds => salesLedgerRangeCoverage(bounds).overlapping);
      const duplicateNote = overlapping.length
        ? ` · ตัดรายงานช่วงซ้ำ ${new Set(overlapping.map(record => `${record.start}:${record.end}`)).size.toLocaleString("th-TH")} ไฟล์`
        : "";
      $("status").textContent = `นำเข้ารายงานขาย ${uploads.length.toLocaleString("th-TH")} ไฟล์แล้ว ${count.toLocaleString("th-TH")} รายการ${verificationNote}${periods ? ` · ${periods}` : ""}${totals}${duplicateNote}${failedNote}`;
    }

    let uploadBatchQueue = Promise.resolve();
    let pendingUploadBatches = 0;

    function setUploadControlsBusy(isBusy) {
      [$("sales-file"), $("stock-file"), $("customer-file")].forEach(input => {
        if (input) input.disabled = isBusy;
      });
    }

    function enqueueFiles(files, type) {
      // Copy FileList immediately because browsers may clear this live object
      // when another selection is made while the previous import is running.
      const selectedFiles = Array.from(files || []);
      if (!selectedFiles.length) return Promise.resolve();
      pendingUploadBatches += 1;
      setUploadControlsBusy(true);
      const task = uploadBatchQueue.then(() => type === "customer" ? handleCustomerFiles(selectedFiles) : handleFiles(selectedFiles, type));
      uploadBatchQueue = task.catch(() => {});
      return task.finally(() => {
        pendingUploadBatches = Math.max(0, pendingUploadBatches - 1);
        if (!pendingUploadBatches) setUploadControlsBusy(false);
      });
    }

    function sortValue(row, metric, mode = selectedFinancialPeriod()) {
      if (metric === "code" || metric === "name") return String(row[metric] || "");
      const metrics = ["price", "averageProfit", "gpi"].includes(metric) ? financialMetrics(row, mode) : null;
      if (metric === "price") return metrics.averageSellPrice;
      if (metric === "averageProfit") return metrics.averageProfit;
      if (metric === "gpi") return metrics.gp;
      return Number(row[metric] || 0);
    }

    function sortData(data, metric, direction = "desc", mode = selectedFinancialPeriod()) {
      const sorted = [...data];
      const multiplier = direction === "asc" ? 1 : -1;
      return sorted.sort((a, b) => {
        const left = sortValue(a, metric, mode);
        const right = sortValue(b, metric, mode);
        const comparison = typeof left === "string" || typeof right === "string"
          ? String(left).localeCompare(String(right), "th")
          : Number(left) - Number(right);
        return (comparison * multiplier) || a.code.localeCompare(b.code, "th");
      });
    }

    function setTableSort(prefix, metric, direction = "desc") {
      tableSortState[prefix] = { metric, direction };
      const select = $(`${prefix}-sort`);
      if (select) select.value = metric;
    }

    function toggleTableSort(prefix, metric) {
      const state = tableSortState[prefix] || { metric: "", direction: "desc" };
      const direction = state.metric === metric && state.direction === "desc" ? "asc" : "desc";
      setTableSort(prefix, metric, direction);
      render();
    }

    function setProductTab(tab) {

    function xmlEscape(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function excelCell(value, styleId = "") {
      const isNumber = typeof value === "number" && Number.isFinite(value);
      const type = isNumber ? "Number" : "String";
      return `<Cell${styleId ? ` ss:StyleID="${styleId}"` : ""}><Data ss:Type="${type}">${xmlEscape(isNumber ? value : value ?? "")}</Data></Cell>`;
    }

    function excelRow(values, styleId = "", cellStyleIds = []) {
      return `<Row${styleId ? ` ss:StyleID="${styleId}"` : ""}>${values.map((value, index) => excelCell(value, cellStyleIds[index] || "")).join("")}</Row>`;
    }

    function reportRows(data, mode = selectedFinancialPeriod()) {
      return data.map(row => {
        const metrics = financialMetrics(row, mode);
        return [
          row.code,
          row.name,
          qty(row.previousSale),
          qty(row.currentSale),
          qty(row.stock),
          Number(row.cost || 0),
          roundedPrice(metrics.averageSellPrice),
          Number(metrics.averageProfit),
          `${percent(metrics.gp)}%`
        ];
      });
    }

    function worksheet(name, rowsData) {
      const brandedRows = [[brandName], [""], ...rowsData];
      const headerRow = rowsData[0] || [];
      const dailyTotalColumn = headerRow.findIndex(value => String(value ?? "").trim() === "Total (kg)");
      const rowsXml = brandedRows.map((row, index) => {
        const isTotal = row.some(value => String(value ?? "").trim() === "ผลรวมทั้งหมด");
        const isDailyTotal = isTotal && dailyTotalColumn >= 0 && row.length > dailyTotalColumn + 1;
        if (isDailyTotal) {
          const cellStyles = row.map((_, cellIndex) => cellIndex > dailyTotalColumn ? "TotalDaily" : "Total");
          return excelRow(row, "", cellStyles);
        }
        const styleId = index === 0 ? "BrandTitle" : index === 2 ? "Header" : isTotal ? "Total" : index > 2 ? "Data" : "";
        return excelRow(row, styleId);
      }).join("");
      return `<Worksheet ss:Name="${xmlEscape(name)}"><Table>${rowsXml}</Table></Worksheet>`;
    }

    function workbookXml(sheetList) {
      return `<?xml version="1.0" encoding="UTF-8"?>

<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:o="urn:schemas-microsoft-com:office:office"
 xmlns:x="urn:schemas-microsoft-com:office:excel"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:html="http://www.w3.org/TR/REC-html40">

    function exportFilename(label, extension, ...parts) {
      const safePart = value => String(value ?? "")
        .trim()
        .replace(/[<>:"/\\|?*\u0000-\u001f]/g, "-")
        .replace(/\s+/g, "_")
        .replace(/_+/g, "_")
        .replace(/^-+|-+$/g, "");
      const name = [label, ...parts].map(safePart).filter(Boolean).join("_");
      return `${name || "รายงาน"}.${String(extension || "").replace(/^\./, "")}`;
    }

    function currentProductExportFilename(title, extension) {
      const previous = selectedSalesRangeBounds();
      const current = selectedCurrentSalesRangeBounds();
      const format = extension === "xls" ? "Excel" : "JPEG";
      return exportFilename(
        title,
        extension,
        format,
        `Last-week-${dateKey(previous.start)}-ถึง-${dateKey(previous.end)}`,
        `Week-${dateKey(current.start)}-ถึง-${dateKey(current.end)}`
      );
    }

    function downloadBlob(blob, filename) {
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function downloadExcel(filename, workbook) {
      downloadBlob(new Blob([workbook], { type: "application/vnd.ms-excel;charset=utf-8" }), filename);
    }

    function canvasToJpegBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error("สร้างไฟล์ JPEG ไม่สำเร็จ"));
        }, "image/jpeg", 0.94);
      });
    }

    function jpegTrimText(ctx, value, maxWidth) {
      const text = String(value ?? "");
      if (ctx.measureText(text).width <= maxWidth) return text;
      let end = text.length;
      while (end > 0 && ctx.measureText(`${text.slice(0, end)}...`).width > maxWidth) end--;
      return end > 0 ? `${text.slice(0, end)}...` : "...";
    }

    function jpegDrawCell(ctx, value, x, y, width, height, options = {}) {
      const padding = options.padding ?? 9;
      const fontSize = options.fontSize ?? 17;
      const lineHeight = options.lineHeight ?? fontSize * 1.18;
      ctx.font = `${options.weight || 600} ${fontSize}px Tahoma, Arial, sans-serif`;
      const lines = String(value ?? "").split("\n").map(line => jpegTrimText(ctx, line, Math.max(1, width - (padding * 2))));
      ctx.fillStyle = options.background || "#ffffff";
      ctx.fillRect(x, y, width, height);
      if (Number(options.barMaximum) > 0 && Number(options.barValue) > 0) {
        const ratio = Math.max(0, Math.min(1, Number(options.barValue) / Number(options.barMaximum)));
        const gradient = ctx.createLinearGradient(x, y, x + width, y);
        gradient.addColorStop(0, options.barColor || "#5da2d9");
        gradient.addColorStop(1, options.barColorEnd || "#cce8fb");
        ctx.fillStyle = gradient;
        ctx.fillRect(x + 2, y + 4, Math.max(2, (width - 4) * ratio), height - 8);
      }
      ctx.strokeStyle = options.border || "#d3dee6";
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, width - 1, height - 1);
      ctx.fillStyle = options.color || "#000000";
      ctx.textBaseline = "middle";
      ctx.textAlign = options.align || "left";
      const textX = options.align === "right" ? x + width - padding : options.align === "center" ? x + (width / 2) : x + padding;
      const startY = y + (height / 2) - ((lines.length - 1) * lineHeight / 2);
      lines.forEach((line, index) => ctx.fillText(line, textX, startY + (index * lineHeight)));
    }

    function jpegDrawHeaderCell(ctx, column, x, y, height, theme) {
      const background = column.headerBackground || theme.header;
      const color = column.headerColor || "#ffffff";
      const border = column.headerBorder || theme.headerBorder;
      if (!column.headerFilter) {
        jpegDrawCell(ctx, column.title, x, y, column.width, height, {
          background,
          color,
          border,
          align: "center",
          weight: 800,
          fontSize: 15
        });
        return;
      }

      ctx.fillStyle = background;
      ctx.fillRect(x, y, column.width, height);
      ctx.strokeStyle = border;
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, column.width - 1, height - 1);
      ctx.fillStyle = color;
      ctx.font = "800 15px Tahoma, Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(jpegTrimText(ctx, column.title, column.width - 18), x + (column.width / 2), y + 17);

      const filterX = x + 10;
      const filterY = y + 34;
      const filterWidth = column.width - 20;
      const filterHeight = 25;
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(filterX, filterY, filterWidth, filterHeight);
      ctx.strokeStyle = "#7f9ab0";
      ctx.strokeRect(filterX + 0.5, filterY + 0.5, filterWidth - 1, filterHeight - 1);
      ctx.fillStyle = "#000000";
      ctx.font = "700 13px Tahoma, Arial, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(jpegTrimText(ctx, column.headerFilter, filterWidth - 22), filterX + 8, filterY + (filterHeight / 2));
      ctx.textAlign = "right";
      ctx.fillText("▾", filterX + filterWidth - 7, filterY + (filterHeight / 2));
    }

    function jpegProductColumns(previousTitle = `Last week\n${activePreviousWeekCompactLabel()}`, currentTitle = `Week\n${activeCurrentWeekCompactLabel()}`) {
      return [
        { key: "code", title: "Code", width: 150, align: "left" },
        { key: "name", title: "Product", width: 390, align: "left" },
        { key: "previousSale", title: previousTitle, width: 205, align: "right" },
        { key: "currentSale", title: currentTitle, width: 205, align: "right" },
        { key: "stock", title: "Stock", width: 165, align: "right" },
        { key: "cost", title: "Cost", width: 145, align: "right" },
        { key: "price", title: "Price", width: 170, align: "right" },
        { key: "averageProfit", title: "Average profit", width: 205, align: "right" },
        { key: "gpi", title: "GPI", width: 155, align: "right" }
      ];
    }

    function jpegProductRow(row, mode = selectedFinancialPeriod(), date = activeReportDate()) {
      const metrics = financialMetrics(row, mode, date);
      return {
        code: row.code,
        name: productNameFor(row.code, row.name),
        previousSale: fmt(row.previousSale),
        currentSale: fmt(row.currentSale),
        stock: stockFmt(row.stock),
        cost: money(row.cost),
        price: price(metrics.averageSellPrice),
        averageProfit: money(metrics.averageProfit),
        gpi: `${percent(metrics.gp)}%`,
        numericGpi: Number(metrics.gp || 0),
        numericAverageProfit: Number(metrics.averageProfit || 0),
        inactive: isInactiveProduct(row)
      };
    }

    function currentJpegProductRow(row, mode = selectedFinancialPeriod(), date = activeReportDate()) {
      const output = jpegProductRow(row, mode, date);
      const stock = Number(row.stock || 0);
      const averageProfit = Number(output.numericAverageProfit || 0);
      const gpi = Number(output.numericGpi || 0);
      const outOfStock = stock <= 0;
      const inactive = output.inactive;
      output.stock = stock < 0 ? `⚠ ติดลบ ${stockFmt(stock)}` : outOfStock ? `✕ หมด ${stockFmt(stock)}` : stockFmt(stock);
      output.gpi = gpi > 10
        ? `+ ${percent(gpi)}%`
        : Math.abs(gpi) < 0.000001
          ? `● ${percent(gpi)}%`
          : gpi < 10
            ? `⚠ ${percent(gpi)}%`
            : `${percent(gpi)}%`;

      const baseBackground = inactive ? "#ffe7e7" : "#ffffff";
      const baseColor = inactive ? "#b00000" : "#000000";
      output._cellBackgrounds = {
        code: baseBackground,
        name: inactive ? "#ffdede" : "#f7f7f7",
        previousSale: baseBackground,
        currentSale: baseBackground,
        stock: outOfStock ? "#ffe1e1" : baseBackground,
        cost: baseBackground,
        price: baseBackground,
        averageProfit: Math.abs(averageProfit) < 0.000001 ? "#ffe1e1" : averageProfit > 10 ? "#d9f7e2" : "#fff3bf",
        gpi: Math.abs(gpi) < 0.000001 ? "#ffe1e1" : gpi > 10 ? "#d9f7e2" : "#fff3bf"
      };
      output._cellColors = {
        code: baseColor,
        name: baseColor,
        previousSale: baseColor,
        currentSale: baseColor,
        stock: outOfStock ? "#a61e1e" : baseColor,
        cost: inactive ? baseColor : "#075985",
        price: inactive ? baseColor : "#075985",
        averageProfit: "#000000",
        gpi: "#000000"
      };
      return output;
    }

    function jpegProductSortIndicator(prefix, key) {
      const state = tableSortState[prefix] || {};
      if (state.metric !== key) return "↕";
      return state.direction === "asc" ? "▲" : "▼";
    }

    function jpegProductFilterLabel(key) {
      const selected = columnFilters[key] || "all";
      return filterOptions[key]?.find(([value]) => value === selected)?.[1] || "ทั้งหมด";
    }

    function allProductFiltersActive() {
      const query = $("all-search")?.value.trim() || "";
      return Boolean(query) || Object.values(columnFilters).some(value => value !== "all");
    }

    function currentAllProductsReportTitle() {
      return allProductFiltersActive() ? "รายการสินค้าตามตัวกรอง" : "รายการสินค้าทั้งหมด";
    }

    function jpegCellBackground(key, row, rowIndex = 0) {
      if (key === "totalWeight") return "#eee9ff";
      if (key.startsWith("daily-")) return "#f1f8fe";
      if (key === "gpi") {
        if (Math.abs(row.numericGpi) < 0.000001) return "#ffe1e1";
        if (row.numericGpi < 10) return "#fff3bf";
        if (row.numericGpi > 10) return "#d9f7e2";
      }
      if (key === "averageProfit") {
        if (Math.abs(row.numericAverageProfit) < 0.000001) return "#ffe1e1";
        if (row.numericAverageProfit < 10) return "#fff3bf";
        if (row.numericAverageProfit > 10) return "#d9f7e2";
      }
      if (row.inactive) return "#ffe7e7";
      return {
        previousSale: "#fff6e8",
        currentSale: "#eaf7ff",
        stock: "#effaf1",
        cost: "#eef2f6",
        price: "#fff0f3"
      }[key] || (rowIndex % 2 === 0 ? "#ffffff" : "#f7fafc");
    }

      const themes = {
        all: {
          title: "#ef7029", header: "#7a3516", headerBorder: "#9b4a22",
          groupSurface: "#fff0e8", groupBorder: "#efc4ad", groupAccent: "#ef7029", groupText: "#7a3516"
        },
        missing: {
          title: "#c63f5b", header: "#762f42", headerBorder: "#9c5263",
          groupSurface: "#fff0f3", groupBorder: "#e6bcc6", groupAccent: "#c63f5b", groupText: "#762f42"
        },
        monthly: {
          title: "#237dbc", header: "#173f5f", headerBorder: "#345b78",
          groupSurface: "#eaf5f3", groupBorder: "#bed6d1", groupAccent: "#17806f", groupText: "#123b4d"
        },
        customers: {
          title: "#168a72", header: "#125c4e", headerBorder: "#2d7b6b",
          groupSurface: "#e8f7f3", groupBorder: "#b9ded5", groupAccent: "#168a72", groupText: "#125c4e"
        }

      return themes[kind] || themes.monthly;

    function createJpegReportCanvas(report) {
      const margin = 38;
      const titleHeight = 84;
      const subtitleHeight = 48;
      const summaryHeight = 106;
      const groupHeight = 44;
      const headerHeight = 66;
      const rowHeight = 42;
      const footerHeight = 52;
      const columns = report.columns;
      const theme = { ...jpegReportTheme(), ...(report.theme || {}) };
      const tableWidth = columns.reduce((total, column) => total + column.width, 0);
      const cardsPerRow = Math.min(7, Math.max(3, report.summary.length));
      const summaryRows = Math.max(1, Math.ceil(report.summary.length / cardsPerRow));
      const dataRows = report.groups.reduce((total, group) => total + Math.max(1, group.rows.length), 0);
      const imageWidth = tableWidth + (margin * 2);
      const imageHeight = (margin * 2) + titleHeight + subtitleHeight + (summaryRows * summaryHeight) + (report.groups.length * (groupHeight + headerHeight)) + (dataRows * rowHeight) + footerHeight;
      if (imageHeight <= 0 || imageHeight > 30000) throw new Error("รายงานยาวเกินกว่าที่จะสร้างเป็น JPEG ไฟล์เดียวได้");

      const canvas = document.createElement("canvas");
      canvas.width = imageWidth;
      canvas.height = imageHeight;
      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("เบราว์เซอร์ไม่รองรับการสร้าง JPEG");
      ctx.fillStyle = "#f1f5f8";
      ctx.fillRect(0, 0, imageWidth, imageHeight);

      let y = margin;
      ctx.fillStyle = theme.title;
      ctx.fillRect(margin, y, tableWidth, titleHeight);
      ctx.fillStyle = "#ffffff";
      ctx.font = "800 30px Tahoma, Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(brandName, imageWidth / 2, y + 28);
      ctx.font = "700 22px Tahoma, Arial, sans-serif";
      ctx.fillText(report.title, imageWidth / 2, y + 61);
      y += titleHeight;

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(margin, y, tableWidth, subtitleHeight);
      ctx.strokeStyle = "#d3dee6";
      ctx.strokeRect(margin + 0.5, y + 0.5, tableWidth - 1, subtitleHeight - 1);
      ctx.fillStyle = "#466174";
      ctx.font = "600 16px Tahoma, Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(jpegTrimText(ctx, report.subtitle, tableWidth - 24), imageWidth / 2, y + (subtitleHeight / 2));
      y += subtitleHeight;

      const summaryColors = ["#edf7fb", "#fff7eb", "#edf8ff", "#effaf3", "#fff1f3", "#f5f2ff", "#fff9df"];
      const summaryAccents = ["#2f83b8", "#ef8b2c", "#21a0c4", "#3d9861", "#d85b70", "#7357c7", "#d7a600"];
      const cardWidth = tableWidth / cardsPerRow;
      report.summary.forEach(([label, value, unit], index) => {
        const column = index % cardsPerRow;
        const row = Math.floor(index / cardsPerRow);
        const cardX = margin + (column * cardWidth);
        const cardY = y + (row * summaryHeight);
        const inset = 4;
        ctx.fillStyle = summaryColors[index % summaryColors.length];
        ctx.fillRect(cardX + inset, cardY + 8, cardWidth - (inset * 2), summaryHeight - 16);
        ctx.fillStyle = summaryAccents[index % summaryAccents.length];
        ctx.fillRect(cardX + inset, cardY + 8, 6, summaryHeight - 16);
        ctx.strokeStyle = "#d7e1e8";
        ctx.strokeRect(cardX + inset + 0.5, cardY + 8.5, cardWidth - (inset * 2) - 1, summaryHeight - 17);
        ctx.fillStyle = "#40596f";
        ctx.font = "700 15px Tahoma, Arial, sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillText(jpegTrimText(ctx, label, cardWidth - 38), cardX + 18, cardY + 32);
        ctx.fillStyle = "#123b57";
        ctx.font = "800 27px Tahoma, Arial, sans-serif";
        ctx.fillText(`${value}${unit ? ` ${unit}` : ""}`, cardX + 18, cardY + 69);
      });
      y += summaryRows * summaryHeight;

      report.groups.forEach(group => {
        ctx.fillStyle = theme.groupSurface;
        ctx.fillRect(margin, y, tableWidth, groupHeight);
        ctx.strokeStyle = theme.groupBorder;
        ctx.strokeRect(margin + 0.5, y + 0.5, tableWidth - 1, groupHeight - 1);
        ctx.fillStyle = theme.groupAccent;
        ctx.fillRect(margin, y, 7, groupHeight);
        ctx.fillStyle = theme.groupText;
        ctx.font = "800 20px Tahoma, Arial, sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillText(group.title, margin + 18, y + (groupHeight / 2));
        y += groupHeight;

        let x = margin;
        columns.forEach(column => {
          jpegDrawHeaderCell(ctx, column, x, y, headerHeight, theme);
          x += column.width;
        });
        y += headerHeight;

        const rowsToDraw = group.rows.length ? group.rows : [{ empty: true }];
        rowsToDraw.forEach((row, rowIndex) => {
          if (row.empty) {
            jpegDrawCell(ctx, "ไม่พบรายการ", margin, y, tableWidth, rowHeight, { background: "#ffffff", align: "center", color: "#788897", weight: 700 });
          } else {
            let cellX = margin;
            columns.forEach(column => {
              jpegDrawCell(ctx, row[column.key], cellX, y, column.width, rowHeight, {
                background: row._cellBackgrounds?.[column.key] || row._background || column.background || jpegCellBackground(column.key, row, rowIndex),
                color: row._cellColors?.[column.key] || row._color,
                align: column.align,
                weight: row._cellWeights?.[column.key] || column.weight || (column.key === "name" || column.key === "gpi" || column.key === "averageProfit" ? 800 : 600),
                fontSize: 16,
                barValue: row._barValues?.[column.key],
                barMaximum: column.barMaximum,
                barColor: row._barColors?.[column.key] || column.barColor,
                barColorEnd: row._barColorEnds?.[column.key] || column.barColorEnd
              });
              cellX += column.width;
            });
          }
          y += rowHeight;
        });
      });

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(margin, y, tableWidth, footerHeight);
      ctx.strokeStyle = "#d3dee6";
      ctx.strokeRect(margin + 0.5, y + 0.5, tableWidth - 1, footerHeight - 1);
      ctx.fillStyle = "#637887";
      ctx.font = "600 14px Tahoma, Arial, sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.fillText(`A AND C SHOP ERP  •  สร้างรายงาน ${new Date().toLocaleString("th-TH")}`, imageWidth - margin - 14, y + (footerHeight / 2));
      return canvas;
    }

    async function downloadJpegReport(report, filename) {
      $("status").textContent = `กำลังสร้างรายงาน JPEG ${report.title}`;
      try {
        const canvas = createJpegReportCanvas(report);
        downloadBlob(await canvasToJpegBlob(canvas), filename);
        $("status").textContent = `ดาวน์โหลดรายงาน JPEG ${report.title} แล้ว`;
      } catch (error) {
        $("status").textContent = error.message || "สร้างรายงาน JPEG ไม่สำเร็จ";
      }
    }

    function currentJpegReport(prefix) {
      const mode = selectedFinancialPeriod();
      const previousRange = selectedSalesRangeBounds();
      const weekLabelForRange = range => {
        const period = reportingPeriodBounds(range.end);
        return range.start >= period.start && range.end <= period.end
          ? `สัปดาห์ที่ ${period.number}`
          : "หลายสัปดาห์";
      };
      const previousWeekLabel = weekLabelForRange(previousRange);
      const isMissing = prefix === "missing";
      const rowsForReport = isMissing ? currentMissingRows : currentAllRows;
      const rowsForScale = analysisRows();
      const rowsForSummary = isMissing ? rowsForReport : rowsForScale;
      const financial = financialTotals(rowsForSummary, mode, activeReportDate(), true);
      const saleMaximum = Math.max(1, ...rowsForScale.map(row => Math.max(Number(row.previousSale || 0), Number(row.currentSale || 0))));
      const stockMaximum = Math.max(1, ...rowsForScale.map(row => Number(row.stock || 0)));
      const headerStyles = {
        code: ["#e0eef9", "#123b57"],
        name: ["#e0eef9", "#123b57"],
        previousSale: ["#fff0d9", "#8a4b00"],
        currentSale: ["#e2f5ff", "#075985"],
        stock: ["#e5f8e9", "#176b2c"],
        cost: ["#edf1f5", "#075985"],
        price: ["#fff5cf", "#075985"],
        averageProfit: ["#e0eef9", "#123b57"],
        gpi: ["#e0eef9", "#123b57"]
      };
      const filterKeyByColumn = { stock: "stock", averageProfit: "avgProfit", gpi: "gpi" };
      const reportColumns = jpegProductColumns().map(column => ({
        ...column,
        title: `${column.title.split("\n")[0]} ${jpegProductSortIndicator(prefix, column.key)}${column.title.includes("\n") ? `\n${column.title.split("\n").slice(1).join("\n")}` : ""}`,
        background: "#ffffff",
        headerBackground: headerStyles[column.key]?.[0],
        headerColor: headerStyles[column.key]?.[1],
        headerBorder: "#a9bfd0",
        headerFilter: !isMissing && filterKeyByColumn[column.key] ? jpegProductFilterLabel(filterKeyByColumn[column.key]) : "",
        weight: column.key === "code" ? 600 : 800,
        ...(column.key === "previousSale" ? { barMaximum: saleMaximum, barColor: "#f5a33c", barColorEnd: "#ffe0ad" } : {}),
        ...(column.key === "currentSale" ? { barMaximum: saleMaximum, barColor: "#5b9fd5", barColorEnd: "#c9e7fb" } : {}),
        ...(column.key === "stock" ? { barMaximum: stockMaximum, barColor: "#65b77a", barColorEnd: "#d8f3df" } : {})
      }));
      const productJpegRows = group => rowsForReport.filter(row => row.group === group).map(row => ({
        ...currentJpegProductRow(row, mode),
        _barValues: { previousSale: row.previousSale, currentSale: row.currentSale, stock: row.stock }
      }));
      const summary = isMissing
        ? [
          ["สินค้าไม่เคลื่อนไหว", rowsForReport.length.toLocaleString("th-TH"), "รายการ"],
          [stockReportLabel("น้ำหนักคงเหลือ"), stockFmt(sum(rowsForReport.map(row => row.stock))), "กก."],

    function historyRowsForSelectedPeriod(item) {
      const savedAt = item?.savedAt ? new Date(item.savedAt) : null;
      const baseRows = snapshotDataRows(item);
      if (!savedAt || Number.isNaN(savedAt.getTime())) return baseRows;
      const previous = selectedSalesData(previousReportingPeriodBounds(savedAt));
      const current = selectedSalesData(reportingPeriodBounds(savedAt));
      if (!previous.records.length && !current.records.length) return baseRows;
      return baseRows.map(row => {
        const previousEntry = previous.entriesByCode.get(row.code) || { saleWeight: 0, salesAmount: 0 };
        const currentEntry = current.entriesByCode.get(row.code) || { saleWeight: 0, salesAmount: 0 };
        const cost = Number(row.cost || 0);
        const previousMetrics = salesMetricsForEntry(previousEntry, cost);
        const currentMetrics = salesMetricsForEntry(currentEntry, cost);
        return {
          ...row,
          sale: qty(previousMetrics.saleWeight),
          previousSale: qty(previousMetrics.saleWeight),
          currentSale: qty(currentMetrics.saleWeight),
          previousSellPrice: Number(previousMetrics.averageSellPrice || 0),
          currentSellPrice: Number(currentMetrics.averageSellPrice || 0),
          sellPrice: Number(currentMetrics.averageSellPrice || 0),
          previousSalesAmount: Number(previousMetrics.salesAmount.toFixed(2)),
          salesAmount: Number(currentMetrics.salesAmount.toFixed(2)),
          previousProfit: Number(previousMetrics.profit.toFixed(2)),
          grossProfit: Number(currentMetrics.profit.toFixed(2)),
          previousGpi: Number(previousMetrics.gpi.toFixed(2)),
          currentGpi: Number(currentMetrics.gpi.toFixed(2)),
          gpi: Number(currentMetrics.gpi.toFixed(2))
        };
      });
    }

    function historyDetailRows(items) {
      return items.flatMap(item => historyRowsForSelectedPeriod(item).map(row => {
        const currentSale = Number(row.currentSale ?? 0);
        const previousSale = Number(row.previousSale ?? row.sale ?? 0);
        const savedAt = item.savedAt ? new Date(item.savedAt) : todayDate();
        const cost = Number(row.cost || 0);
        const previousSellPrice = Number(row.previousSellPrice ?? row.sellPrice ?? cost);
        const currentSellPrice = Number(row.currentSellPrice ?? row.sellPrice ?? previousSellPrice);
        const metrics = financialMetrics({
          ...row,
          previousSale,
          currentSale,
          cost,
          previousSalesAmount: Number(row.previousSalesAmount ?? previousSale * previousSellPrice),
          salesAmount: Number(row.salesAmount ?? currentSale * currentSellPrice)
        }, "current", savedAt);
        return [
          item.weekKey,
          thaiMonthLabel(item.monthKey),
          row.code,
          productNameFor(row.code, row.name),
          qty(previousSale),
          qty(currentSale),
          qty(row.stock),
          cost,
          roundedPrice(metrics.averageSellPrice),
          Number(metrics.averageProfit),
          `${percent(metrics.gp)}%`,
          item.savedAt
        ];
      }));
    }

    function aggregateProductRows(items) {
      const map = new Map();
      items.forEach(item => historyRowsForSelectedPeriod(item).forEach(row => {
        const current = map.get(row.code) || {
          code: row.code,
          name: row.name,
          group: row.group,
          sale: 0,
          currentSale: 0,
          stock: 0,
          salesAmount: 0,
          grossProfit: 0,
          weeks: 0,
          inactiveWeeks: 0
        };
        current.name = row.name;
        current.group = row.group;
        current.sale += Number(row.previousSale || 0);
        current.currentSale += Number(row.currentSale || 0);
        current.stock = Number(row.stock || 0);
        current.salesAmount += Number(row.salesAmount || 0);
        current.grossProfit += Number(row.grossProfit || 0);
        current.weeks += 1;
        if (Number(row.stock || 0) <= 0) current.inactiveWeeks += 1;
        map.set(row.code, current);
      }));
      return [...map.values()]
        .sort((a, b) => b.sale - a.sale || b.stock - a.stock || a.code.localeCompare(b.code, "th"))
        .map(row => [
          row.code,
          row.name,
          qty(row.sale),
          qty(row.currentSale),
          qty(row.stock),
          Number(row.salesAmount.toFixed(2)),
          Number(row.grossProfit.toFixed(2)),
          row.weeks,
          row.inactiveWeeks
        ]);
    }

    function kpis(id, items) {
      $(id).innerHTML = items.map(([label, value, unit]) => `
        <div class="kpi">
          <div class="kpi-label">${label}</div>
          <div class="kpi-value">${value}<span class="kpi-unit">${unit || ""}</span></div>
        </div>`).join("");
    }

    function barWidth(value, max) {
      if (value <= 0 || max <= 0) return "0%";
      return `${Math.max(2, value / max * 100).toFixed(1)}%`;
    }

    function tr(row, maxSale, maxStock, inactive = false, mode = "current") {
      const metrics = financialMetrics(row, mode);
      const avgProfit = metrics.averageProfit;
      const highAvgProfit = avgProfit > 10;
      const zeroAvgProfit = Math.abs(avgProfit) < 0.000001;
      const lowAvgProfit = avgProfit < 10;
      const numericGpi = Number(metrics.gp || 0);
      const highGpi = numericGpi > 10;
      const zeroGpi = Math.abs(numericGpi) < 0.000001;
      const lowGpi = numericGpi < 10 && !zeroGpi;
      const numericStock = Number(row.stock || 0);
      const negativeStock = numericStock < 0;
      const outOfStock = numericStock <= 0;
      const stockStatus = negativeStock
        ? '<span class="stock-out-icon" title="สต๊อกติดลบ" aria-label="สต๊อกติดลบ">&#9888;</span><span class="stock-out-label">ติดลบ</span>'
        : outOfStock
          ? '<span class="stock-out-icon" title="สินค้าหมดในสต๊อก" aria-label="สินค้าหมดในสต๊อก">&#10005;</span><span class="stock-out-label">หมด</span>'
          : "";
      return `
        <tr class="${inactive ? "inactive-row" : ""}">
          <td>${row.code}</td>
          <td class="name">${row.name}</td>
          <td class="num bar-cell metric-previous" style="--bar:${barWidth(row.previousSale, maxSale)}"><span>${fmt(row.previousSale)}</span></td>
          <td class="num bar-cell current-bar metric-current" style="--bar:${barWidth(row.currentSale, maxSale)}"><span>${fmt(row.currentSale)}</span></td>
          <td class="num bar-cell stock-bar metric-stock${outOfStock ? " stock-out" : ""}" style="--bar:${barWidth(row.stock, maxStock)}"><span>${stockStatus}${stockFmt(row.stock)}</span></td>
          <td class="num metric-cost">${money(row.cost)}</td>
          <td class="num metric-sell-price">${price(metrics.averageSellPrice)}</td>
          <td class="num avg-profit-cell${highAvgProfit ? " avg-profit-high" : zeroAvgProfit ? " avg-profit-zero" : lowAvgProfit ? " avg-profit-low" : ""}">${money(avgProfit)}</td>
          <td class="num gpi-cell${highGpi ? " gpi-high" : zeroGpi ? " gpi-zero" : lowGpi ? " gpi-low" : ""}">${highGpi ? '<span class="gpi-icon gpi-positive" title="GPI มากกว่า 10%" aria-label="GPI มากกว่า 10%">+</span>' : zeroGpi ? '<span class="gpi-zero-icon" title="GPI เป็น 0%" aria-label="GPI เป็น 0%">0</span>' : lowGpi ? '<span class="gpi-icon gpi-warning" title="คำเตือน: GPI ต่ำกว่า 10%" aria-label="คำเตือน GPI ต่ำกว่า 10%">&#9888;</span>' : ""}${percent(numericGpi)}%</td>
        </tr>`;
    }

    function renderTable(prefix, data, maxSale, maxStock, modeOverride = "") {
      const empty = `<tr><td class="empty" colspan="9">ไม่พบรายการสินค้า</td></tr>`;
      const inactive = prefix === "missing";
      const hasCurrentSales = sum(data.map(row => row.currentSale)) > 0;
      const mode = modeOverride || ($(`${prefix}-sort`).value === "previousSale" || !hasCurrentSales ? "previous" : "current");
      const showColumnFilters = prefix === "all";
      $(`${prefix}-pork-head`).innerHTML = columns(mode, showColumnFilters, prefix);
      $(`${prefix}-chicken-head`).innerHTML = columns(mode, showColumnFilters, prefix);
      $(`${prefix}-pork-body`).innerHTML = data.filter(row => row.group === "หมู").map(row => tr(row, maxSale, maxStock, inactive, mode)).join("") || empty;
      $(`${prefix}-chicken-body`).innerHTML = data.filter(row => row.group === "ไก่").map(row => tr(row, maxSale, maxStock, inactive, mode)).join("") || empty;
    }

      $("status").textContent = `ประมวลผลรายงานขายเดือนมิถุนายน ${suppliedJuneHistory.reportCount} ไฟล์แล้ว: ${fmt(suppliedJuneHistory.saleWeight)} กก. / ${money(suppliedJuneHistory.salesAmount)} บาท`;
    } else if (restoredPreviousWeek) {
      $("status").textContent = `กู้คืนประวัติ ${weekOptionLabel(restoredPreviousWeek)} จากข้อมูลที่อัปโหลดไว้แล้ว`;
    }
    $("all-search").addEventListener("input", render);
    $("all-sort").addEventListener("change", event => {
      setTableSort("all", event.target.value);
      render();
    });
    $("apply-sales-range").addEventListener("click", applySelectedSalesRange);
    $("apply-current-sales-range").addEventListener("click", applySelectedCurrentSalesRange);
    $("missing-sort").addEventListener("change", event => {
      setTableSort("missing", event.target.value);
      render();
    });
    $("week-picker").addEventListener("change", event => {
      selectedWeekKey = event.target.value;
      refreshSalesDatePicker();
      render();
    });
    $("calendar-selection-mode").addEventListener("change", event => {
      calendarSelectionMode = event.target.value;
      selectedCalendarWeekKeys = [];
      selectedCalendarDayKey = "";
      selectedWeekKey = "current";
      const selectedDate = todayDate();
      $("week-calendar-label").textContent = calendarSelectionMode === "day"
        ? "คลิกเลือก 1 วัน"
        : calendarSelectionMode === "multi" ? "คลิกเลือกได้หลายสัปดาห์" : reportingPeriodLabel(selectedDate);
      renderWeekCalendar(selectedDate);
      render();
    });
    $("week-calendar").addEventListener("click", event => {
      const panel = $("week-calendar-panel");
      panel.hidden = !panel.hidden;
      event.currentTarget.setAttribute("aria-expanded", String(!panel.hidden));
    });
    document.addEventListener("click", event => {
      const panel = $("week-calendar-panel");
      const trigger = $("week-calendar");
      if (!panel.hidden && !panel.contains(event.target) && event.target !== trigger) {
        panel.hidden = true;
        trigger.setAttribute("aria-expanded", "false");
      }
    });
    $("month-picker").addEventListener("change", event => {
      const monthlyPicker = $("monthly-products-month");
      if (monthlyPicker && [...monthlyPicker.options].some(option => option.value === event.target.value)) {
        monthlyPicker.value = event.target.value;
        const bounds = monthBounds(event.target.value);
        if (bounds) setMonthlyProductRange(bounds.start, bounds.end);
        refreshMonthlyProductsDatePickers();
      }
      renderMonthlyProductReport();
    });
    $("monthly-products-month").addEventListener("change", event => {
      const bounds = monthBounds(event.target.value);
      if (bounds) setMonthlyProductRange(bounds.start, bounds.end);
      refreshMonthlyProductsDatePickers();
      renderMonthlyProductReport();
    });
    $("apply-monthly-products-range").addEventListener("click", applyMonthlyProductsRange);
    $("download-monthly-products-excel").addEventListener("click", downloadMonthlyProductRangeExcel);
    $("download-monthly-products-jpeg").addEventListener("click", downloadMonthlyProductRangeJpeg);
    $("monthly-products-content").addEventListener("click", event => {
      const pageButton = event.target.closest("[data-monthly-daily-page]");
      if (pageButton && !pageButton.disabled) {
        monthlyDailyPage = Number(pageButton.dataset.monthlyDailyPage || 0);
        renderMonthlyProductReport();
        return;
      }
      const button = event.target.closest("[data-monthly-sort-key]");
      if (!button) return;
      toggleMonthlyDailySort(button.dataset.monthlySortKey);
    });
    document.querySelectorAll("[data-monthly-mode]").forEach(button => {
      button.addEventListener("click", () => {
        monthlyProductMode = button.dataset.monthlyMode;
        renderMonthlyProductReport();
      });
    });
    document.querySelectorAll("[data-monthly-group]").forEach(button => {
      button.addEventListener("click", () => {
        monthlyProductGroup = button.dataset.monthlyGroup;
        monthlyDailyPage = 0;
        renderMonthlyProductReport();
      });
    });
    window.addEventListener("resize", () => {
      if (activeProductTab === "monthly" && monthlyProductMode === "daily") renderMonthlyProductReport();
    });
    $("apply-customers-range").addEventListener("click", applyCustomerReportRange);
    $("customers-month").addEventListener("change", event => selectCustomerMonth(event.target.value));
    $("download-customers-excel").addEventListener("click", downloadCustomerRangeExcel);
    $("download-customers-jpeg").addEventListener("click", downloadCustomerRangeJpeg);
    document.querySelectorAll("[data-customer-mode]").forEach(button => {
      button.addEventListener("click", () => {
        customerReportMode = button.dataset.customerMode;
        save();
        renderCustomerReport();
      });
    });
    $("customers-content").addEventListener("click", event => {
      const button = event.target.closest("[data-customer-sort-key]");
      if (!button) return;
      toggleCustomerDailySort(button.dataset.customerSortKey);
    });
    $("download-all").addEventListener("click", () => downloadCurrentProductExcel("all"));
    $("download-missing").addEventListener("click", () => downloadCurrentProductExcel("missing"));
    $("download-all-jpeg").addEventListener("click", () => downloadPanelJpeg("all-products-panel", "รายการสินค้าทั้งหมด"));
    $("download-missing-jpeg").addEventListener("click", () => downloadPanelJpeg("inactive-products-panel", "สินค้าที่ไม่เคลื่อนไหว"));
    $("save-week").addEventListener("click", () => {
      const snapshot = saveCurrentWeek("manual");
      $("status").textContent = `บันทึกประวัติ ${snapshot.weekKey} แล้ว`;
    });
    $("download-week").addEventListener("click", downloadSelectedWeekHistory);
    $("download-week-jpeg").addEventListener("click", downloadSelectedWeekJpeg);
    $("download-month").addEventListener("click", () => downloadHistoryWorkbook($("month-picker").value));
    $("download-month-jpeg").addEventListener("click", downloadMonthJpeg);
    $("download-history").addEventListener("click", () => downloadHistoryWorkbook(""));
    $("download-history-jpeg").addEventListener("click", downloadAllHistoryJpeg);
    $("delete-selected-week").addEventListener("click", deleteSelectedWeekHistory);
    $("delete-selected-date").addEventListener("click", deleteSelectedDateHistory);
    $("clear-all-history").addEventListener("click", clearAllHistory);
    $("sales-file").addEventListener("change", async event => {
      const input = event.currentTarget;
      const files = Array.from(input.files || []);
      input.value = "";
      try {
        await enqueueFiles(files, "sales");
      } catch (error) {
        $("status").textContent = `นำเข้ารายงานยอดขายไม่สำเร็จ: ${error?.message || "เกิดข้อผิดพลาด"}`;
      }
    });
    $("stock-file").addEventListener("change", async event => {
      const input = event.currentTarget;
      const files = Array.from(input.files || []);
      input.value = "";
      try {
        await enqueueFiles(files, "stock");
      } catch (error) {
        $("status").textContent = `นำเข้าสต๊อกไม่สำเร็จ: ${error?.message || "เกิดข้อผิดพลาด"}`;
      }
    });
    $("customer-file").addEventListener("change", async event => {
      const input = event.currentTarget;
      const files = Array.from(input.files || []);
      input.value = "";
      try {
        await enqueueFiles(files, "customer");
      } catch (error) {
        $("status").textContent = `นำเข้ารายงานลูกค้าไม่สำเร็จ: ${error?.message || "เกิดข้อผิดพลาด"}`;
      }
    });
    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
