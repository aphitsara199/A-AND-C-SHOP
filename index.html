<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A AND C SHOP ERP</title>
  <style>
    :root {
      --ink: #001f3d;
      --muted: #536475;
      --grid: #222;
      --orange: #ef7029;
      --header: #d8e7f5;
      --pale: #ffffff;
      --stock: #e2f6e7;
      --value: #e4eef9;
      --week-a: #f39a31;
      --week-b: #ffe2aa;
      --stock-a: #5a92ce;
      --stock-b: #d8eafb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #fff;
      color: var(--ink);
      font-family: Arial, "Tahoma", "Noto Sans Thai", sans-serif;
      font-size: 15px;
    }

    .app {
      padding: 18px 24px;
      min-width: 0;
    }

    .sheet {
      background: #fff;
      border: 1px solid #c7d3dc;
      margin: 0 auto 18px;
      max-width: 1840px;
    }

    .titlebar {
      background: var(--orange);
      color: #000;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
      padding: 10px 14px;
    }

    .product-report-title {
      transition: background-color 160ms ease, color 160ms ease;
    }

    .product-report-title--all {
      background: #ef7029;
      color: #fff;
    }

    .product-report-title--inactive {
      background: #c63f5b;
      color: #fff;
    }

    .product-report-title--monthly {
      background: #237dbc;
      color: #fff;
    }

    .product-report-title--customers {
      background: #168a72;
      color: #fff;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      column-gap: 14px;
      row-gap: 9px;
      padding: 10px 14px;
      border-bottom: 1px solid #b8c7d1;
      background: #fff;
    }

    .toolbar-group {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .toolbar-group:last-of-type {
      margin-left: auto;
    }

    label {
      color: #061d36;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
      white-space: nowrap;
    }

    input,
    select {
      border: 1px solid #9eb0be;
      background: #fff;
      color: #000;
      font: inherit;
      font-size: 14px;
      min-height: 34px;
      padding: 5px 8px;
      border-radius: 4px;
    }

    input[type="file"] {
      width: 245px;
      padding: 4px 6px;
    }

    .import-toolbar {
      align-items: stretch;
      gap: 10px;
      background: #f4f8fc;
    }

    .import-card {
      display: grid;
      min-width: 280px;
      flex: 1 1 300px;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 2px 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid #b8cada;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 2px 7px rgba(32, 73, 105, 0.08);
    }

    .import-card-icon {
      display: grid;
      width: 38px;
      height: 38px;
      grid-row: 1 / span 2;
      place-items: center;
      border-radius: 9px;
      background: #e0eef9;
      color: #176ca6;
    }

    .import-card--stock .import-card-icon { background: #e0f3e5; color: #267348; }
    .import-card--customer .import-card-icon { background: #fff0d9; color: #b55e14; }
    .import-card-icon svg { width: 21px; height: 21px; }
    .import-card label { overflow: hidden; text-overflow: ellipsis; }
    .import-card input[type="file"] { width: 100%; min-width: 0; border: 0; padding: 2px 0; background: transparent; }

    .save-week-card {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
    }

    #save-week {
      display: inline-flex;
      min-height: 48px;
      gap: 8px;
      align-items: center;
      border-radius: 10px;
      background: #123f67;
      color: #fff;
      box-shadow: 0 3px 8px rgba(18, 63, 103, 0.2);
    }

    #save-week:hover { background: #0d3458; }
    #save-week svg { width: 19px; height: 19px; }

    .upload-results {
      display: grid;
      width: 100%;
      gap: 5px;
    }

    .upload-result {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 6px 9px;
      border: 1px solid #b9d7c5;
      border-radius: 6px;
      background: #edf8f1;
      color: #185b38;
      font-size: 13px;
      font-weight: 800;
    }

    .upload-result--error { border-color: #e2b4bc; background: #fff0f2; color: #8b2638; }
    .upload-result svg { width: 16px; height: 16px; flex: 0 0 auto; }
    .upload-result-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .upload-result-message { margin-left: auto; font-weight: 700; }

    input[type="search"] {
      width: 220px;
    }

    input[type="date"] {
      width: 145px;
    }
    .week-calendar-panel {
      position: absolute;
      z-index: 50;
      top: calc(100% + 8px);
      left: 205px;
      width: 294px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 5px 18px rgba(23, 63, 91, 0.12);
    }
    .week-calendar-panel[hidden] { display: none; }
    .week-calendar-trigger {
      min-width: 145px;
      padding: 8px 34px 8px 12px;
      border: 1px solid #b8ccda;
      border-radius: 8px;
      background: #fff;
      color: #173f5b;
      font: inherit;
      text-align: left;
      cursor: pointer;
      position: relative;
    }
    .week-calendar-trigger::after {
      content: "▾";
      position: absolute;
      right: 11px;
      color: #476a80;
    }
    .week-calendar-title {
      display: grid;
      grid-template-columns: 32px 1fr 32px;
      align-items: center;
      margin-bottom: 7px;
      color: #173f5b;
      font-weight: 700;
      text-align: center;
    }
    .week-calendar-nav {
      min-height: 30px;
      padding: 0;
      border: 0;
      border-radius: 7px;
      background: #edf4f8;
      color: #0d5c91;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
    }
    .week-calendar-nav:hover { background: #dcebf4; }
    .week-calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .week-calendar-day-name {
      padding: 3px 0;
      color: #647887;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
    }
    .week-calendar-day {
      min-width: 0;
      min-height: 32px;
      padding: 4px 0;
      border: 0;
      border-radius: 7px;
      background: #f2f6f8;
      color: #173f5b;
      cursor: pointer;
    }
    .week-calendar-day:hover { background: #dcebf4; }
    .week-calendar-day--selected-week {
      background: #f39a31;
      color: #fff;
      font-weight: 800;
    }
    .week-calendar-day--selected {
      outline: 3px solid #0d5c91;
      outline-offset: -2px;
    }
    .week-calendar-day--empty { visibility: hidden; }

    .range-separator {
      color: var(--muted);
      font-weight: 800;
    }

    select {
      min-width: 175px;
    }

    th {
      vertical-align: top;
    }

    th .header-cell {
      display: grid;
      grid-template-rows: 21px 26px;
      gap: 4px;
      min-height: 51px;
    }

    th .header-title {
      display: flex;
      min-width: 0;
      align-items: center;
      justify-content: center;
      line-height: 1.15;
      white-space: nowrap;
    }

    th .column-sort {
      width: 100%;
      min-width: 0;
      min-height: 21px;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: inherit;
      cursor: pointer;
    }

    th .column-sort:hover .sort-indicator,
    th .column-sort:focus-visible .sort-indicator,
    th .column-sort.is-active .sort-indicator {
      opacity: 1;
    }

    th .column-sort:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    th .sort-indicator {
      display: inline-flex;
      width: 16px;
      margin-left: 4px;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      line-height: 1;
      opacity: 0.58;
    }

    th .header-detail {
      display: flex;
      width: 100%;
      min-width: 0;
      min-height: 26px;
      align-items: flex-start;
      justify-content: center;
    }

    th .column-filter {
      display: block;
      width: 100%;
      min-width: 0;
      max-width: 180px;
      min-height: 26px;
      margin: 0 auto;
      padding: 3px 6px;
      border: 1px solid #7f9ab0;
      border-radius: 6px;
      color: #000;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.1;
      cursor: pointer;
    }

    th .column-filter:hover {
      border-color: #237dbc;
    }

    th .column-filter:focus {
      outline: 3px solid rgba(35, 125, 188, 0.22);
      outline-offset: 1px;
      border-color: #237dbc;
    }

    th .period-subtitle {
      display: block;
      align-self: center;
      margin: 0;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.15;
    }

    th .column-filter--gpi-all {
      background: #f5fbff;
    }

    th .column-filter--gpi-positive {
      border-color: #73b68b;
      background: #d9f7e2;
      color: #000;
    }

    th .column-filter--gpi-negative {
      border-color: #d9b44a;
      background: #fff3bf;
      color: #000;
    }

    button {
      min-height: 34px;
      border: 1px solid #1d5f92;
      background: #237dbc;
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #145f99;
    }

    .report-downloads {
      gap: 6px;
      justify-content: flex-end;
    }

    .report-download-button {
      display: inline-flex;
      min-height: 32px;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-color: #91afc4;
      background: #fff;
      color: #164f7a;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .report-download-button:hover {
      border-color: #237dbc;
      background: #eaf4fb;
      color: #073e69;
    }

    .report-download-button:focus-visible {
      outline: 3px solid rgba(35, 125, 188, 0.28);
      outline-offset: 2px;
    }

    .report-download-button svg {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      stroke-width: 2.25;
    }

    .report-download-format {
      padding-left: 5px;
      border-left: 1px solid currentColor;
      font-size: 10px;
      font-weight: 800;
    }

    .report-download-button--jpeg {
      color: #8b3c51;
    }

    .report-download-button--jpeg:hover {
      border-color: #be6b81;
      background: #fff1f4;
      color: #742d42;
    }

    .history-delete-controls {
      padding-left: 10px;
      border-left: 1px solid #c8d4dd;
    }

    .history-delete-button {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      border: 1px solid #d38b98;
      background: #fff5f6;
      color: #8c2639;
    }

    .history-delete-button:hover { background: #ffe5e9; color: #721d2d; }
    .history-delete-button--all { background: #a62f43; color: #fff; }
    .history-delete-button--all:hover { background: #872235; color: #fff; }
    .history-delete-button svg { width: 16px; height: 16px; }

    .report-tabs {
      display: flex;
      align-items: end;
      gap: 2px;
      padding: 0 14px;
      border-bottom: 1px solid #b8c7d1;
      background: #f4f8fb;
    }

    .report-tab {
      --tab-accent: #237dbc;
      --tab-surface: #f4f8fb;
      --tab-hover: #e8f1f8;
      --tab-text: #34516b;
      min-height: 42px;
      border: 0;
      border-bottom: 3px solid transparent;
      border-radius: 0;
      background: var(--tab-surface);
      color: var(--tab-text);
      font-size: 15px;
      padding: 10px 16px 8px;
      transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .report-tab > span {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      justify-content: center;
    }

    .report-tab svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      color: var(--tab-accent);
      stroke-width: 2.2;
    }

    .report-tab[data-product-tab="all"] {
      --tab-accent: #ef7029;
      --tab-surface: #fff0e8;
      --tab-hover: #ffe2d1;
      --tab-text: #7a3516;
    }

    .report-tab[data-product-tab="inactive"] {
      --tab-accent: #c63f5b;
      --tab-surface: #fff0f3;
      --tab-hover: #ffdce4;
      --tab-text: #762f42;
    }

    .report-tab[data-product-tab="monthly"] {
      --tab-accent: #237dbc;
      --tab-surface: #eaf4fb;
      --tab-hover: #d8ebf8;
      --tab-text: #164f78;
    }

    .report-tab[data-product-tab="customers"] {
      --tab-accent: #168a72;
      --tab-surface: #e8f7f3;
      --tab-hover: #d2eee7;
      --tab-text: #125c4e;
    }

    .report-tab:hover {
      background: var(--tab-hover);
      color: var(--tab-text);
    }

    .report-tab.is-active,
    .report-tab.is-active:hover {
      border-bottom-color: var(--tab-accent);
      background: var(--tab-surface);
      color: var(--tab-text);
      box-shadow: inset 0 3px 0 var(--tab-accent);
      font-weight: 800;
    }

    .report-tab:focus-visible {
      outline: 3px solid var(--tab-accent);
      outline-offset: -3px;
    }

    .report-mode-switch {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px;
      border: 1px solid #afc2d0;
      border-radius: 4px;
      background: #f6fafc;
    }

    .report-mode-button {
      min-height: 28px;
      padding: 4px 9px;
      border: 0;
      border-radius: 3px;
      background: transparent;
      color: #34516b;
      font-size: 12px;
    }

    .report-mode-button:hover {
      background: #e3eff7;
      color: #001f3d;
    }

    .report-mode-button.is-active,
    .report-mode-button.is-active:hover {
      background: #237dbc;
      color: #fff;
    }

    .monthly-report-note {
      padding: 9px 14px;
      border-bottom: 1px solid #d5e0e8;
      background: #f8fbfd;
      color: #40596f;
      font-size: 13px;
      font-weight: 700;
    }

    .monthly-report-note strong {
      color: #004f81;
    }

    .monthly-table th {
      min-width: 88px;
      text-align: right;
      white-space: nowrap;
    }

    .monthly-sort-indicator {
      display: inline-block;
      margin-left: 4px;
      color: #000;
      font-size: 12px;
      font-weight: 900;
    }

    .monthly-daily-sort-button {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      border: 0;
      padding: 0;
      background: transparent;
      color: #000;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
    }

    .monthly-daily-sort-button.is-active {
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    .monthly-daily-sort-button:focus-visible {
      outline: 3px solid rgba(35, 125, 188, 0.34);
      outline-offset: 3px;
    }

    .monthly-table th.monthly-code,
    .monthly-table td.monthly-code {
      min-width: 96px;
      text-align: left;
    }

    .monthly-table th.monthly-product,
    .monthly-table td.monthly-product {
      min-width: 250px;
      text-align: left;
    }

    .monthly-table th.monthly-total,
    .monthly-table td.monthly-total {
      min-width: 116px;
      background: #e8f2fb;
      font-weight: 800;
    }

    .monthly-table th.monthly-revenue,
    .monthly-table td.monthly-revenue {
      min-width: 124px;
      background: #fff1f4;
      font-weight: 800;
    }

    .monthly-table--daily tbody td {
      background: #fff;
      color: #000;
    }

    .monthly-daily-pager {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #d5e0e8;
      background: #fff;
    }

    .monthly-daily-page-label {
      flex: 0 1 auto;
      color: #34516b;
      font-size: 12px;
      font-weight: 800;
    }

    .monthly-daily-page-count {
      min-width: 52px;
      color: #004f81;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .monthly-daily-page-button {
      width: 30px;
      min-width: 30px;
      height: 28px;
      padding: 0;
      border: 1px solid #9ab7cf;
      border-radius: 3px;
      background: #f7fbfe;
      color: #005a93;
      font-size: 21px;
      font-weight: 900;
      line-height: 1;
    }

    .monthly-daily-page-button:hover:not(:disabled) {
      border-color: #237dbc;
      background: #e5f2fb;
      color: #003d66;
    }

    .monthly-daily-page-button:disabled {
      cursor: default;
      opacity: 0.42;
    }

    .monthly-daily-table-wrap {
      max-width: 100%;
    }

    .monthly-table--daily {
      width: 100%;
      min-width: 0;
      border-collapse: separate;
      border-spacing: 0;
    }

    .monthly-table--daily th,
    .monthly-table--daily td {
      border-top: 0;
      border-left: 0;
    }

    .monthly-table--daily tr > :first-child {
      border-left: 1px solid var(--grid);
    }

    .monthly-table--daily thead tr:first-child > th {
      border-top: 1px solid var(--grid);
    }

    .monthly-table--daily th.monthly-code,
    .monthly-table--daily td.monthly-code {
      width: 96px;
      min-width: 96px;
      max-width: 96px;
      position: sticky;
      left: 0;
    }

    .monthly-table--daily th.monthly-product,
    .monthly-table--daily td.monthly-product {
      width: 240px;
      min-width: 240px;
      max-width: 240px;
      position: sticky;
      left: 96px;
      box-shadow: 2px 0 5px rgba(33, 65, 90, 0.14);
    }

    .monthly-table--daily th.monthly-code,
    .monthly-table--daily th.monthly-product {
      z-index: 4;
      background: var(--header);
    }

    .monthly-table--daily td.monthly-code,
    .monthly-table--daily td.monthly-product {
      z-index: 2;
      background: #fff;
    }

    .monthly-table--daily th.monthly-total,
    .monthly-table--daily td.monthly-total {
      width: 112px;
      min-width: 112px;
    }

    .monthly-table--daily th[class*="monthly-day-"],
    .monthly-table--daily td[class*="monthly-day-"] {
      width: 86px;
      min-width: 86px;
    }

    .monthly-table--daily td.monthly-total,
    .monthly-table--daily td[class*="monthly-day-"] {
      background-color: #fff;
    }

    .monthly-table--daily .monthly-total {
      --daily-bar-border: #d56b16;
      --daily-bar-start: #f39a31;
      --daily-bar-end: #ffe2aa;
    }

    .monthly-table--daily th.monthly-total {
      background: #ffd19a;
      color: #000;
    }

    .monthly-table--daily .monthly-day-0,
    .monthly-table--daily .monthly-day-1,
    .monthly-table--daily .monthly-day-2,
    .monthly-table--daily .monthly-day-3,
    .monthly-table--daily .monthly-day-4,
    .monthly-table--daily .monthly-day-5,
    .monthly-table--daily .monthly-day-6 {
      --daily-bar-border: #3d7fbd;
      --daily-bar-start: #5fa4df;
      --daily-bar-end: #d8eeff;
    }

    .monthly-table--daily th.monthly-day-0,
    .monthly-table--daily th.monthly-day-1,
    .monthly-table--daily th.monthly-day-2,
    .monthly-table--daily th.monthly-day-3,
    .monthly-table--daily th.monthly-day-4,
    .monthly-table--daily th.monthly-day-5,
    .monthly-table--daily th.monthly-day-6 {
      background: #d8eeff;
      color: #000;
    }

    .monthly-table--daily td.monthly-visual-cell {
      height: 31px;
      padding-bottom: 4px;
    }

    .monthly-table--daily td.monthly-visual-cell::before {
      border-color: var(--daily-bar-border, #3d7fbd);
      background: linear-gradient(90deg, var(--daily-bar-start, #5fa4df), var(--daily-bar-end, #d8eeff));
    }

    .monthly-table--daily td.monthly-total {
      background-color: #fff1dc;
    }

    .monthly-table--daily td.monthly-total.monthly-total-mismatch {
      --daily-bar-border: #c93636;
      --daily-bar-start: #ef6a6a;
      --daily-bar-end: #ffd1d1;
      background-color: #ffe1e1;
      color: #9f1d1d;
      box-shadow: inset 0 0 0 2px #d64545;
      font-weight: 900;
    }

    .sales-dashboard {
      display: grid;

        width: 96px;
        min-width: 96px;
      }
      th, td { font-size: 13px; }

    /* 2026 dashboard visual refresh */
    :root {
      --page-bg: #eef4f8;
      --surface: #ffffff;
      --surface-soft: #f7fafc;
      --line: #d7e2ea;
      --line-strong: #b8c9d6;
      --primary: #176b9f;
      --primary-dark: #0d527f;
      --focus: rgba(23, 107, 159, 0.22);
      --shadow-sm: 0 2px 8px rgba(25, 57, 78, 0.07);
      --shadow-md: 0 10px 28px rgba(25, 57, 78, 0.11);
    }

    html { scroll-behavior: smooth; }

    body {
      background:
        radial-gradient(circle at 12% 0%, rgba(47, 131, 184, 0.09), transparent 28rem),
        var(--page-bg);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    .app { padding: 24px clamp(14px, 2vw, 32px) 40px; }

    .sheet {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow-md);
    }
    .history-sheet {
      position: relative;
      z-index: 20;
      overflow: visible;
    }
    .history-sheet > .titlebar {
      border-radius: 15px 15px 0 0;
    }

    .titlebar {
      min-height: 56px;
      display: grid;
      place-items: center;
      padding: 13px 18px;
      color: #fff;
      letter-spacing: 0.01em;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
      position: relative;
    }

    .brand-titlebar {
      padding-left: 78px;
      padding-right: 78px;
    }

    .brand-titlebar::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 50%;
      width: 46px;
      height: 46px;
      transform: translateY(-50%);
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      background: #fff url("./a-and-c-shop-logo.jpg") center / contain no-repeat;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .product-report-title--all { color: #fff; }

    .toolbar {
      padding: 12px 16px;
      border-bottom-color: var(--line);
      background: rgba(255, 255, 255, 0.97);
    }

    .import-toolbar {
      padding: 14px 16px;
      background: linear-gradient(180deg, #f8fbfd, #f2f7fa);
    }

    .import-card {
      border-color: var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .import-card:hover {
      transform: translateY(-1px);
      border-color: #9db9cc;
      box-shadow: 0 7px 18px rgba(25, 57, 78, 0.11);
    }

    .import-card-icon { border-radius: 11px; }

    input,
    select {
      min-height: 38px;
      border-color: var(--line-strong);
      border-radius: 8px;
      padding: 7px 10px;
      transition: border-color 150ms ease, box-shadow 150ms ease, background-color 150ms ease;
    }

    input:hover,
    select:hover { border-color: #769bb3; }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--focus);
    }

    input[type="file"]::file-selector-button {
      margin-right: 9px;
      border: 0;
      border-radius: 7px;
      padding: 7px 10px;
      background: #e7f1f7;
      color: var(--primary-dark);
      font-weight: 800;
      cursor: pointer;
    }

    button {
      min-height: 38px;
      border-radius: 8px;
      transition: transform 120ms ease, box-shadow 150ms ease, filter 150ms ease;
    }

    button:hover:not(:disabled) {
      filter: brightness(0.97);
      box-shadow: 0 4px 12px rgba(23, 63, 91, 0.14);
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: none;
    }

    button:disabled { cursor: not-allowed; opacity: 0.55; }

    .report-tabs {
      gap: 4px;
      padding: 5px 12px 0;
      background: #edf3f7;
      border-bottom: 1px solid var(--line);
    }

    .report-tab {
      border-radius: 9px 9px 0 0;
      transition: background-color 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .report-tab:hover { transform: translateY(-1px); }

    .section-title,
    .summary-label {
      border-color: var(--line);
      background: linear-gradient(180deg, #fbfdfe, #f4f8fb);
    }

    .product-group-tabs {
      display: flex;
      gap: 6px;
      padding: 10px 14px 0;
      border-top: 1px solid var(--line);
      background: #f7fafc;
    }

    .product-group-tab {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 120px;
      justify-content: center;
      border: 1px solid #b9cbd7;
      border-bottom: 3px solid transparent;
      background: #ffffff;
      color: #38556a;
      font-weight: 800;
    }

    .product-group-tab.is-active {
      border-color: #65a985;
      border-bottom-color: #268158;
      background: #eaf7ef;
      color: #17613e;
      box-shadow: 0 3px 10px rgba(38, 129, 88, 0.12);
    }

    .product-group-tab svg { width: 18px; height: 18px; }

    .product-group-emoji {
      display: inline-grid;
      width: 25px;
      height: 25px;
      place-items: center;
      border-radius: 50%;
      background: #fff4dc;
      font-size: 18px;
      line-height: 1;
      box-shadow: inset 0 0 0 1px #f2cf8a;
    }

    .status {
      border-radius: 7px;
      line-height: 1.4;
    }

    .kpi {
      transition: background-color 150ms ease, transform 150ms ease;
    }

    .kpi:hover { transform: translateY(-2px); }

    .table-wrap {
      scrollbar-color: #a7bdcc #edf3f7;
      scrollbar-width: thin;
      background: #fff;
    }

    table { border-collapse: separate; border-spacing: 0; }

    th,
    td {
      border-width: 0 1px 1px 0;
      border-color: #c8d5de;
      height: 36px;
      padding: 6px 9px;
      vertical-align: middle;
    }

    tr > :first-child { border-left: 1px solid #c8d5de; }
    thead tr:first-child > * { border-top: 1px solid #c8d5de; }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #e6f0f7;
      color: #17374d;
      box-shadow: inset 0 -1px 0 #adc1cf;
    }

    tbody tr { transition: background-color 100ms ease; }
    tbody tr:not(.inactive-row):hover td { box-shadow: inset 0 0 0 999px rgba(23, 107, 159, 0.045); }

    .history-delete-controls {
      padding: 8px;
      border: 1px solid #f0d4d8;
      border-radius: 10px;
      background: #fff8f8;
    }

    .report-download-button,
    .history-delete-button { white-space: nowrap; }

    @media (max-width: 900px) {
      .app { padding: 10px; }
      .sheet { border-radius: 12px; }
      .titlebar { min-height: 50px; }
      .brand-titlebar { padding-left: 62px; padding-right: 12px; text-align: left; }
      .brand-titlebar::before { left: 10px; width: 40px; height: 40px; }
      .toolbar { padding: 10px 12px; }
      .import-card { min-width: 100%; }
      .history-delete-controls input[type="date"] { flex: 1 1 140px; }
      th, td { height: 34px; padding: 5px 7px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>

    function activeReportDate() {
      const snapshot = history.find(item => item.weekKey === selectedWeekKey);
      const savedAt = snapshot?.savedAt ? new Date(snapshot.savedAt) : null;
      return savedAt && !Number.isNaN(savedAt.getTime()) ? savedAt : todayDate();
    }

    function financialPeriodBounds(mode = selectedFinancialPeriod(), date = activeReportDate()) {
      return mode === "previous"
        ? previousReportingPeriodBounds(date)
        : reportingPeriodBounds(date);
    }

    function financialPeriodDayCount(mode = selectedFinancialPeriod(), date = activeReportDate(), useSelectedSalesRange = false) {
      if (useSelectedSalesRange && mode === "previous") return selectedSalesRangeDayCount();
      const period = financialPeriodBounds(mode, date);
      if (mode === "previous") {
        return Math.floor((period.end - period.start) / 86400000) + 1;
      }
      const base = new Date(date);
      base.setHours(0, 0, 0, 0);
      const end = base > period.end ? period.end : base;
      return Math.max(1, Math.floor((end - period.start) / 86400000) + 1);
    }

    function financialMetrics(row, mode = selectedFinancialPeriod(), date = activeReportDate(), useSelectedSalesRange = false) {
      const isPrevious = mode === "previous";
      const saleWeight = Number(isPrevious ? row.previousSale : row.currentSale) || 0;
      const salesAmount = Number(isPrevious ? row.previousSalesAmount : row.salesAmount) || 0;
      const cost = Number(row.cost || 0);
      const profit = salesAmount - (saleWeight * cost);
      const days = financialPeriodDayCount(mode, date, useSelectedSalesRange);
      const averageProfit = saleWeight > 0 ? profit / saleWeight : 0;
      return {
        saleWeight,
        salesAmount,
        profit,
        days,
        averageSellPrice: saleWeight > 0 ? salesAmount / saleWeight : 0,
        averageDailySales: days > 0 ? salesAmount / days : 0,
        averageProfit,
        gp: cost > 0 ? (averageProfit / cost) * 100 : 0
      };
    }

    function financialTotals(data, mode = selectedFinancialPeriod(), date = activeReportDate(), useSelectedSalesRange = false) {
      const metrics = data.map(row => financialMetrics(row, mode, date, useSelectedSalesRange));
      const saleWeight = sum(metrics.map(item => item.saleWeight));
      const salesAmount = sum(metrics.map(item => item.salesAmount));
      const profit = sum(metrics.map(item => item.profit));
      const costAmount = sum(data.map(row => {
        const saleWeightForRow = Number(mode === "previous" ? row.previousSale : row.currentSale) || 0;
        return saleWeightForRow * Number(row.cost || 0);
      }));
      const days = financialPeriodDayCount(mode, date, useSelectedSalesRange);
      const averageProfit = saleWeight > 0 ? profit / saleWeight : 0;
      const averageCost = saleWeight > 0 ? costAmount / saleWeight : 0;
      return {
        saleWeight,
        salesAmount,
        profit,
        days,
        averageSellPrice: saleWeight > 0 ? salesAmount / saleWeight : 0,
        averageDailySales: days > 0 ? salesAmount / days : 0,
        averageProfit,
        averageCost,
        gp: averageCost > 0 ? (averageProfit / averageCost) * 100 : 0
      };
    }
